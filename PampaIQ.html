      };

      return (
        <tr className="editable-table-row">
          <td style={{ minWidth: 200 }}>
            <select className="form-input form-select" style={{ padding: '5px 8px' }} value={pest.pestId || ''} onChange={e => handlePestChange(e.target.value)}>
              <option value="">Seleccionar plaga...</option>
              {DATA.pests.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </td>
          <td style={{ minWidth: 120 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <input type="number" min="0" max="100" className="form-input" style={{ padding: '5px 8px', width: 70 }} value={pest.incidence || ''} onChange={e => handleIncidenceChange(e.target.value)} placeholder="0" />
              <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>%</span>
            </div>
            {catalogItem && <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 4 }}>Umbral: {catalogItem.threshold}%</div>}
          </td>
          <td style={{ minWidth: 100 }}>
            <span className={`badge ${levelColors[pest.level] || 'badge-success'}`}>
              <span className={`severity-dot ${levelSev[pest.level] || 'low'}`} />
              {pest.level ? pest.level.charAt(0).toUpperCase() + pest.level.slice(1) : 'Bajo'}
            </span>
          </td>
          <td><input className="form-input" style={{ padding: '5px 8px' }} value={pest.treatment || ''} onChange={e => onChange({ ...pest, treatment: e.target.value })} placeholder="Tratamiento..." /></td>
          <td className="row-actions" style={{ opacity: 1, width: 40, textAlign: 'center' }}>
            <button className="btn btn-ghost btn-icon btn-sm" onClick={onRemove} style={{ color: 'var(--critical)' }}><Icon name="trash" size={14} /></button>
          </td>
        </tr>
      );
    };

    // ── Page Shell ────────────────────────────────────────────────────────────────
    const PageShell = ({ breadcrumbs, actions, children }) => (
      <>
        <Topbar breadcrumbs={breadcrumbs} actions={actions} />
        <div className="page-body">{children}</div>
      </>
    );

    // ── Avatar ─────────────────────────────────────────────────────────────────────
    const Avatar = ({ initials, size = 32, bg = 'var(--accent)' }) => (
      <div style={{
        width: size, height: size, borderRadius: '50%',
        background: bg, color: '#fff',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size * 0.35, fontWeight: 700, fontFamily: 'var(--font-head)',
        flexShrink: 0,
      }}>{initials}</div>
    );

    Object.assign(window, {
      Icon, Sidebar, MobileNav, Topbar, ProgressSteps, Modal, Badge, Semaphore,
      ConfirmDialog, StatusToggle, EditableProductRow, EditablePestRow, PageShell, Avatar,
    });

  </script>

  <script type="text/babel">
    // app-screens.jsx — All screens

    // const { useState, useEffect } = React;

    // ══════════════════════════════════════════════════════════════════════════════
    // AUTH SCREENS
    // ══════════════════════════════════════════════════════════════════════════════
    const LoginScreen = ({ onLogin }) => {
      // ── Login state ──
      const [email, setEmail] = useState('juan@laesperanza.com.ar');
      const [pass, setPass] = useState('');
      const [loginErrors, setLoginErrors] = useState({});

      // ── Recovery flow: 'step1' | 'step2' | 'step3' | 'success' ──
      const [mode, setMode] = useState('login');
      const [recEmail, setRecEmail] = useState('');
      const [recEmailErr, setRecEmailErr] = useState('');
      const [otpDigits, setOtpDigits] = useState(['', '', '', '', '', '']);
      const [otpError, setOtpError] = useState('');
      const [resent, setResent] = useState(false);
      const [newPass, setNewPass] = useState('');
      const [confirmPass, setConfirmPass] = useState('');
      const [showNew, setShowNew] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);
      const [passErrors, setPassErrors] = useState({});

      // ── OTP input refs ──
      const otpRefs = [useRef(), useRef(), useRef(), useRef(), useRef(), useRef()];

      const goLogin = () => {
        setMode('login');
        setRecEmail(''); setRecEmailErr('');
        setOtpDigits(['','','','','','']); setOtpError(''); setResent(false);
        setNewPass(''); setConfirmPass(''); setPassErrors({});
      };

      // ── Login submit ──
      const handleLogin = () => {
        const e = {};
        if (!email) e.email = 'El email es obligatorio';
        else if (!/\S+@\S+\.\S+/.test(email)) e.email = 'Email inválido';
        if (!pass) e.pass = 'La contraseña es obligatoria';
        setLoginErrors(e);
        if (Object.keys(e).length === 0) onLogin();
      };

      // ── Step 1: send code ──
      const handleSendCode = () => {
        if (!recEmail) { setRecEmailErr('El email es obligatorio'); return; }
        if (!/\S+@\S+\.\S+/.test(recEmail)) { setRecEmailErr('Ingresá un email válido'); return; }
        if (recEmail.length > 100) { setRecEmailErr('Máximo 100 caracteres'); return; }
        setRecEmailErr('');
        setMode('step2');
      };

      // ── Step 2: OTP digit input ──
      const handleOtpChange = (idx, val) => {
        const v = val.replace(/\D/g, '').slice(0, 1);
        const next = [...otpDigits];
        next[idx] = v;
        setOtpDigits(next);
        setOtpError('');
        if (v && idx < 5) otpRefs[idx + 1].current?.focus();
      };
      const handleOtpKeyDown = (idx, e) => {
        if (e.key === 'Backspace' && !otpDigits[idx] && idx > 0) otpRefs[idx - 1].current?.focus();
      };
      const handleOtpPaste = (e) => {
        const text = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        if (text.length === 6) {
          setOtpDigits(text.split(''));
          setOtpError('');
          otpRefs[5].current?.focus();
          e.preventDefault();
        }
      };
      const handleVerifyOtp = () => {
        const code = otpDigits.join('');
        if (code.length < 6) { setOtpError('Ingresá los 6 dígitos del código'); return; }
        // Mock: any 6-digit code is valid
        setOtpError('');
        setMode('step3');
      };
      const handleResend = (e) => {
        e.preventDefault();
        setResent(true);
        setOtpDigits(['','','','','','']);
        setOtpError('');
        setTimeout(() => setResent(false), 3000);
      };

      // ── Step 3: new password ──
      const passMatch = newPass && confirmPass && newPass === confirmPass;
      const passMismatch = newPass && confirmPass && newPass !== confirmPass;
      const handleChangePass = () => {
        const e = {};
        if (!newPass) e.newPass = 'Ingresá la nueva contraseña';
        else if (newPass.length < 8) e.newPass = 'Mínimo 8 caracteres';
        if (!confirmPass) e.confirmPass = 'Confirmá la contraseña';
        else if (newPass !== confirmPass) e.confirmPass = 'Las contraseñas no coinciden';
        setPassErrors(e);
        if (Object.keys(e).length === 0) setMode('success');
      };

      // ── Shared left panel ──
      const AuthLeft = () => (
        <div className="auth-left">
          <div style={{ position: 'relative', textAlign: 'center' }}>
            <div style={{ fontSize: 56, marginBottom: 8 }}>🌾</div>
            <div className="auth-tagline">Gestión agropecuaria<br />inteligente</div>
            <p className="auth-tagline-sub">Monitoreo sanitario, fenológico y operativo para productores y asesores técnicos argentinos.</p>
            <div style={{ marginTop: 32, display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
              {['450 has monitoreadas', '3 campos activos', '2 asesores'].map(t => (
                <span key={t} style={{ background: 'rgba(61,139,94,0.25)', color: 'rgba(255,255,255,0.8)', padding: '6px 14px', borderRadius: 20, fontSize: 12, fontFamily: 'var(--font-head)', fontWeight: 600 }}>{t}</span>
              ))}
            </div>
          </div>
        </div>
      );

      // ── Step indicator (steps 1-3) ──
      const StepDots = ({ current }) => (
        <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 24 }}>
          {[1, 2, 3].map(n => (
            <div key={n} style={{ width: n === current ? 24 : 8, height: 8, borderRadius: 4, background: n === current ? 'var(--accent)' : n < current ? 'var(--accent)' : 'var(--border)', transition: 'all 0.25s', opacity: n < current ? 0.45 : 1 }} />
          ))}
        </div>
      );

      // ── Eye toggle button ──
      const EyeBtn = ({ show, onToggle }) => (
        <button type="button" onClick={onToggle} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', padding: 0, lineHeight: 1, fontSize: 16 }}>
          {show ? '🙈' : '👁'}
        </button>
      );

      return (
        <div className="auth-shell">
          <AuthLeft />
          <div className="auth-right">
            <div className="auth-form-wrap">

              {/* ══ LOGIN ══ */}
              {mode === 'login' && (
                <>
                  <div className="auth-logo"><div className="auth-logo-icon">🌱</div>PampaIQ</div>
                  <p className="auth-subtitle">Ingresá a tu cuenta</p>
                  <div className="form-group">
                    <label className="form-label">Email</label>
                    <input className={`form-input ${loginErrors.email ? 'error' : ''}`} type="email" value={email} maxLength={100} onChange={e => setEmail(e.target.value)} placeholder="tu@email.com" />
                    {loginErrors.email && <span className="form-error">⚠ {loginErrors.email}</span>}
                  </div>
                  <div className="form-group">
                    <label className="form-label">Contraseña</label>
                    <input className={`form-input ${loginErrors.pass ? 'error' : ''}`} type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" />
                    {loginErrors.pass && <span className="form-error">⚠ {loginErrors.pass}</span>}
                  </div>
                  <div style={{ textAlign: 'right', marginBottom: 16, marginTop: -8 }}>
                    <a href="#" onClick={e => { e.preventDefault(); setMode('step1'); setRecEmail(email); }} style={{ fontSize: 12 }}>Olvidé mi contraseña</a>
                  </div>
                  <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: 12 }} onClick={handleLogin}>Ingresar</button>
                </>
              )}

              {/* ══ STEP 1 — EMAIL ══ */}
              {mode === 'step1' && (
                <>
                  <div className="auth-logo"><div className="auth-logo-icon">🌱</div>PampaIQ</div>
                  <p className="auth-subtitle">Recuperar contraseña</p>
                  <StepDots current={1} />
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20, lineHeight: 1.6 }}>
                    Ingresá el email asociado a tu cuenta y te enviaremos un código de verificación.
                  </p>
                  <div className="form-group">
                    <label className="form-label">Email registrado</label>
                    <input
                      className={`form-input ${recEmailErr ? 'error' : ''}`}
                      type="email" value={recEmail} maxLength={100}
                      onChange={e => { setRecEmail(e.target.value); setRecEmailErr(''); }}
                      placeholder="tu@email.com"
                      autoFocus
                    />
                    {recEmailErr && <span className="form-error">⚠ {recEmailErr}</span>}
                  </div>
                  <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: 12, marginBottom: 12 }} onClick={handleSendCode}>
                    Enviar código
                  </button>
                  <div style={{ textAlign: 'center' }}>
                    <a href="#" onClick={e => { e.preventDefault(); goLogin(); }} style={{ fontSize: 12, color: 'var(--text-secondary)' }}>← Volver al inicio de sesión</a>
                  </div>
                </>
              )}

              {/* ══ STEP 2 — OTP ══ */}
              {mode === 'step2' && (
                <>
                  <div className="auth-logo"><div className="auth-logo-icon">🌱</div>PampaIQ</div>
                  <p className="auth-subtitle">Verificá tu email</p>
                  <StepDots current={2} />
                  <div style={{ textAlign: 'center', marginBottom: 24 }}>
                    <div style={{ fontSize: 40, marginBottom: 10 }}>📬</div>
                    <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                      Enviamos un código de 6 dígitos a<br />
                      <strong style={{ color: 'var(--dark)' }}>{recEmail}</strong>
                    </p>
                  </div>

                  {/* 6-digit OTP inputs */}
                  <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 8 }} onPaste={handleOtpPaste}>
                    {otpDigits.map((d, i) => (
                      <input
                        key={i}
                        ref={otpRefs[i]}
                        type="text" inputMode="numeric" maxLength={1}
                        value={d}
                        onChange={e => handleOtpChange(i, e.target.value)}
                        onKeyDown={e => handleOtpKeyDown(i, e)}
                        style={{
                          width: 44, height: 52, textAlign: 'center',
                          fontSize: 22, fontWeight: 700, fontFamily: 'var(--font-mono)',
                          border: `2px solid ${otpError ? 'var(--critical)' : d ? 'var(--accent)' : 'var(--border)'}`,
                          borderRadius: 10, outline: 'none', background: d ? 'var(--accent-light)' : '#fff',
                          color: 'var(--dark)', transition: 'border-color 0.15s, background 0.15s',
                        }}
                      />
                    ))}
                  </div>
                  {otpError && <div style={{ textAlign: 'center', marginBottom: 10 }}><span className="form-error">⚠ {otpError}</span></div>}

                  <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: 12, marginBottom: 14, marginTop: 8 }} onClick={handleVerifyOtp}>
                    Verificar código
                  </button>

                  <div style={{ textAlign: 'center', marginBottom: 12 }}>
                    {resent
                      ? <span style={{ fontSize: 12, color: 'var(--success)', fontWeight: 600 }}>✓ Código reenviado</span>
                      : <a href="#" onClick={handleResend} style={{ fontSize: 12, color: 'var(--accent)' }}>¿No recibiste el código? Reenviar</a>
                    }
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <a href="#" onClick={e => { e.preventDefault(); setMode('step1'); }} style={{ fontSize: 12, color: 'var(--text-secondary)' }}>← Volver</a>
                  </div>
                </>
              )}

              {/* ══ STEP 3 — NUEVA CONTRASEÑA ══ */}
              {mode === 'step3' && (
                <>
                  <div className="auth-logo"><div className="auth-logo-icon">🌱</div>PampaIQ</div>
                  <p className="auth-subtitle">Establecé tu nueva contraseña</p>
                  <StepDots current={3} />

                  <div className="form-group">
                    <label className="form-label">Nueva contraseña</label>
                    <div style={{ position: 'relative' }}>
                      <input
                        className={`form-input ${passErrors.newPass ? 'error' : ''}`}
                        type={showNew ? 'text' : 'password'}
                        value={newPass}
                        onChange={e => { setNewPass(e.target.value); setPassErrors(prev => ({ ...prev, newPass: '' })); }}
                        placeholder="Mínimo 8 caracteres"
                        style={{ paddingRight: 40 }}
                      />
                      <EyeBtn show={showNew} onToggle={() => setShowNew(v => !v)} />
                    </div>
                    {passErrors.newPass && <span className="form-error">⚠ {passErrors.newPass}</span>}
                    {newPass && newPass.length < 8 && !passErrors.newPass && (
                      <span style={{ fontSize: 11, color: 'var(--warning)', marginTop: 4, display: 'block' }}>⚠ Mínimo 8 caracteres ({newPass.length}/8)</span>
                    )}
                  </div>

                  <div className="form-group">
                    <label className="form-label">Confirmar nueva contraseña</label>
                    <div style={{ position: 'relative' }}>
                      <input
                        className={`form-input ${passErrors.confirmPass ? 'error' : passMismatch ? 'error' : ''}`}
                        type={showConfirm ? 'text' : 'password'}
                        value={confirmPass}
                        onChange={e => { setConfirmPass(e.target.value); setPassErrors(prev => ({ ...prev, confirmPass: '' })); }}
                        placeholder="Repetí la contraseña"
                        style={{ paddingRight: 40 }}
                      />
                      <EyeBtn show={showConfirm} onToggle={() => setShowConfirm(v => !v)} />
                    </div>
                    {passErrors.confirmPass && <span className="form-error">⚠ {passErrors.confirmPass}</span>}
                    {/* Real-time match feedback */}
                    {!passErrors.confirmPass && confirmPass && (
                      passMatch
                        ? <span style={{ fontSize: 11, color: 'var(--success)', marginTop: 4, display: 'block', fontWeight: 600 }}>✓ Las contraseñas coinciden</span>
                        : <span style={{ fontSize: 11, color: 'var(--critical)', marginTop: 4, display: 'block' }}>✗ Las contraseñas no coinciden</span>
                    )}
                  </div>

                  <button
                    className="btn btn-primary"
                    style={{ width: '100%', justifyContent: 'center', padding: 12, marginTop: 4, background: passMatch ? '#2E7D4F' : undefined }}
                    onClick={handleChangePass}
                  >
                    Cambiar contraseña
                  </button>
                </>
              )}

              {/* ══ SUCCESS ══ */}
              {mode === 'success' && (
                <>
                  <div className="auth-logo"><div className="auth-logo-icon">🌱</div>PampaIQ</div>
                  <div style={{ textAlign: 'center', padding: '16px 0 24px' }}>
                    <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--accent-light)', border: '2px solid var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 28 }}>✓</div>
                    <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 18, color: 'var(--dark)', marginBottom: 10 }}>¡Contraseña actualizada!</div>
                    <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.65 }}>
                      Tu contraseña fue actualizada exitosamente.<br />Ya podés iniciar sesión con tu nueva contraseña.
                    </p>
                  </div>
                  <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: 12 }} onClick={goLogin}>
                    Ir al inicio de sesión
                  </button>
                </>
              )}

            </div>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // DASHBOARD
    // ══════════════════════════════════════════════════════════════════════════════
    const DashboardScreen = ({ onNav }) => {
      const criticalAlerts = DATA.alerts.filter(a => !a.resolved && (a.severity === 'critical' || a.severity === 'high'));
      const pendingOrders = DATA.orders.filter(o => o.status === 'pendiente');

      return (
        <PageShell breadcrumbs={['Dashboard']}>
          <div className="page-header">
            <div>
              <div className="page-title">Buenos días, Juan 👋</div>
              <div className="page-subtitle">Resumen operativo — 2 de mayo de 2025</div>
            </div>
          </div>

          {criticalAlerts.length > 0 && (
            <div style={{ background: 'var(--critical-light)', border: '1.5px solid var(--critical)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', marginBottom: 20, display: 'flex', alignItems: 'flex-start', gap: 12 }}>
              <span style={{ fontSize: 20 }}>🚨</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, color: 'var(--critical)', marginBottom: 4 }}>{criticalAlerts.length} alerta{criticalAlerts.length > 1 ? 's' : ''} crítica{criticalAlerts.length > 1 ? 's' : ''} activa{criticalAlerts.length > 1 ? 's' : ''}</div>
                {criticalAlerts.slice(0, 2).map(a => (
                  <div key={a.id} style={{ fontSize: 12, color: 'var(--dark)', marginBottom: 2 }}>• <strong>{a.lotName}</strong>: {a.description}</div>
                ))}
              </div>
              <button className="btn btn-sm" style={{ background: 'var(--critical)', color: '#fff', flexShrink: 0 }} onClick={() => onNav('alerts')}>Ver alertas</button>
            </div>
          )}

          <div className="stat-grid" style={{ gridTemplateColumns: 'repeat(4, 1fr)' }}>
            <div className="stat-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="stat-label">Campos</div>
                  <div className="stat-value">3</div>
                  <div className="stat-sub">450 has La Esperanza</div>
                </div>
                <div className="stat-icon" style={{ background: 'var(--accent-light)' }}>🏡</div>
              </div>
            </div>
            <div className="stat-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="stat-label">Lotes activos</div>
                  <div className="stat-value">7</div>
                  <div className="stat-sub">2 campañas activas</div>
                </div>
                <div className="stat-icon" style={{ background: 'var(--accent-light)' }}>🌾</div>
              </div>
            </div>
            <div className="stat-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="stat-label">Órdenes pendientes</div>
                  <div className="stat-value" style={{ color: pendingOrders.length > 0 ? 'var(--critical)' : 'var(--dark)' }}>{pendingOrders.length}</div>
                  <div className="stat-sub">Sin ejecutar</div>
                </div>
                <div className="stat-icon" style={{ background: pendingOrders.length > 0 ? 'var(--critical-light)' : 'var(--accent-light)' }}>⏳</div>
              </div>
            </div>
            <div className="stat-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="stat-label">Alertas activas</div>
                  <div className="stat-value" style={{ color: 'var(--critical)' }}>{DATA.alerts.filter(a => !a.resolved).length}</div>
                  <div className="stat-sub">{criticalAlerts.length} crítica{criticalAlerts.length !== 1 ? 's' : ''}</div>
                </div>
                <div className="stat-icon" style={{ background: 'var(--critical-light)' }}>🚨</div>
              </div>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
            <div>
              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, color: 'var(--dark)', marginBottom: 12 }}>Estado sanitario por lote</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {[
                  { lot: DATA.lots[0], sem: 'rojo', stage: 'Floración', campaign: 'Soja 2024/2025' },
                  { lot: DATA.lots[1], sem: 'amarillo', stage: 'Fructificación', campaign: 'Maíz 2023/2024' },
                  { lot: DATA.lots[2], sem: 'verde', stage: 'Madurez', campaign: 'Trigo 2024' },
                  { lot: DATA.lots[3], sem: 'amarillo', stage: 'Macollaje', campaign: 'Soja 2024/2025' },
                ].map(({ lot, sem, stage, campaign }) => (
                  <div key={lot.id} onClick={() => onNav('lot_detail', lot)} style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', cursor: 'pointer', transition: 'box-shadow 0.15s' }}
                    onMouseEnter={e => e.currentTarget.style.boxShadow = 'var(--shadow)'}
                    onMouseLeave={e => e.currentTarget.style.boxShadow = ''}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      <div>
                        <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, color: 'var(--dark)' }}>{lot.name} — {lot.crop}</div>
                        <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 2 }}>{campaign} · {stage}</div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <Semaphore level={sem} />
                        <Icon name="chevron_right" size={14} color="var(--text-muted)" />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div>
              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, color: 'var(--dark)', marginBottom: 12 }}>Órdenes de aplicación pendientes</div>
              {pendingOrders.length === 0 ? (
                <div className="empty-state" style={{ padding: 24 }}>
                  <div className="empty-state-icon">✅</div>
                  <div className="empty-state-text">Sin órdenes pendientes</div>
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {pendingOrders.map(o => (
                    <div key={o.id} onClick={() => onNav('orders')} style={{ background: '#fff', border: '1.5px solid var(--warning)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', cursor: 'pointer' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13 }}>{o.lotName} — {o.fieldName}</div>
                          <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 2, fontFamily: 'var(--font-mono)' }}>{fmt.date(o.date)}</div>
                          <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>{o.products.map(p => p.name).join(', ')}</div>
                        </div>
                        <span className="badge badge-warning">⏳ Pendiente</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </PageShell>
      );
    };

    // ── Lot Detail (screen 27) ────────────────────────────────────────────────────
    const LotDetailScreen = ({ lot: initialLot, onBack, onNav, onEdit }) => {
      const [localLot] = React.useState(initialLot);

      const activeCampaign = DATA.campaigns.find(c => c.lotId === localLot.id && c.status === 'activa');
      const latestVisit = DATA.visits.filter(v => v.lotId === localLot.id).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
      const gridData = latestVisit?.gridData || {};

      const totalCells = Math.pow(parseInt((localLot.gridConfig || '4x4').split('x')[0]), 2);

      const counts = { sin_datos: totalCells, normal: 0, stand_bajo: 0, manchon: 0, critico: 0 };
      Object.values(gridData).forEach(st => { counts[st] = (counts[st] || 0) + 1; counts.sin_datos--; });
      const affectStats = Object.entries(counts)
        .filter(([, v]) => v > 0)
        .map(([k, v]) => ({ key: k, label: (AFFECTATION_STATES[k] || AFFECTATION_STATES['sin_datos']).label, icon: (AFFECTATION_STATES[k] || AFFECTATION_STATES['sin_datos']).icon, color: (AFFECTATION_STATES[k] || AFFECTATION_STATES['sin_datos']).color, pct: Math.round((v / totalCells) * 100) }));

      return (
        <PageShell breadcrumbs={[localLot.fieldName, 'Lotes', localLot.name]}
          actions={<button className="btn btn-secondary" onClick={() => onEdit ? onEdit(localLot) : onNav('lot_edit', localLot)}>✏️ Editar</button>}>
          <div className="page-header">
            <div>
              <button className="btn btn-ghost btn-sm" onClick={onBack} style={{ marginBottom: 8, paddingLeft: 0 }}>
                <Icon name="back" size={14} /> Volver
              </button>
              <div className="page-title">{localLot.name}</div>
              <div className="page-subtitle">{localLot.fieldName} · {localLot.crop} · {fmt.area(localLot.area)}</div>
            </div>
            {activeCampaign && <span className="badge badge-success">✓ Campaña activa</span>}
          </div>

          {/* ── Info cards ── */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginBottom: 20 }}>
            <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 4, padding: '16px 20px' }}>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Cultivo actual</span>
              <span style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16 }}>{localLot.crop || 'Ninguno'}</span>
            </div>
            <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 4, padding: '16px 20px' }}>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Campaña activa</span>
              <span style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16 }}>{activeCampaign ? `${activeCampaign.crop} ${fmt.date(activeCampaign.startDate)}` : 'Ninguna'}</span>
            </div>
            <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 4, padding: '16px 20px' }}>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Superficie</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 16 }}>{fmt.area(localLot.area)}</span>
            </div>
            <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 4, padding: '16px 20px' }}>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Grilla</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 16 }}>{localLot.gridConfig || '4x4'}</span>
            </div>
          </div>

          {/* ── Mapa de afectación ── */}
          <div className="card" style={{ marginBottom: 24 }}>
            <div className="card-header">
              <div className="card-title">🗺️ Mapa de afectación sanitaria</div>
            </div>
            <div className="card-body">
              {latestVisit ? (
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20, textAlign: 'center' }}>
                  Datos correspondientes a la visita del <strong style={{ color: 'var(--dark)' }}>{fmt.date(latestVisit.date)}</strong>
                </div>
              ) : (
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20, textAlign: 'center' }}>
                  No hay visitas registradas con datos de relevamiento. Mostrando grilla vacía.
                </div>
              )}
              <GridMapper gridConfig={localLot.gridConfig || '4x4'} gridData={gridData} statesConfig={AFFECTATION_STATES} readOnly />
              {latestVisit && latestVisit.pests && latestVisit.pests.filter(p => p.affectedZones && p.affectedZones.length > 0).length > 0 && (
                <div style={{ marginTop: 16, textAlign: 'center', fontSize: 13, color: 'var(--text-secondary)' }}>
                  {latestVisit.pests.filter(p => p.affectedZones && p.affectedZones.length > 0).map((p, i) => (
                    <span key={i}>
                      {i > 0 && <span style={{ margin: '0 8px' }}>·</span>}
                      {p.level === 'critico' || p.level === 'crítico' ? '🔴' : p.level === 'alto' ? '🟠' : p.level === 'medio' ? '🟡' : '🟢'} {p.name} <span className="td-mono" style={{ fontWeight: 600, color: 'var(--dark)' }}>{p.incidence}%</span> — Zona {p.affectedZones.join(', ')}
                    </span>
                  ))}
                </div>
              )}
              <div style={{ marginTop: 24, padding: 16, background: '#f8fafc', borderRadius: 'var(--radius-lg)', border: '1px solid var(--border)' }}>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, marginBottom: 12 }}>Resumen de estado</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16 }}>
                  {affectStats.map(s => (
                    <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 16 }}>{s.icon}</span>
                      <span style={{ fontSize: 13 }}>{s.label}: <span className="td-mono" style={{ fontWeight: 700, color: s.key !== 'sin_datos' ? s.color : 'inherit' }}>{s.pct}%</span></span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* ── Visit characteristics — always read-only ── */}
          {latestVisit && (
            <>
              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 18, marginTop: 8, marginBottom: 16 }}>Últimas características registradas</div>
              <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16 }}>Visita del {fmt.date(latestVisit.date)}</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: 16, marginBottom: 24 }}>
                <div className="card" style={{ padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Stand de plantas</span>
                  <span className="td-mono" style={{ fontSize: 16, fontWeight: 600 }}>{latestVisit.plantStand || '-'} plantas/m</span>
                </div>
                <div className="card" style={{ padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Altura del cultivo</span>
                  <span className="td-mono" style={{ fontSize: 16, fontWeight: 600 }}>{latestVisit.cropHeight || '-'} cm</span>
                </div>
                <div className="card" style={{ padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Cobertura del suelo</span>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span className="td-mono" style={{ fontSize: 16, fontWeight: 600 }}>{latestVisit.soilCover || 0}%</span>
                    <div style={{ flex: 1, height: 6, background: 'var(--border)', borderRadius: 3, overflow: 'hidden' }}>
                      <div style={{ width: `${latestVisit.soilCover || 0}%`, height: '100%', background: 'var(--accent)' }} />
                    </div>
                  </div>
                </div>
                <div className="card" style={{ padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Uniformidad de implantación</span>
                  <span style={{ fontSize: 14, fontWeight: 500 }}>
                    {latestVisit.uniformity === 'Uniforme' ? '✅' : latestVisit.uniformity === 'Irregular' ? '⚠️' : '🎯'} {latestVisit.uniformity || '-'}
                  </span>
                </div>
                <div className="card" style={{ padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Estrés hídrico</span>
                  <span style={{ fontSize: 14, fontWeight: 500, color: latestVisit.waterStress === 'Sin estrés' ? 'var(--success)' : latestVisit.waterStress === 'Severo' ? 'var(--critical)' : 'var(--warning)' }}>
                    {latestVisit.waterStress === 'Sin estrés' ? '💧' : latestVisit.waterStress === 'Severo' ? '🏜️' : '☀️'} {latestVisit.waterStress || '-'}
                  </span>
                </div>
                {latestVisit.aerialSurvey && (
                  <div className="card" style={{ gridColumn: '1 / -1', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 8, background: '#f8fafc', border: '1px dashed var(--border)' }}>
                    <div style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="marker" size={14} /> Relevamiento aéreo</div>
                    <div style={{ fontSize: 14, color: 'var(--dark)' }}>{latestVisit.aerialSurvey}</div>
                  </div>
                )}
              </div>

              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 18, marginBottom: 16 }}>Plagas activas</div>
              {latestVisit.pests && latestVisit.pests.length > 0 ? (
                <div className="card table-wrap" style={{ marginBottom: 24 }}>
                  <table>
                    <thead><tr><th>Plaga</th><th>Incidencia</th><th>Nivel</th><th>Tratamiento recomendado</th></tr></thead>
                    <tbody>
                      {latestVisit.pests.map((p, i) => (
                        <tr key={i}>
                          <td style={{ fontWeight: 600 }}>{p.name}</td>
                          <td className="td-mono">{p.incidence}%</td>
                          <td>
                            <span className={`badge ${levelColors[p.level] || 'badge-success'}`}>
                              <span className={`severity-dot ${levelSev[p.level] || 'low'}`} />
                              {p.level.charAt(0).toUpperCase() + p.level.slice(1)}
                            </span>
                          </td>
                          <td style={{ color: 'var(--text-secondary)' }}>{p.treatment || '-'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div className="card" style={{ padding: 24, textAlign: 'center', color: 'var(--text-muted)', marginBottom: 24 }}>
                  No se registraron plagas en la última visita.
                </div>
              )}
            </>
          )}
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // FIELDS (Campos)
    // ══════════════════════════════════════════════════════════════════════════════
    const FieldsScreen = ({ onNav }) => {
      const [fields, setFields] = useState(DATA.fields);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ name: '', province: '', district: '', area: '' });
      const [errors, setErrors] = useState({});
      const [confirmDel, setConfirmDel] = useState(null);

      const openCreate = () => { setEditing(null); setForm({ name: '', province: '', district: '', area: '' }); setErrors({}); setModal(true); };
      const openEdit = (f) => { setEditing(f); setForm({ name: f.name, province: f.province, district: f.district, area: f.area }); setErrors({}); setModal(true); };

      const validate = () => {
        const e = {};
        if (!form.name) e.name = 'El nombre es obligatorio';
        if (!form.province) e.province = 'La provincia es obligatoria';
        if (!form.area) e.area = 'La superficie es obligatoria';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const save = () => {
        if (!validate()) return;
        if (editing) {
          setFields(fields.map(f => f.id === editing.id ? { ...f, ...form, area: Number(form.area) } : f));
        } else {
          setFields([...fields, { id: Date.now(), ...form, area: Number(form.area), lots: 0 }]);
        }
        setModal(false);
      };

      const del = (id) => { setFields(fields.filter(f => f.id !== id)); setConfirmDel(null); };

      return (
        <PageShell breadcrumbs={['Campos']} actions={<button className="btn btn-primary" onClick={openCreate}><Icon name="plus" size={14} color="#fff" /> Nuevo campo</button>}>
          <div className="page-header">
            <div><div className="page-title">Campos</div><div className="page-subtitle">{fields.length} campos registrados</div></div>
          </div>

          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Campo</th><th>Provincia</th><th>Partido</th><th>Superficie</th><th>Lotes</th><th>Acciones</th>
              </tr></thead>
              <tbody>
                {fields.map(f => (
                  <tr key={f.id}>
                    <td><span style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{f.name}</span></td>
                    <td>{f.province}</td>
                    <td>{f.district}</td>
                    <td className="td-mono">{fmt.area(f.area)}</td>
                    <td className="td-mono">{f.lots}</td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-ghost btn-icon btn-sm" title="Ver lotes" onClick={() => onNav('lots')}><Icon name="eye" size={14} /></button>
                        <button className="btn btn-ghost btn-icon btn-sm" title="Editar" onClick={() => openEdit(f)}><Icon name="edit" size={14} /></button>
                        <button className="btn btn-ghost btn-icon btn-sm" title="Eliminar" style={{ color: 'var(--critical)' }} onClick={() => setConfirmDel(f.id)}><Icon name="trash" size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <Modal open={modal} onClose={() => setModal(false)} title={editing ? 'Editar campo' : 'Nuevo campo'}
            footer={<><button className="btn btn-secondary" onClick={() => setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Guardar campo</button></>}>
            <div className="form-row form-row-2">
              <div className="form-group">
                <label className="form-label">Nombre del campo *</label>
                <input className={`form-input ${errors.name ? 'error' : ''}`} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ej. La Esperanza" />
                {errors.name && <span className="form-error">⚠ {errors.name}</span>}
              </div>
              <div className="form-group">
                <label className="form-label">Provincia *</label>
                <select className={`form-input form-select ${errors.province ? 'error' : ''}`} value={form.province} onChange={e => setForm({ ...form, province: e.target.value })}>
                  <option value="">Seleccionar...</option>
                  {['Buenos Aires', 'Córdoba', 'Santa Fe', 'Entre Ríos', 'La Pampa', 'Santiago del Estero', 'Tucumán', 'Salta'].map(p => <option key={p}>{p}</option>)}
                </select>
                {errors.province && <span className="form-error">⚠ {errors.province}</span>}
              </div>
            </div>
            <div className="form-row form-row-2">
              <div className="form-group">
                <label className="form-label">Partido / Departamento</label>
                <input className="form-input" value={form.district} onChange={e => setForm({ ...form, district: e.target.value })} placeholder="Ej. Pergamino" />
              </div>
              <div className="form-group">
                <label className="form-label">Superficie total (has) *</label>
                <input className={`form-input ${errors.area ? 'error' : ''}`} type="number" value={form.area} onChange={e => setForm({ ...form, area: e.target.value })} placeholder="Ej. 450" />
                {errors.area && <span className="form-error">⚠ {errors.area}</span>}
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Ubicación / Referencia</label>
              <input className="form-input" placeholder="Ej. Ruta 32 km 210, San Nicolás" />
              <span className="form-hint">Referencia geográfica opcional para localizar el campo</span>
            </div>
          </Modal>

          <ConfirmDialog open={!!confirmDel} onClose={() => setConfirmDel(null)} onConfirm={() => del(confirmDel)} title="Eliminar campo" message="¿Estás seguro que querés eliminar este campo? Esta acción no se puede deshacer." confirmLabel="Eliminar" danger />
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // GRID MAPPER
    // ══════════════════════════════════════════════════════════════════════════════
    const GRID_STATES = {
      'sin_datos': { label: 'Sin datos', color: '#E5E7EB', icon: '⬜' },
      'normal': { label: 'Normal', color: '#3D8B5E', icon: '🟢' },
      'stand_bajo': { label: 'Stand bajo', color: '#F5C842', icon: '🟡' },
      'manchon': { label: 'Manchón / Falla', color: '#E07B2A', icon: '🟠' },
      'critico': { label: 'Zona crítica', color: '#DC2626', icon: '🔴' }
    };

    const AFFECTATION_STATES = {
      'sin_datos': { label: 'Sin afectación', color: '#E5E7EB', icon: '⬜' },
      'bajo': { label: 'Afectación baja', color: '#3D8B5E', icon: '🟢' },
      'medio': { label: 'Afectación media', color: '#F5C842', icon: '🟡' },
      'alto': { label: 'Afectación alta', color: '#E07B2A', icon: '🟠' },
      'critico': { label: 'Afectación crítica', color: '#DC2626', icon: '🔴' }
    };

    const GridMapper = ({ gridConfig = '4x4', gridData = {}, onCellClick, readOnly = false, statesConfig = GRID_STATES }) => {
      const size = parseInt(gridConfig.split('x')[0]) || 4;
      const cols = Array.from({ length: size }, (_, i) => String.fromCharCode(65 + i)); // A, B, C, D
      const rows = Array.from({ length: size }, (_, i) => i + 1); // 1, 2, 3, 4

      return (
        <div style={{ width: '100%', maxWidth: 400, margin: '0 auto', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16, color: 'var(--text-secondary)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 4 }}>
            <Icon name="marker" size={14} /> N
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: `repeat(${size}, 1fr)`,
            gap: 8,
            width: '100%',
            aspectRatio: '1/1'
          }}>
            {rows.map(r => cols.map(c => {
              const coord = `${c}${r}`;
              const stateKey = gridData[coord] || 'sin_datos';
              const stateInfo = statesConfig[stateKey] || statesConfig['sin_datos'];
              return (
                <div
                  key={coord}
                  onClick={() => !readOnly && onCellClick && onCellClick(coord)}
                  style={{
                    background: stateInfo.color,
                    borderRadius: 'var(--radius-md)',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    cursor: readOnly ? 'default' : 'pointer',
                    boxShadow: 'var(--shadow-sm)',
                    transition: 'transform 0.1s, opacity 0.1s',
                    opacity: stateKey === 'sin_datos' && !readOnly ? 0.7 : 1,
                    minHeight: 60,
                    color: stateKey === 'sin_datos' ? 'var(--text-secondary)' : '#fff',
                    userSelect: 'none'
                  }}
                  onMouseDown={e => { if (!readOnly) e.currentTarget.style.transform = 'scale(0.95)'; }}
                  onMouseUp={e => { if (!readOnly) e.currentTarget.style.transform = 'scale(1)'; }}
                  onMouseLeave={e => { if (!readOnly) e.currentTarget.style.transform = 'scale(1)'; }}
                >
                  <div style={{ fontSize: 20, marginBottom: 4, lineHeight: 1 }}>{stateInfo.icon}</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 700, textShadow: stateKey !== 'sin_datos' ? '0 1px 2px rgba(0,0,0,0.4)' : 'none' }}>{coord}</div>
                </div>
              );
            }))}
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // LOTS
    // ══════════════════════════════════════════════════════════════════════════════
    const LotsScreen = ({ onNav, editLot = null }) => {
      const [selectedFieldId, setSelectedFieldId] = useState(editLot ? editLot.fieldId : 1);
      const selectedField = DATA.fields.find(f => f.id === selectedFieldId) || DATA.fields[0];
      const [allLots, setAllLots] = useState(DATA.lots);
      const lots = allLots.filter(l => l.fieldId === selectedFieldId);
      const [editing, setEditing] = useState(editLot || null);
      const [form, setForm] = useState(editLot ? { name: editLot.name, area: editLot.area, crop: editLot.crop, gridConfig: editLot.gridConfig || '4x4' } : { name: '', area: '', crop: '', gridConfig: '4x4' });
      const [errors, setErrors] = useState({});
      const [confirmDel, setConfirmDel] = useState(null);
      const [view, setView] = useState(editLot ? 'edit' : 'list');
      const [prevView, setPrevView] = useState('list');
      const [selected, setSelected] = useState(null);

      const crops = ['Soja', 'Maíz', 'Trigo', 'Girasol', 'Sorgo', 'Cebada'];
      const openCreate = () => { setPrevView(view); setEditing(null); setForm({ name: '', area: '', crop: '', gridConfig: '4x4' }); setErrors({}); setView('create'); };
      const openEdit = (l) => { setPrevView(view); setEditing(l); setForm({ name: l.name, area: l.area, crop: l.crop, gridConfig: l.gridConfig || '4x4' }); setErrors({}); setView('edit'); };

      const validate = () => {
        const e = {};
        if (!form.name) e.name = 'El nombre es obligatorio';
        if (!form.area) e.area = 'La superficie es obligatoria';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const save = () => {
        if (!validate()) return;
        const updatedLot = editing ? { ...editing, ...form, area: Number(form.area) } : null;
        if (editing) {
          setAllLots(allLots.map(l => l.id === editing.id ? { ...l, ...form, area: Number(form.area) } : l));
        } else {
          setAllLots([...allLots, { id: Date.now(), fieldId: selectedFieldId, fieldName: selectedField.name, ...form, area: Number(form.area) }]);
        }
        if (editLot) {
          onNav('lot_detail', updatedLot || editLot);
        } else if (prevView === 'detail' && updatedLot) {
          setSelected(updatedLot);
          setEditing(null);
          setView('detail');
        } else {
          setEditing(null);
          setView('list');
        }
      };

      const totalArea = lots.reduce((s, l) => s + l.area, 0);

      if (view === 'create' || view === 'edit') {
        const gridN = parseInt(form.gridConfig.split('x')[0]);
        const totalSectors = gridN * gridN;
        const goBack = editLot
          ? () => onNav('lot_detail', editing || editLot)
          : prevView === 'detail'
            ? () => { setView('detail'); setErrors({}); }
            : () => { setView('list'); setEditing(null); setErrors({}); };
        return (
          <PageShell breadcrumbs={['Campos', selectedField.name, 'Lotes', editing ? editing.name : 'Nuevo lote']}>
            <div className="page-header" style={{ marginBottom: 20 }}>
              <div>
                <button className="btn btn-ghost btn-sm" onClick={goBack} style={{ paddingLeft: 0, marginBottom: 8 }}><Icon name="back" size={14} /> Volver</button>
                <div className="page-title">{editing ? `Editar lote: ${editing.name}` : 'Nuevo lote'}</div>
                <div className="page-subtitle">{selectedField.name}</div>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start', marginBottom: 80 }}>

              {/* Columna izquierda */}
              <div>
                <div className="card" style={{ marginBottom: 16 }}>
                  <div className="card-header"><div className="card-title">Datos del lote</div></div>
                  <div className="card-body">
                    <div className="form-row form-row-2">
                      <div className="form-group">
                        <label className="form-label">Nombre del lote *</label>
                        <input className={`form-input ${errors.name ? 'error' : ''}`} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ej. Lote Norte" />
                        {errors.name && <span className="form-error">⚠ {errors.name}</span>}
                      </div>
                      <div className="form-group">
                        <label className="form-label">Superficie (has) *</label>
                        <input className={`form-input ${errors.area ? 'error' : ''}`} type="number" value={form.area} onChange={e => setForm({ ...form, area: e.target.value })} placeholder="Ej. 120" />
                        {errors.area && <span className="form-error">⚠ {errors.area}</span>}
                      </div>
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">Cultivo actual</label>
                      <select className="form-input form-select" value={form.crop} onChange={e => setForm({ ...form, crop: e.target.value })}>
                        <option value="">Sin cultivo asignado</option>
                        {crops.map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="card-header"><div className="card-title">Configuración de grilla</div></div>
                  <div className="card-body">
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">Tamaño de grilla</label>
                      <select className="form-input form-select" value={form.gridConfig} onChange={e => setForm({ ...form, gridConfig: e.target.value })}>
                        <option value="2x2">2×2 (4 sectores)</option>
                        <option value="3x3">3×3 (9 sectores)</option>
                        <option value="4x4">4×4 (16 sectores)</option>
                        <option value="5x5">5×5 (25 sectores)</option>
                      </select>
                      <span className="form-hint">Define la resolución del relevamiento espacial para este lote.</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Columna derecha — preview sticky */}
              <div style={{ position: 'sticky', top: 24 }}>
                <div className="card">
                  <div className="card-header">
                    <div className="card-title">Previsualización del lote</div>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 700, color: 'var(--text-secondary)', background: '#F0F5F2', padding: '3px 8px', borderRadius: 4 }}>■ N</span>
                  </div>
                  <div className="card-body">
                    <div style={{ fontSize: 12, color: 'var(--text-secondary)', textAlign: 'center', marginBottom: 16 }}>
                      Grilla {form.gridConfig} · <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, color: 'var(--dark)' }}>{totalSectors}</span> sectores
                    </div>
                    <GridMapper gridConfig={form.gridConfig} readOnly />
                  </div>
                </div>
              </div>
            </div>

            {/* Footer sticky */}
            <div style={{ position: 'sticky', bottom: 0, background: '#fff', borderTop: '1px solid var(--border)', margin: '0 -32px', padding: '14px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', zIndex: 10, boxShadow: '0 -2px 8px rgba(0,0,0,0.06)' }}>
              <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, color: 'var(--dark)' }}>{totalSectors}</span> sectores configurados · Grilla {form.gridConfig}
              </span>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-secondary" onClick={goBack}>Cancelar</button>
                <button className="btn btn-primary" onClick={save}>Guardar lote</button>
              </div>
            </div>
          </PageShell>
        );
      }

      if (view === 'detail' && selected) {
        return <LotDetailScreen lot={selected} onBack={() => setView('list')} onNav={onNav} onEdit={openEdit} />;
      }

      return (
        <PageShell breadcrumbs={['Campos', selectedField.name, 'Lotes']} actions={<button className="btn btn-primary" onClick={openCreate}><Icon name="plus" size={14} color="#fff" /> Nuevo lote</button>}>
          <div className="page-header">
            <div>
              <div className="page-title">Lotes</div>
              <div className="page-subtitle">{lots.length} lotes registrados · {totalArea} has totales</div>
            </div>
          </div>

          {/* Field selector */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20, flexWrap: 'wrap', background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', boxShadow: 'var(--shadow-sm)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campo</label>
              <select className="form-input form-select" style={{ width: 220 }} value={selectedFieldId} onChange={e => setSelectedFieldId(Number(e.target.value))}>
                {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name} — {f.province} ({f.area} has)</option>)}
              </select>
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 6 }}>
              <span>📍 {selectedField.province} · {selectedField.district}</span>
              <span style={{ color: 'var(--border)' }}>·</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{selectedField.area} has totales</span>
            </div>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Lote</th><th>Superficie</th><th>Cultivo actual</th><th>Acciones</th></tr></thead>
              <tbody>
                {lots.map(l => (
                  <tr key={l.id}>
                    <td><span style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{l.name}</span></td>
                    <td className="td-mono">{fmt.area(l.area)}</td>
                    <td><span className="badge badge-info">{stageIcons[DATA.campaigns.find(c => c.lotId === l.id)?.phenoStage || ''] || ''} {l.crop}</span></td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-ghost btn-icon btn-sm" onClick={() => { setSelected(l); setView('detail'); }}><Icon name="eye" size={14} /></button>
                        <button className="btn btn-ghost btn-icon btn-sm" onClick={() => openEdit(l)}><Icon name="edit" size={14} /></button>
                        <button className="btn btn-ghost btn-icon btn-sm" style={{ color: 'var(--critical)' }} onClick={() => setConfirmDel(l.id)}><Icon name="trash" size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <ConfirmDialog open={!!confirmDel} onClose={() => setConfirmDel(null)} onConfirm={() => { setAllLots(allLots.filter(l => l.id !== confirmDel)); setConfirmDel(null); }} title="Eliminar lote" message="¿Querés eliminar este lote? Se perderán todas las campañas y visitas asociadas." confirmLabel="Eliminar" danger />
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // CAMPAIGNS
    // ══════════════════════════════════════════════════════════════════════════════
    const CampaignsScreen = ({ onNav }) => {
      const [selectedFieldId, setSelectedFieldId] = useState(1);
      const [selectedLotId, setSelectedLotId] = useState(1);
      const selectedField = DATA.fields.find(f => f.id === selectedFieldId) || DATA.fields[0];
      const fieldLots = DATA.lots.filter(l => l.fieldId === selectedFieldId);
      const selectedLot = fieldLots.find(l => l.id === selectedLotId) || fieldLots[0];
      const [allCampaigns, setAllCampaigns] = useState(DATA.campaigns);
      const campaigns = allCampaigns.filter(c => c.lotId === (selectedLot?.id || 1));
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);

      const defaultExpected = { 'Germinación': '', 'Macollaje': '', 'Floración': '', 'Fructificación': '', 'Madurez': '' };
      const [form, setForm] = useState({ crop: '', startDate: '', phenoStage: 'Germinación', status: 'activa', expectedDates: defaultExpected });
      const [errors, setErrors] = useState({});
      const crops = ['Soja', 'Maíz', 'Trigo', 'Girasol', 'Sorgo', 'Cebada'];
      const stages = ['Germinación', 'Macollaje', 'Floración', 'Fructificación', 'Madurez'];

      const openCreate = () => { setEditing(null); setForm({ crop: '', startDate: '', phenoStage: 'Germinación', status: 'activa', expectedDates: { ...defaultExpected } }); setErrors({}); setModal(true); };
      const openEdit = (c, e) => { e.stopPropagation(); setEditing(c); setForm({ crop: c.crop, startDate: c.startDate, phenoStage: c.phenoStage, status: c.status, expectedDates: { ...defaultExpected, ...(c.expectedDates || {}) } }); setErrors({}); setModal(true); };

      const validate = () => {
        const e = {};
        if (!form.crop) e.crop = 'Seleccioná un cultivo';
        if (!form.startDate) e.startDate = 'La fecha de inicio es obligatoria';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const save = () => {
        if (!validate()) return;
        if (editing) setAllCampaigns(allCampaigns.map(c => c.id === editing.id ? { ...c, ...form } : c));
        else setAllCampaigns([...allCampaigns, { id: Date.now(), lotId: selectedLot?.id || 1, ...form }]);
        setModal(false);
      };

      const handleFieldChange = (fid) => {
        setSelectedFieldId(fid);
        const firstLot = DATA.lots.find(l => l.fieldId === fid);
        if (firstLot) setSelectedLotId(firstLot.id);
      };

      return (
        <PageShell
          breadcrumbs={['Campos', selectedField?.name || '—', selectedLot?.name || '—', 'Campañas']}
          actions={<button className="btn btn-primary" onClick={openCreate}><Icon name="plus" size={14} color="#fff" /> Nueva campaña</button>}>
          <div className="page-header">
            <div>
              <div className="page-title">Campañas</div>
              <div className="page-subtitle">{selectedLot?.name} · {selectedLot?.crop} · {selectedLot?.area} has</div>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center', background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', boxShadow: 'var(--shadow-sm)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campo</label>
              <select className="form-input form-select" style={{ width: 210 }} value={selectedFieldId} onChange={e => handleFieldChange(Number(e.target.value))}>
                {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name} — {f.province}</option>)}
              </select>
            </div>
            <div style={{ color: 'var(--border)', fontSize: 18, fontWeight: 300 }}>›</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Lote</label>
              <select className="form-input form-select" style={{ width: 210 }} value={selectedLotId} onChange={e => setSelectedLotId(Number(e.target.value))}>
                {fieldLots.map(l => <option key={l.id} value={l.id}>{l.name} — {l.crop} ({l.area} has)</option>)}
              </select>
            </div>
            {selectedLot && <div style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text-secondary)' }}>📍 {selectedField?.province} · {selectedField?.district}</div>}
          </div>

          <div className="table-wrap">
            <table>
              <thead><tr><th>Cultivo</th><th>Fecha inicio</th><th>Etapa fenológica esperada</th><th>Estado</th><th>Acciones</th></tr></thead>
              <tbody>
                {campaigns.map(c => (
                  <tr key={c.id} style={{ cursor: 'pointer' }} onClick={() => onNav('campaign_detail', c)}>
                    <td><span style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{c.crop}</span></td>
                    <td className="td-mono">{fmt.date(c.startDate)}</td>
                    <td>{stageIcons[c.phenoStage]} {c.phenoStage}</td>
                    <td><span className={`badge ${c.status === 'activa' ? 'badge-success' : 'badge-closed'}`}>{c.status === 'activa' ? '✓ Activa' : '✗ Cerrada'}</span></td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-ghost btn-icon btn-sm" onClick={(e) => openEdit(c, e)}><Icon name="edit" size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <Modal open={modal} onClose={() => setModal(false)} title={editing ? 'Editar campaña' : 'Nueva campaña'}
            footer={<><button className="btn btn-secondary" onClick={() => setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Guardar campaña</button></>}>
            <div className="form-row form-row-2">
              <div className="form-group">
                <label className="form-label">Cultivo *</label>
                <select className={`form-input form-select ${errors.crop ? 'error' : ''}`} value={form.crop} onChange={e => setForm({ ...form, crop: e.target.value })}>
                  <option value="">Seleccionar...</option>
                  {crops.map(c => <option key={c}>{c}</option>)}
                </select>
                {errors.crop && <span className="form-error">⚠ {errors.crop}</span>}
              </div>
              <div className="form-group">
                <label className="form-label">Fecha de inicio *</label>
                <input type="date" className={`form-input ${errors.startDate ? 'error' : ''}`} value={form.startDate} onChange={e => setForm({ ...form, startDate: e.target.value })} />
                {errors.startDate && <span className="form-error">⚠ {errors.startDate}</span>}
              </div>
            </div>
            <div className="form-row form-row-2">
              <div className="form-group">
                <label className="form-label">Etapa fenológica inicial/esperada</label>
                <select className="form-input form-select" value={form.phenoStage} onChange={e => setForm({ ...form, phenoStage: e.target.value })}>
                  {stages.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Estado</label>
                <StatusToggle value={form.status} onChange={v => setForm({ ...form, status: v })} />
              </div>
            </div>

            <div className="form-group" style={{ marginTop: 20, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
              <label className="form-label">Fechas fenológicas esperadas (Opcional)</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12, marginTop: 12 }}>
                {stages.map(s => (
                  <div key={s} style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, fontFamily: 'var(--font-head)' }}>{stageIcons[s]} {s}</span>
                    <input type="date" className="form-input" value={form.expectedDates[s]} onChange={e => setForm({ ...form, expectedDates: { ...form.expectedDates, [s]: e.target.value } })} />
                  </div>
                ))}
              </div>
            </div>
          </Modal>
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // CAMPAIGN DETAIL
    // ══════════════════════════════════════════════════════════════════════════════
    const CampaignDetailScreen = ({ campaign: initialCampaign, onNav }) => {
      if (!initialCampaign) return null;

      const [localCampaign, setLocalCampaign] = useState(initialCampaign);
      const [isEditing, setIsEditing] = useState(false);
      const [editForm, setEditForm] = useState({});

      const lot = DATA.lots.find(l => l.id === localCampaign.lotId);
      const field = DATA.fields.find(f => f.id === lot?.fieldId);

      const stages = ['Germinación', 'Macollaje', 'Floración', 'Fructificación', 'Madurez'];
      const crops = ['Soja', 'Maíz', 'Trigo', 'Girasol', 'Sorgo', 'Cebada'];
      const defaultExpected = { 'Germinación': '', 'Macollaje': '', 'Floración': '', 'Fructificación': '', 'Madurez': '' };
      const currentStageIndex = stages.indexOf(localCampaign.phenoStage);

      const campaignVisits = DATA.visits.filter(v => v.campaignId === localCampaign.id).sort((a, b) => new Date(b.date) - new Date(a.date));
      const campaignAlerts = DATA.alerts.filter(a => a.lotId === localCampaign.lotId && !a.resolved);
      const campaignOrders = DATA.orders.filter(o => o.lotId === localCampaign.lotId && o.visitId && campaignVisits.some(v => v.id === o.visitId)).sort((a, b) => new Date(b.date) - new Date(a.date));

      const simulationDate = new Date('2025-05-15');
      let phenoStatus = 'A término';
      let phenoStatusColor = 'var(--success)';
      if (localCampaign.expectedDates && localCampaign.expectedDates[localCampaign.phenoStage]) {
        const expDate = new Date(localCampaign.expectedDates[localCampaign.phenoStage]);
        const actualVisit = campaignVisits.find(v => v.phenoStage === localCampaign.phenoStage);
        const dateToCompare = actualVisit ? new Date(actualVisit.date) : simulationDate;
        const diffDays = Math.round((dateToCompare - expDate) / (1000 * 60 * 60 * 24));
        if (diffDays > 10) { phenoStatus = 'Crítico'; phenoStatusColor = 'var(--critical)'; }
        else if (diffDays > 3) { phenoStatus = 'Con retraso'; phenoStatusColor = 'var(--warning)'; }
      }

      const startEdit = () => {
        setEditForm({ crop: localCampaign.crop, startDate: localCampaign.startDate, phenoStage: localCampaign.phenoStage, status: localCampaign.status, expectedDates: { ...defaultExpected, ...(localCampaign.expectedDates || {}) } });
        setIsEditing(true);
      };
      const cancelEdit = () => setIsEditing(false);
      const saveEdit = () => { setLocalCampaign({ ...localCampaign, ...editForm }); setIsEditing(false); };

      return (
        <PageShell
          breadcrumbs={['Campañas', `${localCampaign.crop} ${fmt.date(localCampaign.startDate).split('/')[2]}`]}
          actions={
            isEditing ? (
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-secondary" onClick={cancelEdit}>Cancelar</button>
                <button className="btn btn-primary" style={{ background: 'var(--success)', borderColor: 'var(--success)' }} onClick={saveEdit}>Guardar cambios</button>
              </div>
            ) : (
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button className="btn btn-secondary" onClick={startEdit}><Icon name="edit" size={14} /> Editar</button>
                <button className="btn btn-secondary" onClick={() => onNav('history_pheno')}><Icon name="history" size={14} /> Análisis fenológico</button>
                <button className="btn btn-secondary" onClick={() => onNav('history_sanitary')}><Icon name="pest" size={14} /> Evolución sanitaria</button>
                <button className="btn btn-primary" onClick={() => onNav('visits')}><Icon name="visit" size={14} color="#fff" /> Registrar visita</button>
              </div>
            )
          }>

          {/* ── Tarjeta principal ── */}
          <div className="card" style={{ marginBottom: 20, transition: 'box-shadow 0.15s', boxShadow: isEditing ? '0 0 0 2px var(--accent)' : undefined }}>
            <div className="card-body" style={{ padding: 24 }}>
              {isEditing ? (
                <div>
                  <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 11, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 16 }}>✏️ Modo edición</div>
                  <div className="form-row form-row-2">
                    <div className="form-group">
                      <label className="form-label">Cultivo</label>
                      <select className="form-input form-select" value={editForm.crop} onChange={e => setEditForm({ ...editForm, crop: e.target.value })}>
                        {crops.map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>
                    <div className="form-group">
                      <label className="form-label">Fecha de inicio</label>
                      <input type="date" className="form-input" value={editForm.startDate} onChange={e => setEditForm({ ...editForm, startDate: e.target.value })} />
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">Etapa fenológica actual</label>
                      <select className="form-input form-select" value={editForm.phenoStage} onChange={e => setEditForm({ ...editForm, phenoStage: e.target.value })}>
                        {stages.map(s => <option key={s} value={s}>{stageIcons[s]} {s}</option>)}
                      </select>
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">Estado</label>
                      <div style={{ paddingTop: 6 }}><StatusToggle value={editForm.status} onChange={v => setEditForm({ ...editForm, status: v })} /></div>
                    </div>
                  </div>
                </div>
              ) : (
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 20 }}>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
                      <span style={{ fontSize: 24 }}>{stageIcons[localCampaign.phenoStage]}</span>

              <div className="stat-value" style={{ fontSize: 18 }}>{localCampaign.phenoStage}</div>
              <div style={{ fontSize: 13, color: phenoStatusColor, fontWeight: 600, marginTop: 4 }}>{phenoStatus}</div>

                <div className="card-title">🔍 Últimas visitas</div>
                <button className="btn btn-ghost btn-sm" onClick={() => onNav('visits')}>Ver todas</button>
              </div>
              <div className="card-body">
                {campaignVisits.length === 0 ? (

                  <div style={{ display: 'flex', flexDirection: 'column' }}>
                    {campaignOrders.slice(0, 3).map((o, i) => (
                      <div key={o.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 20px', borderBottom: i < 2 ? '1px solid var(--border)' : 'none' }}>
                        <div>
                          <div className="td-mono" style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{fmt.date(o.date)}</div>
                          <div style={{ fontWeight: 600, fontFamily: 'var(--font-head)', fontSize: 13, marginTop: 4, color: 'var(--accent)' }}>{o.products.map(p => p.name).join(' + ')}</div>
