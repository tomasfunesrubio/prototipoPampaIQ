    // ══════════════════════════════════════════════════════════════════════════════
    // VISITS
    // ══════════════════════════════════════════════════════════════════════════════
    const VisitsScreen = ({ onNav }) => {
      const [view, setView] = useState('list'); // list | create | detail
      const [visits, setVisits] = useState(DATA.visits);
      const [selectedVisit, setSelectedVisit] = useState(null);
      const [createStep, setCreateStep] = useState(0);
      const [visitForm, setVisitForm] = useState({
        date: '', fieldId: '', lotId: '', campaignId: '',
        phenoStage: '', phenoObs: '',
        plantStand: '', cropHeight: '', soilCover: 0, uniformity: 'Uniforme', waterStress: 'Sin estres', aerialSurvey: '',
        pests: [], gridData: {}, mapObservations: ''
      });
      const [errors, setErrors] = useState({});

      const sevAccent = { bajo: '#2E7D52', medio: '#92730A', alto: 'var(--critical)', critico: '#DC2626' };
      const [editingVisit, setEditingVisit] = useState(null);

      const openEditVisit = (v) => {
        const lot = DATA.lots.find(l => l.id === v.lotId);
        setVisitForm({
          date: v.date, fieldId: String(lot?.fieldId || ''), lotId: String(v.lotId || ''), campaignId: String(v.campaignId || ''),
          phenoStage: v.phenoStage || '', phenoObs: v.phenoObs || '',
          plantStand: v.plantStand || '', cropHeight: v.cropHeight || '', soilCover: v.soilCover || 0,
          uniformity: v.uniformity || 'Uniforme', waterStress: v.waterStress || 'Sin estres', aerialSurvey: v.aerialSurvey || '',
          pests: v.pests ? v.pests.map(p => ({ ...p })) : [], gridData: { ...(v.gridData || {}) }, mapObservations: v.mapObservations || ''
        });
        setEditingVisit(v);
        setCreateStep(0);
        setErrors({});
        setView('create');
      };

      if (view === 'detail' && selectedVisit) {
        return <VisitDetailScreen visit={selectedVisit} onBack={() => setView('list')} onNewOrder={() => onNav('orders')} onEdit={openEditVisit} />;
      }

      if (view === 'create') {
        return <VisitCreateScreen
          step={createStep} setStep={setCreateStep}
          form={visitForm} setForm={setVisitForm}
          errors={errors} setErrors={setErrors}
          isEdit={!!editingVisit}
          onCancel={() => { setEditingVisit(null); setView(editingVisit ? 'detail' : 'list'); setCreateStep(0); }}
          onSave={(savedVisit) => {
            if (editingVisit) {
              setVisits(visits.map(v => v.id === editingVisit.id ? { ...v, ...savedVisit, severity: savedVisit.pests[0]?.level || v.severity } : v));
              setSelectedVisit(prev => prev?.id === editingVisit.id ? { ...prev, ...savedVisit, severity: savedVisit.pests[0]?.level || prev.severity } : prev);
            } else {
              setVisits([{ id: Date.now(), ...savedVisit, advisor: 'Ing. Agr. Carlos Mendez', severity: savedVisit.pests[0]?.level || 'bajo', orderId: null }, ...visits]);
            }
            setEditingVisit(null); setView('list'); setCreateStep(0);
          }}
        />;
      }

      return <VisitsListView
        visits={visits}
        sevAccent={sevAccent}
        onCreateVisit={() => setView('create')}
        onSelectVisit={(v) => { setSelectedVisit(v); setView('detail'); }}
      />;
    };

    const VisitsListView = ({ visits, sevAccent, onCreateVisit, onSelectVisit }) => {
      const [search, setSearch] = useState('');
      const [filterField, setFilterField] = useState('');
      const [filterStage, setFilterStage] = useState('');
      const [filterSeverity, setFilterSeverity] = useState('');

      const uniqueFields = [...new Set(visits.map(v => v.fieldName).filter(Boolean))].sort();
      const uniqueStages = [...new Set(visits.map(v => v.phenoStage).filter(Boolean))].sort();
      const severityOptions = [
        { value: 'bajo', label: 'Bajo' },
        { value: 'medio', label: 'Medio' },
        { value: 'alto', label: 'Alto' },
        { value: 'critico', label: 'Critico' },
      ];

      const hasFilters = search || filterField || filterStage || filterSeverity;

      const clearFilters = () => {
        setSearch('');
        setFilterField('');
        setFilterStage('');
        setFilterSeverity('');
      };

      const filteredVisits = visits.filter(v => {
        if (filterField && v.fieldName !== filterField) return false;
        if (filterStage && v.phenoStage !== filterStage) return false;
        if (filterSeverity && v.severity !== filterSeverity) return false;
        if (search) {
          const q = search.toLowerCase();
          const inLot = (v.lotName || '').toLowerCase().includes(q);
          const inField = (v.fieldName || '').toLowerCase().includes(q);
          const inAdvisor = (v.advisor || '').toLowerCase().includes(q);
          const inPests = (v.pests || []).some(p => (p.name || '').toLowerCase().includes(q));
          if (!inLot && !inField && !inAdvisor && !inPests) return false;
        }
        return true;
      });

      return (
        <PageShell breadcrumbs={['Campos', 'La Esperanza', 'Lote Norte', 'Soja 2024/2025', 'Visitas']}
          actions={<button className="btn btn-primary" onClick={onCreateVisit}><Icon name="plus" size={14} color="#fff" /> Nueva visita</button>}>

          <div className="page-header">
            <div>
              <div className="page-title">Visitas</div>
              <div className="page-subtitle">
                {hasFilters
                  ? filteredVisits.length + ' de ' + visits.length + ' visitas'
                  : visits.length + ' visitas registradas'
                }
              </div>
            </div>
          </div>

          {/* Search & Filter Bar */}
          <div style={{
            background: '#fff',
            border: '1px solid var(--border)',
            borderRadius: 'var(--radius-lg)',
            padding: '14px 16px',
            marginBottom: 20,
            boxShadow: 'var(--shadow-sm)',
            display: 'flex',
            flexWrap: 'wrap',
            gap: 10,
            alignItems: 'center',
          }}>
            <div style={{ position: 'relative', flex: '1 1 220px', minWidth: 0 }}>
              <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none', color: 'var(--text-muted)', fontSize: 14 }}>🔍</span>
              <input
                id="visits-search-input"
                type="text"
                className="form-input"
                placeholder="Buscar por lote, campo, asesor o plaga..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{ paddingLeft: 32, height: 36, fontSize: 13 }}
              />
            </div>

            <select
              id="visits-filter-field"
              className="form-input form-select"
              value={filterField}
              onChange={e => setFilterField(e.target.value)}
              style={{ flex: '0 1 180px', height: 36, fontSize: 13 }}
            >
              <option value="">Todos los campos</option>
              {uniqueFields.map(f => <option key={f} value={f}>{f}</option>)}
            </select>

            <select
              id="visits-filter-stage"
              className="form-input form-select"
              value={filterStage}
              onChange={e => setFilterStage(e.target.value)}
              style={{ flex: '0 1 190px', height: 36, fontSize: 13 }}
            >
              <option value="">Todas las etapas</option>
              {uniqueStages.map(s => <option key={s} value={s}>{s}</option>)}
            </select>

            <select
              id="visits-filter-severity"
              className="form-input form-select"
              value={filterSeverity}
              onChange={e => setFilterSeverity(e.target.value)}
              style={{ flex: '0 1 160px', height: 36, fontSize: 13 }}
            >
              <option value="">Toda severidad</option>
              {severityOptions.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
            </select>

            {hasFilters && (
              <button
                id="visits-clear-filters"
                className="btn btn-ghost btn-sm"
                onClick={clearFilters}
                style={{ height: 36, whiteSpace: 'nowrap', color: 'var(--text-secondary)', fontSize: 13 }}
              >
                ✕ Limpiar
              </button>
            )}
          </div>

          {/* Results */}
          {filteredVisits.length === 0 ? (
            <div style={{
              textAlign: 'center',
              padding: '60px 24px',
              background: '#fff',
              borderRadius: 'var(--radius-lg)',
              border: '1px solid var(--border)',
              boxShadow: 'var(--shadow-sm)',
            }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 17, marginBottom: 6, color: 'var(--dark)' }}>Sin resultados</div>
              <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20 }}>
                No hay visitas que coincidan con la busqueda o filtros aplicados.
              </div>
              <button className="btn btn-secondary btn-sm" onClick={clearFilters}>Limpiar filtros</button>
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))', gap: 14 }}>
              {filteredVisits.map(v => (
                <div key={v.id} className="visit-card" onClick={() => onSelectVisit(v)}>
                  <div className="visit-card-accent" style={{ background: sevAccent[v.severity] || 'var(--accent)' }} />
                  <div className="visit-card-body">
                    <div className="visit-card-header">
                      <div>
                        <div className="visit-title">{v.lotName} — {v.fieldName}</div>
                        <div className="visit-meta">{v.advisor}</div>
                      </div>
                      <span className="visit-date">{fmt.date(v.date)}</span>
                    </div>
                    <div style={{ display: 'flex', gap: 12, marginBottom: 10, fontSize: 13 }}>
                      <span>{stageIcons[v.phenoStage]} {v.phenoStage}</span>
                    </div>
                    {v.pests.length > 0 ? (
                      <div>
                        <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>
                          {v.pests.length} plaga{v.pests.length > 1 ? 's' : ''} detectada{v.pests.length > 1 ? 's' : ''}
                        </div>
                        <div className="visit-tags">
                          {v.pests.map((p, i) => (
                            <span key={i} className={`badge ${levelColors[p.level]}`}>
                              <span className={`severity-dot ${levelSev[p.level]}`} />
                              {p.name}
                            </span>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <span className="badge badge-success">✓ Sin plagas detectadas</span>
                    )}
                    {v.pests.length > 0 && (
                      <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid var(--border)', fontSize: 12, color: 'var(--text-secondary)' }}>
                        💊 {v.pests[0]?.treatment}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </PageShell>
      );
    };

    // ── Visit Create (3 steps) ────────────────────────────────────────────────────
    const VisitCreateScreen = ({ step, setStep, form, setForm, errors, setErrors, onCancel, onSave, isEdit = false }) => {
      const [activeBrush, setActiveBrush] = useState('bajo');
      const steps = ['Datos generales', 'Estado fenológico', 'Plagas y enfermedades', 'Confirmación'];
      const stages = ['Germinación', 'Macollaje', 'Floración', 'Fructificación', 'Madurez'];
      const stageDescs = { 'Germinación': 'Emergencia y establecimiento', 'Macollaje': 'Crecimiento vegetativo', 'Floración': 'Apertura floral', 'Fructificación': 'Formación de granos', 'Madurez': 'Madurez fisiológica' };

      const validateStep = () => {
        const e = {};
        if (step === 0) {
          if (!form.date) e.date = 'La fecha es obligatoria';
          if (!form.fieldId) e.fieldId = 'Seleccioná un campo';
          if (!form.lotId) e.lotId = 'Seleccioná un lote';
        }
        if (step === 1) {
          if (!form.phenoStage) e.phenoStage = 'Seleccioná la etapa fenológica';
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const next = () => { if (validateStep()) setStep(step + 1); };
      const prev = () => setStep(step - 1);

      const addPest = () => setForm({ ...form, pests: [...form.pests, { id: Date.now(), pestId: '', name: '', incidence: '', level: 'bajo', treatment: '' }] });
      const updatePest = (idx, p) => setForm({ ...form, pests: form.pests.map((pp, i) => i === idx ? p : pp) });
      const removePest = (idx) => setForm({ ...form, pests: form.pests.filter((_, i) => i !== idx) });

      return (
        <PageShell breadcrumbs={['Visitas', isEdit ? 'Editar visita' : 'Nueva visita']}>
          <div className="page-header">
            <div><div className="page-title">{isEdit ? 'Editar visita' : 'Nueva visita'}</div></div>
            <button className="btn btn-secondary btn-sm" onClick={onCancel}>Cancelar</button>
          </div>

          <div style={{ maxWidth: 720 }}>
            <ProgressSteps steps={steps} current={step} />

            <div className="card" style={{ marginBottom: 20 }}>
              <div className="card-body">
                {step === 0 && (
                  <>
                    <div className="form-row form-row-2">
                      <div className="form-group">
                        <label className="form-label">Fecha de visita *</label>
                        <input type="date" className={`form-input ${errors.date ? 'error' : ''}`} value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
                        {errors.date && <span className="form-error">⚠ {errors.date}</span>}
                      </div>
                      <div className="form-group">
                        <label className="form-label">Campo *</label>
                        <select className={`form-input form-select ${errors.fieldId ? 'error' : ''}`} value={form.fieldId} onChange={e => setForm({ ...form, fieldId: e.target.value, lotId: '', campaignId: '' })}>
                          <option value="">Seleccionar campo...</option>
                          {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                        </select>
                        {errors.fieldId && <span className="form-error">⚠ {errors.fieldId}</span>}
                      </div>
                    </div>
                    <div className="form-row form-row-2">
                      <div className="form-group">
                        <label className="form-label">Lote *</label>
                        <select className={`form-input form-select ${errors.lotId ? 'error' : ''}`} value={form.lotId} onChange={e => setForm({ ...form, lotId: e.target.value })}>
                          <option value="">Seleccionar lote...</option>
                          {DATA.lots.filter(l => !form.fieldId || l.fieldId === Number(form.fieldId)).map(l => <option key={l.id} value={l.id}>{l.name} ({l.crop})</option>)}
                        </select>
                        {errors.lotId && <span className="form-error">⚠ {errors.lotId}</span>}
                      </div>
                      <div className="form-group">
                        <label className="form-label">Campaña</label>
                        <select className="form-input form-select" value={form.campaignId} onChange={e => setForm({ ...form, campaignId: e.target.value })}>
                          <option value="">Seleccionar campaña...</option>
                          {DATA.campaigns.map(c => <option key={c.id} value={c.id}>{c.crop} — desde {fmt.date(c.startDate)}</option>)}
                        </select>
                      </div>
                    </div>
                  </>
                )}

                {step === 1 && (
                  <>
                    <div className="form-group">
                      <label className="form-label">Etapa fenológica observada *</label>
                      {errors.phenoStage && <span className="form-error" style={{ marginBottom: 6 }}>⚠ {errors.phenoStage}</span>}
                      <div className="feno-grid">
                        {stages.map(s => (
                          <div key={s} className={`feno-item ${form.phenoStage === s ? 'selected' : ''}`} onClick={() => setForm({ ...form, phenoStage: s })}>
                            <div className="feno-icon">{stageIcons[s]}</div>
                            <div className="feno-label">{s}</div>
                            <div style={{ fontSize: 9, color: 'var(--text-muted)', marginTop: 2, lineHeight: 1.3 }}>{stageDescs[s]}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="form-group" style={{ marginTop: 16 }}>
                      <label className="form-label">Observaciones generales</label>
                      <textarea className="form-input" rows={2} value={form.phenoObs} onChange={e => setForm({ ...form, phenoObs: e.target.value })} placeholder="Describí el estado general del cultivo, condiciones del lote..." style={{ resize: 'vertical' }} />
                    </div>

                    <div style={{ borderTop: '1px solid var(--border)', margin: '24px -20px 20px', paddingTop: 24, paddingLeft: 20, paddingRight: 20 }}>
                      <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, marginBottom: 16 }}>Características del cultivo</div>
                      <div className="form-row form-row-2">
                        <div className="form-group">
                          <label className="form-label">Stand de plantas</label>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <input type="number" className="form-input" value={form.plantStand} onChange={e => setForm({ ...form, plantStand: e.target.value })} placeholder="Ej. 12" />
                            <span style={{ color: 'var(--text-secondary)', fontSize: 13 }}>plantas/m</span>
                          </div>
                        </div>
                        <div className="form-group">
                          <label className="form-label">Altura del cultivo</label>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <input type="number" className="form-input" value={form.cropHeight} onChange={e => setForm({ ...form, cropHeight: e.target.value })} placeholder="Ej. 65" />
                            <span style={{ color: 'var(--text-secondary)', fontSize: 13 }}>cm</span>
                          </div>
                        </div>
                      </div>
                      <div className="form-row form-row-2">
                        <div className="form-group">
                          <label className="form-label">Cobertura del suelo ({form.soilCover}%)</label>
                          <input type="range" min="0" max="100" step="5" style={{ width: '100%', marginTop: 8 }} value={form.soilCover} onChange={e => setForm({ ...form, soilCover: e.target.value })} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Uniformidad de implantación</label>
                          <select className="form-input form-select" value={form.uniformity} onChange={e => setForm({ ...form, uniformity: e.target.value })}>
                            <option>Uniforme</option>
                            <option>Irregular</option>
                            <option>Con manchones</option>
                          </select>
                        </div>
                      </div>
                      <div className="form-row form-row-2">
                        <div className="form-group">
                          <label className="form-label">Estrés hídrico</label>
                          <select className="form-input form-select" value={form.waterStress} onChange={e => setForm({ ...form, waterStress: e.target.value })}>
                            <option>Sin estrés</option>
                            <option>Leve</option>
                            <option>Moderado</option>
                            <option>Severo</option>
                          </select>
                        </div>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Relevamiento aéreo</label>
                        <textarea className="form-input" rows={2} value={form.aerialSurvey} onChange={e => setForm({ ...form, aerialSurvey: e.target.value })} placeholder="Observaciones del vuelo de dron, NDVI, stand aéreo, etc." style={{ resize: 'vertical' }} />
                      </div>
                    </div>
                  </>
                )}

                {step === 2 && (
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 24, alignItems: 'flex-start' }}>
                    <div style={{ flex: '1 1 400px' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                        <div>
                          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14 }}>Plagas y enfermedades</div>
                          <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Nivel calculado automáticamente según catálogo</div>
                        </div>
                      </div>

                      {form.pests.length === 0 ? (
                        <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--text-muted)', border: '1px dashed var(--border)', borderRadius: 'var(--radius-lg)', background: '#f8fafc' }}>
                          <div style={{ fontSize: 24, marginBottom: 8 }}>🔍</div>
                          <div style={{ fontSize: 13, fontWeight: 600 }}>Sin plagas agregadas</div>
                        </div>
                      ) : (
                        <div className="table-wrap" style={{ overflow: 'visible' }}>
                          <table style={{ minWidth: 600 }}>
                            <thead><tr><th>Plaga</th><th>Incidencia</th><th>Nivel</th><th>Tratamiento recomendado</th><th></th></tr></thead>
                            <tbody>
                              {form.pests.map((p, i) => <EditablePestRow key={p.id} pest={p} onChange={pp => updatePest(i, pp)} onRemove={() => removePest(i)} />)}
                            </tbody>
                          </table>
                        </div>
                      )}
                      <button className="btn btn-secondary btn-sm" onClick={addPest} style={{ marginTop: 16 }}><Icon name="plus" size={13} /> Agregar plaga</button>
                    </div>

                    <div style={{ flex: '1 1 300px', background: '#f8fafc', padding: 20, borderRadius: 'var(--radius-lg)', border: '1px solid var(--border)' }}>
                      <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, marginBottom: 16 }}>Mapa de afectación del lote</div>
                      {form.lotId ? (() => {
                        const selectedLot = DATA.lots.find(l => l.id === Number(form.lotId));
                        return (
                          <>
                            <GridMapper
                              gridConfig={selectedLot.gridConfig || '4x4'}
                              gridData={form.gridData || {}}
                              statesConfig={AFFECTATION_STATES}
                              onCellClick={(coord) => {
                                const newData = { ...(form.gridData || {}) };
                                if (newData[coord] === activeBrush) delete newData[coord];
                                else newData[coord] = activeBrush;
                                setForm({ ...form, gridData: newData });
                              }}
                            />
                            <div style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 6 }}>
                              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', marginBottom: 4 }}>Panel de estados</div>
                              {Object.entries(AFFECTATION_STATES).map(([k, v]) => (
                                <button
                                  key={k}
                                  className={`btn ${activeBrush === k ? 'btn-primary' : 'btn-secondary'}`}
                                  style={{
                                    justifyContent: 'flex-start', padding: '6px 12px', height: 'auto',
                                    background: activeBrush === k ? v.color : (k === 'sin_datos' ? '#fff' : undefined),
                                    border: activeBrush === k ? 'none' : '1px solid var(--border)',
                                    color: activeBrush === k ? '#fff' : (k === 'sin_datos' ? 'var(--text-secondary)' : undefined)
                                  }}
                                  onClick={() => setActiveBrush(k)}
                                >
                                  <span style={{ fontSize: 16 }}>{v.icon}</span> <span style={{ fontSize: 13, fontWeight: activeBrush === k ? 600 : 400 }}>{v.label}</span>
                                </button>
                              ))}
                            </div>
                            {(() => {
                              const totalCells = Math.pow(parseInt((selectedLot.gridConfig || '4x4').split('x')[0]), 2);
                              const counts = {};
                              Object.values(form.gridData || {}).forEach(st => { counts[st] = (counts[st] || 0) + 1; });
                              const stats = Object.entries(counts).filter(([k]) => k !== 'sin_datos' && AFFECTATION_STATES[k]).map(([k, v]) => `${AFFECTATION_STATES[k].icon} ${Math.round(v / totalCells * 100)}%`).join(' · ');
                              return stats ? (
                                <div style={{ marginTop: 16, textAlign: 'center', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--dark)', fontWeight: 600, background: '#fff', padding: '8px', borderRadius: 'var(--radius-md)', border: '1px solid var(--border)' }}>
                                  Resumen: {stats}
                                </div>
                              ) : null;
                            })()}
                            <div className="form-group" style={{ marginTop: 16 }}>
                              <label className="form-label" style={{ fontSize: 12 }}>Observaciones del mapa</label>
                              <textarea className="form-input" rows={2} value={form.mapObservations} onChange={e => setForm({ ...form, mapObservations: e.target.value })} placeholder="Aclaraciones sobre distribución espacial..." style={{ resize: 'vertical' }} />
                            </div>
                          </>
                        );
                      })() : (
                        <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Seleccioná un lote en el paso 1.</div>
                      )}
                    </div>
                  </div>
                )}

                {step === 3 && (() => {
                  const cfField    = DATA.fields.find(f => f.id === Number(form.fieldId));
                  const cfLot      = DATA.lots.find(l => l.id === Number(form.lotId));
                  const cfCampaign = DATA.campaigns.find(c => c.id === Number(form.campaignId));

                  const gridCounts = {};
                  Object.values(form.gridData || {}).forEach(st => { gridCounts[st] = (gridCounts[st] || 0) + 1; });
                  const cfGridTotal = cfLot?.gridConfig ? Math.pow(parseInt(cfLot.gridConfig.split('x')[0]), 2) : 16;
                  const cfGridStats = Object.entries(gridCounts)
                    .filter(([k]) => k !== 'sin_datos' && AFFECTATION_STATES[k])
                    .map(([k, v]) => `${AFFECTATION_STATES[k].icon} ${Math.round(v / cfGridTotal * 100)}%`)
                    .join(' · ');

                  const CfSection = ({ title, icon, children }) => (
                    <div style={{ marginBottom: 24 }}>
                      <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--accent)', paddingBottom: 8, borderBottom: '2px solid var(--accent-light)', marginBottom: 12 }}>
                        {icon} {title}
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column' }}>{children}</div>
                    </div>
                  );

                  const CfRow = ({ label, value }) => {
                    if (value === null || value === undefined || value === '' || value === false) return null;
                    return (
                      <div className="cf-row" style={{ display: 'flex', gap: 12, alignItems: 'flex-start', padding: '7px 0', borderBottom: '1px solid #f0f4f0' }}>
                        <span className="cf-label" style={{ fontSize: 12, color: 'var(--text-muted)', fontWeight: 600, fontFamily: 'var(--font-head)', minWidth: 148, flexShrink: 0, paddingTop: 1 }}>{label}</span>
                        <span style={{ fontSize: 13, color: 'var(--dark)', flex: 1, lineHeight: 1.5 }}>{value}</span>
                      </div>
                    );
                  };

                  return (
                    <div>
                      {/* Banner */}
                      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24, padding: '12px 16px', background: 'var(--accent-light)', borderRadius: 'var(--radius-md)', border: '1px solid #b8d9c5' }}>
                        <span style={{ fontSize: 22, flexShrink: 0 }}>📋</span>
                        <div>
                          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14 }}>Revisá los datos antes de guardar</div>
                          <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>Si necesitás corregir algo, usá "← Anterior"</div>
                        </div>
                      </div>

                      {/* Datos generales */}
                      <CfSection title="Datos generales" icon="📅">
                        <CfRow label="Fecha de visita" value={form.date ? fmt.date(form.date) : null} />
                        <CfRow label="Campo" value={cfField?.name} />
                        <CfRow label="Lote" value={cfLot ? `${cfLot.name} (${cfLot.crop})` : null} />
                        <CfRow label="Campaña" value={cfCampaign ? `${cfCampaign.crop} — desde ${fmt.date(cfCampaign.startDate)}` : null} />
                      </CfSection>

                      {/* Estado fenológico */}
                      <CfSection title="Estado fenológico" icon="🌱">
                        <CfRow label="Etapa observada" value={form.phenoStage ? <span>{stageIcons[form.phenoStage]} {form.phenoStage}</span> : null} />
                        <CfRow label="Observaciones" value={form.phenoObs || null} />
                        <CfRow label="Stand de plantas" value={form.plantStand ? `${form.plantStand} plantas/m` : null} />
                        <CfRow label="Altura del cultivo" value={form.cropHeight ? `${form.cropHeight} cm` : null} />
                        <CfRow label="Cobertura del suelo" value={form.soilCover > 0 ? `${form.soilCover}%` : null} />
                        <CfRow label="Uniformidad" value={form.uniformity && form.uniformity !== 'Uniforme' ? form.uniformity : null} />
                        <CfRow label="Estrés hídrico" value={form.waterStress && form.waterStress !== 'Sin estres' ? form.waterStress : null} />
                        <CfRow label="Relevamiento aéreo" value={form.aerialSurvey || null} />
                      </CfSection>

                      {/* Plagas */}
                      <CfSection title="Plagas y enfermedades" icon="🐛">
                        {form.pests.length === 0 ? (
                          <div style={{ fontSize: 13, color: 'var(--text-muted)', fontStyle: 'italic', padding: '6px 0' }}>Sin plagas registradas</div>
                        ) : (
                          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 8 }}>
                            {form.pests.map((p, i) => (
                              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: '#f8fafc', borderRadius: 8, border: '1px solid var(--border)', flexWrap: 'wrap' }}>
                                <span style={{ fontWeight: 600, fontSize: 13, flex: '1 1 140px' }}>🐛 {p.name || '—'}</span>
                                {p.incidence ? <span className="td-mono" style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{p.incidence}%</span> : null}
                                {p.level ? <span className={`badge ${levelColors[p.level] || 'badge-neutral'}`}><span className={`severity-dot ${levelSev[p.level] || ''}`} /> {p.level}</span> : null}
                                {p.treatment ? <span style={{ fontSize: 11, color: 'var(--text-secondary)', flex: '1 0 100%', marginTop: 2 }}>💊 {p.treatment}</span> : null}
                              </div>
                            ))}
                          </div>
                        )}
                        <CfRow label="Mapa de afectación" value={cfGridStats || null} />
                        <CfRow label="Obs. del mapa" value={form.mapObservations || null} />
                      </CfSection>
                    </div>
                  );
                })()}

              </div>
            </div>

            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, flexWrap: 'wrap' }}>
              {step > 0
                ? <button className="btn btn-secondary" onClick={prev} style={step === steps.length - 1 ? { flex: '1 1 auto', justifyContent: 'center' } : {}}><Icon name="back" size={14} /> Anterior</button>
                : <div />}
              {step < steps.length - 1
                ? <button className="btn btn-primary" onClick={next}>Siguiente <Icon name="chevron_right" size={14} color="#fff" /></button>
                : <button className="btn btn-primary" onClick={() => onSave(form)} style={{ flex: '1 1 auto', justifyContent: 'center', background: '#2E7D4F', gap: 8 }}>Guardar visita <Icon name="check" size={14} color="#fff" /></button>
              }
            </div>
          </div>
        </PageShell>
      );
    };

    // ── Visit Detail (screen 16) ──────────────────────────────────────────────────
    const VisitDetailScreen = ({ visit, onBack, onNewOrder, onEdit }) => {
      const hasHighPests = visit.pests && visit.pests.some(p => p.level === 'alto' || p.level === 'critico' || p.level === 'crítico');
      const sevAccent = { bajo: '#2E7D52', medio: '#92730A', alto: 'var(--critical)', critico: '#DC2626' };

      // Calcular resumen de grilla
      const gridData = visit.gridData || {};
      let totalCells = 16;
      const selectedLot = DATA.lots.find(l => l.id === visit.lotId);
      if (selectedLot && selectedLot.gridConfig) totalCells = Math.pow(parseInt(selectedLot.gridConfig.split('x')[0]), 2);
      const counts = {};
      Object.values(gridData).forEach(st => { counts[st] = (counts[st] || 0) + 1; });
      const stats = Object.entries(counts).filter(([k]) => k !== 'sin_datos' && AFFECTATION_STATES[k]).map(([k, v]) => `${AFFECTATION_STATES[k].icon} ${Math.round(v / totalCells * 100)}%`).join(' · ');

      return (
        <PageShell breadcrumbs={['Visitas', 'Detalle de visita']}>
          <div className="page-header">
            <div>
              <button className="btn btn-ghost btn-sm" onClick={onBack} style={{ paddingLeft: 0, marginBottom: 8 }}><Icon name="back" size={14} /> Volver a visitas</button>
              <div className="page-title" style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                Visita del {fmt.date(visit.date)}
                <span style={{ fontSize: 13, fontWeight: 400, color: 'var(--text-secondary)', background: 'var(--bg)', padding: '4px 12px', borderRadius: 20, border: '1px solid var(--border)' }}>
                  ID #{visit.id}
                </span>
              </div>
              <div className="page-subtitle">{visit.lotName} · {visit.fieldName} · {visit.advisor}</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => onEdit && onEdit(visit)}><Icon name="edit" size={14} /> Editar visita</button>
              {!visit.orderId && <button className="btn btn-primary" onClick={onNewOrder}><Icon name="plus" size={14} color="#fff" /> Generar Orden</button>}
            </div>
          </div>

          <div className="card" style={{ marginBottom: 24, borderLeft: `6px solid ${sevAccent[visit.severity] || 'var(--accent)'}` }}>
            <div className="card-header"><div className="card-title">{stageIcons[visit.phenoStage]} Estado del Cultivo: {visit.phenoStage}</div></div>
            <div className="card-body">
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16 }}>
                {[
                  { label: 'Stand de plantas', val: `${visit.plantStand || '-'} pl/m`, icon: '🌱', sub: 'Población estimada' },
                  { label: 'Altura del cultivo', val: `${visit.cropHeight || '-'} cm`, icon: '📏', sub: 'Crecimiento vertical' },
                  { label: 'Uniformidad', val: visit.uniformity || '-', icon: visit.uniformity === 'Uniforme' ? '✅' : '⚠️', sub: 'Estado de implantación' },
                  { label: 'Estrés hídrico', val: visit.waterStress || '-', icon: visit.waterStress === 'Sin estrés' ? '🟢' : '🔴', sub: 'Demanda de agua' },
                ].map(k => (
                  <div key={k.label} className="card" style={{ padding: '16px', background: '#f8fafc', display: 'flex', gap: 14, alignItems: 'center' }}>
                    <div style={{ fontSize: 24, width: 44, height: 44, background: '#fff', borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: 'var(--shadow-sm)' }}>{k.icon}</div>
                    <div>
                      <div style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 600, textTransform: 'uppercase' }}>{k.label}</div>
                      <div style={{ fontSize: 16, fontWeight: 700, marginTop: 2, color: 'var(--dark)' }}>{k.val}</div>
                      <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 2 }}>{k.sub}</div>
                    </div>
                  </div>
                ))}
                <div className="card" style={{ padding: '16px', background: '#f8fafc', display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 600, textTransform: 'uppercase' }}>Cobertura del suelo</span>
                    <span className="td-mono" style={{ fontSize: 14, fontWeight: 700 }}>{visit.soilCover || 0}%</span>
                  </div>
                  <div style={{ height: 8, background: 'var(--border)', borderRadius: 4, overflow: 'hidden' }}>
                    <div style={{ width: `${visit.soilCover || 0}%`, height: '100%', background: 'var(--accent)', borderRadius: 4 }} />
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>Proporción de suelo cubierto por biomasa</div>
                </div>
              </div>
              {visit.aerialSurvey && (
                <div style={{ marginTop: 20, padding: '14px 18px', background: 'var(--accent-light)', border: '1px solid var(--accent)', borderRadius: 12, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                  <span style={{ fontSize: 20 }}>🚁</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--dark)', marginBottom: 2 }}>Relevamiento aéreo / Satelital</div>
                    <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.5 }}>{visit.aerialSurvey}</div>
                  </div>
                </div>
              )}
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '450px 1fr', gap: 24, marginBottom: 24 }}>
            <div className="card">
              <div className="card-header"><div className="card-title">🗺️ Mapa de afectación por zonas</div></div>
              <div className="card-body">
                <div style={{ padding: '10px', background: 'var(--bg)', borderRadius: 12, border: '1px solid var(--border)', marginBottom: 20 }}>
                  <GridMapper gridConfig={selectedLot ? selectedLot.gridConfig : '4x4'} gridData={gridData} statesConfig={AFFECTATION_STATES} readOnly />
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  {Object.entries(AFFECTATION_STATES).filter(([k]) => k !== 'sin_datos').map(([k, s]) => (
                    <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12 }}>
                      <span style={{ width: 14, height: 14, borderRadius: 3, background: s.color, border: '1px solid rgba(0,0,0,0.1)' }} />
                      <span style={{ color: 'var(--text-secondary)' }}>{s.label}:</span>
                      <span className="td-mono" style={{ fontWeight: 700 }}>{Math.round((counts[k] || 0) / totalCells * 100)}%</span>
                    </div>
                  ))}
                </div>

                {stats && (
                  <div style={{ marginTop: 20, paddingTop: 16, borderTop: '1px solid var(--border)', textAlign: 'center', fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--dark)', fontWeight: 700 }}>
                    Resumen: {stats}
                  </div>
                )}
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
              <div className="card">
                <div className="card-header">
                  <div className="card-title">🐛 Plagas y enfermedades detectadas</div>
                  <Semaphore level={visit.severity} />
                </div>
                <div className="card-body" style={{ padding: 0 }}>
                  {visit.pests && visit.pests.length > 0 ? (
                    <div className="table-wrap" style={{ border: 'none', borderRadius: 0, boxShadow: 'none' }}>
                      <table style={{ width: '100%' }}>
                        <thead><tr><th>Plaga</th><th>Incidencia</th><th>Nivel</th><th>Tratamiento recomendado</th></tr></thead>
                        <tbody>
                          {visit.pests.map((p, i) => (
                            <tr key={i}>
                              <td>
                                <div style={{ fontWeight: 700 }}>{p.name}</div>
                                {p.affectedZones && <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 2 }}>Zonas: {p.affectedZones.join(', ')}</div>}
                              </td>
                              <td className="td-mono" style={{ fontSize: 14, fontWeight: 700 }}>{p.incidence}%</td>
                              <td>
                                <span className={`badge ${levelColors[p.level] || 'badge-success'}`}>
                                  <span className={`severity-dot ${levelSev[p.level] || 'low'}`} />
                                  {p.level.charAt(0).toUpperCase() + p.level.slice(1)}
                                </span>
                              </td>
                              <td style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{p.treatment || '-'}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : (
                    <div style={{ padding: 30, textAlign: 'center' }}><span className="badge badge-success">✓ Sin plagas detectadas</span></div>
                  )}
                </div>
              </div>

              {visit.phenoObs && (
                <div className="card">
                  <div className="card-header"><div className="card-title">📝 Observaciones generales del asesor</div></div>
                  <div className="card-body">
                    <p style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.7, margin: 0, fontStyle: 'italic' }}>"{visit.phenoObs}"</p>
                  </div>
                </div>
              )}

              <div style={{ display: 'flex', gap: 12, justifyContent: 'flex-start' }}>
                {hasHighPests && !visit.orderId && (
                  <button className="btn btn-primary" onClick={onNewOrder} style={{ flex: 1, height: 44 }}>
                    <Icon name="spray" size={14} color="#fff" /> Generar orden de aplicación
                  </button>
                )}
                <button className="btn btn-secondary" style={{ flex: hasHighPests && !visit.orderId ? 1 : 0 }}>
                  <Icon name="edit" size={14} /> Editar visita
                </button>
              </div>
            </div>
          </div>
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // ORDERS
    // ══════════════════════════════════════════════════════════════════════════════
    const OrdersScreen = () => {
      const [orders, setOrders] = useState(DATA.orders);
      const [view, setView] = useState('list');
      const [selected, setSelected] = useState(null);
      const [editing, setEditing] = useState(null);

      const defaultForm = {
        fieldId: '', lotId: '', campaignId: '', date: '', appType: '🚜 Mosquito / Pulverizadora terrestre', equipment: '', products: [{ id: 1, name: '', dose: '', quantity: '', cost: '' }],
        transportCost: '', fuelLiters: '', fuelPrice: '', laborDays: '', laborPrice: '', otherCost: '', otherDesc: ''
      };

      const [form, setForm] = useState(defaultForm);
      const [statusModal, setStatusModal] = useState(null);
      const [statusForm, setStatusForm] = useState({ newStatus: '', changeDate: '', notes: '' });

      const openStatusModal = (order) => {
        const today = new Date().toISOString().split('T')[0];
        setStatusForm({ newStatus: '', changeDate: today, notes: '' });
        setStatusModal(order);
      };

      const statusColors = { pendiente: 'var(--warning)', ejecutada: 'var(--success)', cancelada: 'var(--text-muted)' };
      const statusBg = { pendiente: 'var(--warning-light)', ejecutada: 'var(--success-light)', cancelada: '#F3F4F6' };

      const openCreate = () => {
        setEditing(null);
        setForm(defaultForm);
        setView('create');
      };
      const openEdit = (o) => {
        setEditing(o);
        const lot = DATA.lots.find(l => l.id === o.lotId);
        setForm({
          fieldId: lot?.fieldId || '', lotId: o.lotId, campaignId: o.campaignId || '', date: o.date, appType: o.appType || '🚜 Mosquito / Pulverizadora terrestre', equipment: o.equipment, products: [...o.products],
          transportCost: o.transportCost || '', fuelLiters: o.fuelLiters || '', fuelPrice: o.fuelPrice || '',
          laborDays: o.laborDays || '', laborPrice: o.laborPrice || '', otherCost: o.otherCost || '', otherDesc: o.otherDesc || ''
        });
        setView('edit');
      };
      const addProduct = () => setForm({ ...form, products: [...form.products, { id: Date.now(), name: '', dose: '', quantity: '', cost: '' }] });
      const updateProduct = (idx, p) => setForm({ ...form, products: form.products.map((pp, i) => i === idx ? p : pp) });
      const removeProduct = (idx) => setForm({ ...form, products: form.products.filter((_, i) => i !== idx) });

      const save = () => {
        const lot = DATA.lots.find(l => l.id === Number(form.lotId));
        const fieldName = DATA.fields.find(f => f.id === Number(form.fieldId))?.name || lot?.fieldName || '';
        if (editing) setOrders(orders.map(o => o.id === editing.id ? { ...o, ...form, lotName: lot?.name || o.lotName, fieldName } : o));
        else setOrders([...orders, { id: Date.now(), ...form, status: 'pendiente', lotName: lot?.name || '', fieldName, visitId: null }]);
        setEditing(null);
        setView('list');
      };
      const changeStatus = (id, status) => { setOrders(orders.map(o => o.id === id ? { ...o, status } : o)); setStatusModal(null); setSelected(s => s ? { ...s, status } : s); };

      const parseNum = (val) => {
        const n = parseFloat(val);
        return isNaN(n) || n < 0 ? 0 : n;
      };

      const handleNumChange = (field, val) => {
        if (val === '') {
          setForm({ ...form, [field]: '' });
          return;
        }
        const n = parseFloat(val);
        if (!isNaN(n) && n >= 0) {
          setForm({ ...form, [field]: val });
        }
      };

      const calcProductsTotal = () => form.products.reduce((acc, p) => acc + parseNum(p.cost), 0);
      const calcFuelTotal = () => parseNum(form.fuelLiters) * parseNum(form.fuelPrice);
      const calcLaborTotal = () => parseNum(form.laborDays) * parseNum(form.laborPrice);

      const calcGrandTotal = () => {
        return calcProductsTotal() + parseNum(form.transportCost) + calcFuelTotal() + calcLaborTotal() + parseNum(form.otherCost);
      };

      const getOrderCosts = (o) => {
        const products = o.products?.reduce((acc, p) => acc + (parseFloat(p.cost) || 0), 0) || 0;
        const transport = parseFloat(o.transportCost) || 0;
        const fuel = (parseFloat(o.fuelLiters) || 0) * (parseFloat(o.fuelPrice) || 0);
        const labor = (parseFloat(o.laborDays) || 0) * (parseFloat(o.laborPrice) || 0);
        const other = parseFloat(o.otherCost) || 0;
        return { products, transport, fuel, labor, other, total: products + transport + fuel + labor + other };
      };

      const equipmentPlaceholder =
        form.appType.includes('Mosquito') ? 'Ej. Pulverizadora Case 4420 — 24m' :
          form.appType.includes('Avión') ? 'Ej. Air Tractor AT-502B' :
            'Ej. DJI Agras T40';

      if (view === 'create' || view === 'edit') {
        return (
          <PageShell breadcrumbs={['Órdenes de Aplicación', editing ? `Editar Orden #${editing.id}` : 'Nueva orden']}>
            <div className="page-header" style={{ marginBottom: 20 }}>
              <div>
                <button className="btn btn-ghost btn-sm" onClick={() => { setView('list'); setEditing(null); }} style={{ paddingLeft: 0, marginBottom: 8 }}><Icon name="back" size={14} /> Volver</button>
                <div className="page-title">{editing ? `Editar orden #${editing.id}` : 'Nueva orden de aplicación'}</div>
              </div>
            </div>

            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-body">
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label className="form-label">Tipo de aplicación</label>
                  <select className="form-input form-select" value={form.appType} onChange={e => setForm({ ...form, appType: e.target.value })}>
                    <option value="🚜 Mosquito / Pulverizadora terrestre">🚜 Mosquito / Pulverizadora terrestre</option>
                    <option value="✈️ Avión fumigador">✈️ Avión fumigador</option>
                    <option value="🚁 Drone">🚁 Drone</option>
                  </select>
                </div>
              </div>
            </div>

            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-body">
                <div className="form-row form-row-2" style={{ marginBottom: 0 }}>
                  <div className="form-group">
                    <label className="form-label">Campo</label>
                    <select className="form-input form-select" value={form.fieldId} onChange={e => setForm({ ...form, fieldId: e.target.value, lotId: '', campaignId: '' })}>
                      <option value="">Seleccionar campo...</option>
                      {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Lote</label>
                    <select className="form-input form-select" value={form.lotId} onChange={e => setForm({ ...form, lotId: e.target.value, campaignId: '' })} disabled={!form.fieldId}>
                      <option value="">{form.fieldId ? 'Seleccionar lote...' : 'Primero seleccioná un campo'}</option>
                      {DATA.lots.filter(l => l.fieldId === Number(form.fieldId)).map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">Campaña *</label>
                  <select className="form-input form-select" value={form.campaignId} onChange={e => setForm({ ...form, campaignId: e.target.value })} disabled={!form.lotId}>
                    <option value="">{form.lotId ? 'Seleccionar campaña...' : 'Primero seleccioná un lote'}</option>
                    {DATA.campaigns.filter(c => c.lotId === Number(form.lotId)).map(c => <option key={c.id} value={c.id}>{c.crop} — desde {fmt.date(c.startDate)}</option>)}
                  </select>
                </div>
                <div className="form-row form-row-2">
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Fecha</label>
                    <input type="date" className="form-input" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Equipo de fumigación</label>
                    <input className="form-input" value={form.equipment} onChange={e => setForm({ ...form, equipment: e.target.value })} placeholder={equipmentPlaceholder} />
                  </div>
                </div>
              </div>
            </div>

            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-header">
                <div className="card-title">Productos</div>
                <button className="btn btn-secondary btn-sm" onClick={addProduct}><Icon name="plus" size={12} /> Agregar producto</button>
              </div>
              <div className="table-wrap" style={{ border: 'none', borderRadius: 0, boxShadow: 'none' }}>
                <table>
                  <thead><tr><th>Producto</th><th>Dosis</th><th>Cantidad</th><th>Precio est.</th><th></th></tr></thead>
                  <tbody>
                    {form.products.map((p, i) => <EditableProductRow key={p.id} product={p} onChange={pp => updateProduct(i, pp)} onRemove={() => removeProduct(i)} />)}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-header"><div className="card-title">Costos adicionales</div></div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">Traslado de insumos ($)</label>
                  <input type="number" min="0" className="form-input" value={form.transportCost} onChange={e => handleNumChange('transportCost', e.target.value)} placeholder="0" />
                </div>
                <div className="form-row form-row-2" style={{ marginBottom: 12 }}>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Combustible (Litros)</label>
                    <input type="number" min="0" className="form-input" value={form.fuelLiters} onChange={e => handleNumChange('fuelLiters', e.target.value)} placeholder="0" />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Precio por litro ($)</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <input type="number" min="0" className="form-input" style={{ flex: 1 }} value={form.fuelPrice} onChange={e => handleNumChange('fuelPrice', e.target.value)} placeholder="0" />
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 600, color: 'var(--text-secondary)', minWidth: 80, textAlign: 'right' }}>Sub: {fmt.currency(calcFuelTotal())}</div>
                    </div>
                  </div>
                </div>
                <div className="form-row form-row-2" style={{ marginBottom: 12 }}>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Mano de obra (Jornales)</label>
                    <input type="number" min="0" className="form-input" value={form.laborDays} onChange={e => handleNumChange('laborDays', e.target.value)} placeholder="0" />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Valor por jornal ($)</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <input type="number" min="0" className="form-input" style={{ flex: 1 }} value={form.laborPrice} onChange={e => handleNumChange('laborPrice', e.target.value)} placeholder="0" />
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 600, color: 'var(--text-secondary)', minWidth: 80, textAlign: 'right' }}>Sub: {fmt.currency(calcLaborTotal())}</div>
                    </div>
                  </div>
                </div>
                <div className="form-row form-row-2" style={{ marginBottom: 0 }}>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Otros costos (Descripción)</label>
                    <input className="form-input" value={form.otherDesc} onChange={e => setForm({ ...form, otherDesc: e.target.value })} placeholder="Ej. Peajes, reparaciones rápidas..." />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label className="form-label">Monto ($)</label>
                    <input type="number" min="0" className="form-input" value={form.otherCost} onChange={e => handleNumChange('otherCost', e.target.value)} placeholder="0" />
                  </div>
                </div>
              </div>
            </div>

            <div style={{ background: 'var(--success-light)', border: '2px dashed var(--success)', borderRadius: 'var(--radius-lg)', padding: '20px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
              <div>
                <div style={{ display: 'flex', gap: 16, fontSize: 12, color: 'var(--text-secondary)', flexWrap: 'wrap', marginBottom: 6 }}>
                  <span>Prod: {fmt.currency(calcProductsTotal())}</span>
                  <span>Tras: {fmt.currency(parseNum(form.transportCost))}</span>
                  <span>Comb: {fmt.currency(calcFuelTotal())}</span>
                  <span>MO: {fmt.currency(calcLaborTotal())}</span>
                  <span>Otros: {fmt.currency(parseNum(form.otherCost))}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
                  <span style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, color: 'var(--success)', textTransform: 'uppercase' }}>Total estimado de la orden</span>
                  <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 24, color: 'var(--success)' }}>{fmt.currency(calcGrandTotal())}</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-secondary" onClick={() => { setView('list'); setEditing(null); }}>Cancelar</button>
                <button className="btn btn-primary" onClick={() => setView('confirm')}>Revisar orden →</button>
              </div>
            </div>
          </PageShell>
        );
      }

      if (view === 'confirm') {
        const cfField    = DATA.fields.find(f => f.id === Number(form.fieldId));
        const cfLot      = DATA.lots.find(l => l.id === Number(form.lotId));
        const cfCampaign = DATA.campaigns.find(c => c.id === Number(form.campaignId));
        const cfFuelTotal     = calcFuelTotal();
        const cfLaborTotal    = calcLaborTotal();
        const cfProductsTotal = calcProductsTotal();
        const cfGrandTotal    = calcGrandTotal();

        const ORow = ({ label, value }) => {
          if (value === null || value === undefined || value === '' || value === false) return null;
          return (
            <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start', padding: '7px 0', borderBottom: '1px solid #f0f4f0' }}>
              <span style={{ fontSize: 12, color: 'var(--text-muted)', fontWeight: 600, fontFamily: 'var(--font-head)', minWidth: 148, flexShrink: 0, paddingTop: 1 }}>{label}</span>
              <span style={{ fontSize: 13, color: 'var(--dark)', flex: 1, lineHeight: 1.5 }}>{value}</span>
            </div>
          );
        };

        return (
          <PageShell breadcrumbs={['Órdenes de Aplicación', editing ? `Editar Orden #${editing.id}` : 'Nueva orden', 'Confirmar']}>
            <div className="page-header" style={{ marginBottom: 20 }}>
              <div>
                <button className="btn btn-ghost btn-sm" onClick={() => setView(editing ? 'edit' : 'create')} style={{ paddingLeft: 0, marginBottom: 8 }}><Icon name="back" size={14} /> Volver al formulario</button>
                <div className="page-title">Confirmar orden de aplicación</div>
              </div>
            </div>

            <div style={{ maxWidth: 720 }}>
              {/* Banner */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24, padding: '12px 16px', background: 'var(--accent-light)', borderRadius: 'var(--radius-md)', border: '1px solid #b8d9c5' }}>
                <span style={{ fontSize: 22, flexShrink: 0 }}>📋</span>
                <div>
                  <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14 }}>Revisá los datos antes de guardar</div>
                  <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>Si necesitás corregir algo, usá "← Volver al formulario"</div>
                </div>
              </div>

              {/* Datos generales */}
              <div className="card" style={{ marginBottom: 16 }}>
                <div className="card-header"><div className="card-title">📍 Datos generales</div></div>
                <div className="card-body">
                  <ORow label="Tipo de aplicación" value={form.appType} />
                  <ORow label="Campo"              value={cfField?.name} />
                  <ORow label="Lote"               value={cfLot?.name} />
                  <ORow label="Campaña"            value={cfCampaign ? `${cfCampaign.crop} — desde ${fmt.date(cfCampaign.startDate)}` : null} />
                  <ORow label="Fecha"              value={form.date ? fmt.date(form.date) : null} />
                  <ORow label="Equipo"             value={form.equipment || null} />
                </div>
              </div>

              {/* Productos */}
              {form.products.filter(p => p.name).length > 0 && (
                <div className="card" style={{ marginBottom: 16 }}>
                  <div className="card-header"><div className="card-title">🧪 Productos a aplicar</div></div>
                  <div className="table-wrap" style={{ border: 'none', borderRadius: 0, boxShadow: 'none' }}>
                    <table>
                      <thead><tr><th>Producto</th><th>Dosis</th><th>Cantidad</th><th>Precio est.</th></tr></thead>
                      <tbody>
                        {form.products.filter(p => p.name).map((p, i) => (
                          <tr key={i}>
                            <td>{p.name}</td>
                            <td className="td-mono">{p.dose || '—'}</td>
                            <td className="td-mono">{p.quantity || '—'}</td>
                            <td className="td-mono">{p.cost ? fmt.currency(parseNum(p.cost)) : '—'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* Costos adicionales */}
              {(parseNum(form.transportCost) + cfFuelTotal + cfLaborTotal + parseNum(form.otherCost)) > 0 && (
                <div className="card" style={{ marginBottom: 16 }}>
                  <div className="card-header"><div className="card-title">💰 Costos adicionales</div></div>
                  <div className="card-body">
                    <ORow label="Traslado de insumos" value={parseNum(form.transportCost) > 0 ? fmt.currency(parseNum(form.transportCost)) : null} />
                    <ORow label="Combustible"         value={cfFuelTotal > 0 ? `${form.fuelLiters} L × ${fmt.currency(parseNum(form.fuelPrice))} = ${fmt.currency(cfFuelTotal)}` : null} />
                    <ORow label="Mano de obra"        value={cfLaborTotal > 0 ? `${form.laborDays} jornales × ${fmt.currency(parseNum(form.laborPrice))} = ${fmt.currency(cfLaborTotal)}` : null} />
                    <ORow label={form.otherDesc || 'Otros costos'} value={parseNum(form.otherCost) > 0 ? fmt.currency(parseNum(form.otherCost)) : null} />
                  </div>
                </div>
              )}

              {/* Total + footer */}
              <div style={{ background: 'var(--success-light)', border: '2px dashed var(--success)', borderRadius: 'var(--radius-lg)', padding: '20px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
                <div>
                  <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, color: 'var(--success)', textTransform: 'uppercase', marginBottom: 4 }}>Total estimado de la orden</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 28, color: 'var(--success)' }}>{fmt.currency(cfGrandTotal)}</div>
                </div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  <button className="btn btn-secondary" onClick={() => setView(editing ? 'edit' : 'create')}><Icon name="back" size={14} /> Volver</button>
                  <button className="btn btn-primary" style={{ background: '#2E7D4F' }} onClick={save}>Guardar orden <Icon name="check" size={14} color="#fff" /></button>
                </div>
              </div>
            </div>
          </PageShell>
        );
      }

      if (view === 'detail' && selected) {
        return (
          <PageShell breadcrumbs={['Órdenes de Aplicación', `Orden #${selected.id}`]}>
            <div className="page-header">
              <div>
                <button className="btn btn-ghost btn-sm" onClick={() => setView('list')} style={{ paddingLeft: 0, marginBottom: 8 }}><Icon name="back" size={14} /> Volver</button>
                <div className="page-title">Orden de aplicación #{selected.id}</div>
                <div className="page-subtitle">{selected.lotName} · {fmt.date(selected.date)}</div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-secondary" onClick={() => openEdit(selected)}><Icon name="edit" size={14} /> Editar</button>
                <button className="btn btn-primary" onClick={() => openStatusModal(selected)}>Cambiar estado</button>
              </div>
            </div>

            <div style={{ background: statusBg[selected.status], border: `2px solid ${statusColors[selected.status]}`, borderRadius: 'var(--radius-lg)', padding: '16px 20px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ fontSize: 24 }}>{selected.status === 'pendiente' ? '⏳' : selected.status === 'ejecutada' ? '✅' : '✗'}</span>
              <div>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 15, color: statusColors[selected.status] }}>Estado: {selected.status.charAt(0).toUpperCase() + selected.status.slice(1)}</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Lote: {selected.lotName} · {selected.fieldName}</div>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
              <div className="card">
                <div className="card-header"><div className="card-title">📋 Datos de la orden</div></div>
                <div className="card-body">
                  <div className="detail-grid">
                    <div><div className="detail-item-label">Fecha</div><div className="detail-item-value td-mono">{fmt.date(selected.date)}</div></div>
                    <div><div className="detail-item-label">Lote</div><div className="detail-item-value">{selected.lotName}</div></div>
                  </div>
                </div>
              </div>
              <div className="card">
                <div className="card-header"><div className="card-title">🚜 Tipo de aplicación</div></div>
                <div className="card-body">
                  <div className="detail-grid">
                    <div style={{ gridColumn: '1/-1' }}><div className="detail-item-label">Tipo</div><div className="detail-item-value">{selected.appType || '🚜 Mosquito / Pulverizadora terrestre'}</div></div>
                    <div style={{ gridColumn: '1/-1' }}><div className="detail-item-label">Equipo de fumigación</div><div className="detail-item-value">{selected.equipment}</div></div>
                  </div>
                </div>
              </div>
            </div>

            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-header"><div className="card-title">🧪 Productos a aplicar</div></div>
              <div className="table-wrap" style={{ border: 'none', borderRadius: 0, boxShadow: 'none' }}>
                <table>
                  <thead><tr><th>Producto</th><th>Dosis</th><th>Cantidad total</th><th>Costo estimado</th></tr></thead>
                  <tbody>
                    {selected.products.map(p => (
                      <tr key={p.id}>
                        <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{p.name}</td>
                        <td className="td-mono">{p.dose}</td>
                        <td className="td-mono">{p.quantity}</td>
                        <td className="td-mono">{fmt.currency(p.cost || 0)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="card">
              <div className="card-header"><div className="card-title">💰 Desglose de costos</div></div>

                  <div style={{ background: '#F8FAFC', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>

                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-secondary)', marginTop: 2 }}>{fmt.date(o.date)}</div>

                    <span className={`badge ${statusOrder[o.status]}`}>{statusLabel[o.status]}</span>

                  <div className="order-card-body">
                    <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>

                        <div className="td-mono" style={{ fontWeight: 700, fontSize: 18, color: 'var(--success)' }}>{fmt.currency(c.total)}</div>

                          <span>Insumos: {fmt.currency(c.products)}</span>
                          <span>Traslado: {fmt.currency(c.transport)}</span>
                          <span>Maq: {fmt.currency(c.fuel)}</span>
                          <span>MO: {fmt.currency(c.labor)}</span>
                        </div>
                      </details>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

        </PageShell>

    };

    // ══════════════════════════════════════════════════════════════════════════════
    // ALERTS
    // ══════════════════════════════════════════════════════════════════════════════
    const AlertsScreen = () => {
      const [tab, setTab] = useState('active');
      const [alerts, setAlerts] = useState(DATA.alerts);
      const [thresholds, setThresholds] = useState({ incidence: 15, phenoDelay: 7 });
      const [configSubTab, setConfigSubTab] = useState('pests');
      const [configSaved, setConfigSaved] = useState(null);
      const [pestConfig, setPestConfig] = useState([
        { id: 1, name: 'Roya asiática', crop: 'Soja', defaultThreshold: 15, defaultUnit: '%', custom: '12', active: true },
        { id: 2, name: 'Trips del maíz', crop: 'Maíz', defaultThreshold: 25, defaultUnit: 'trips/hoja', custom: '', active: true },
        { id: 3, name: 'Pulgón verde', crop: 'Soja / Trigo', defaultThreshold: 500, defaultUnit: 'pulgones/metro', custom: '', active: true },
        { id: 4, name: 'Chinche de la soja', crop: 'Soja', defaultThreshold: 1, defaultUnit: 'chinche/metro', custom: '', active: true },
        { id: 5, name: 'Fusariosis', crop: 'Trigo / Maíz', defaultThreshold: 10, defaultUnit: '%', custom: '', active: false },
      ]);
      const [phenoConfig, setPhenoConfig] = useState([
        { stage: 'Germinación', icon: '🌱', days: 5, active: true },
        { stage: 'Macollaje', icon: '🌿', days: 7, active: true },
        { stage: 'Floración', icon: '🌸', days: 4, active: true },
        { stage: 'Fructificación', icon: '🌾', days: 6, active: true },

      const [cfgLot, setCfgLot] = useState('');
      const [cfgCampaign, setCfgCampaign] = useState('');
      const [savedConfigs, setSavedConfigs] = useState({});
      const cfgFieldLots = cfgField ? DATA.lots.filter(l => l.fieldId === Number(cfgField)) : [];
      const cfgLotCampaigns = cfgLot ? DATA.campaigns.filter(c => c.lotId === Number(cfgLot)) : [];
      const cfgKey = cfgField && cfgLot && cfgCampaign ? `${cfgField}-${cfgLot}-${cfgCampaign}` : null;
      const defaultPestCfg = () => ([
        { id: 1, name: 'Roya asiática',       crop: 'Soja',         defaultThreshold: 15,  defaultUnit: '%',              custom: '', active: true  },
        { id: 2, name: 'Trips del maíz',      crop: 'Maíz',         defaultThreshold: 25,  defaultUnit: 'trips/hoja',     custom: '', active: true  },
        { id: 3, name: 'Pulgón verde',         crop: 'Soja / Trigo', defaultThreshold: 500, defaultUnit: 'pulgones/metro', custom: '', active: true  },
        { id: 4, name: 'Chinche de la soja',  crop: 'Soja',         defaultThreshold: 1,   defaultUnit: 'chinche/metro',  custom: '', active: true  },
        { id: 5, name: 'Fusariosis',           crop: 'Trigo / Maíz',defaultThreshold: 10,  defaultUnit: '%',              custom: '', active: false },
      ]);
      const defaultPhenoCfg = () => ([
        { stage: 'Germinación',    icon: '🌱', days: 5,  active: true },
        { stage: 'Macollaje',      icon: '🌿', days: 7,  active: true },
        { stage: 'Floración',      icon: '🌸', days: 4,  active: true },
        { stage: 'Fructificación', icon: '🌾', days: 6,  active: true },
        { stage: 'Madurez',        icon: '🟡', days: 10, active: true },
      ]);
      const onCfgFieldChange = fid => {
        setCfgField(fid); setCfgLot(''); setCfgCampaign('');
        setPestConfig(defaultPestCfg()); setPhenoConfig(defaultPhenoCfg());
      };
      const onCfgLotChange = lotId => {
        setCfgLot(lotId); setCfgCampaign('');
        setPestConfig(defaultPestCfg()); setPhenoConfig(defaultPhenoCfg());
      };
      const onCfgCampaignChange = campId => {
        setCfgCampaign(campId);
        if (!cfgField || !cfgLot || !campId) return;
        const key = `${cfgField}-${cfgLot}-${campId}`;
        const saved = savedConfigs[key];
        if (saved) { setPestConfig(saved.pestConfig); setPhenoConfig(saved.phenoConfig); }
        else { setPestConfig(defaultPestCfg()); setPhenoConfig(defaultPhenoCfg()); }
      };

      const showConfigSaved = (msg) => { setConfigSaved(msg); setTimeout(() => setConfigSaved(null), 2200); };
      const Toggle = ({ value, onChange }) => (
        <button onClick={() => onChange(!value)} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: value ? 'var(--accent)' : '#9CA3AF', border: 'none', borderRadius: 20, padding: '4px 10px 4px 4px', cursor: 'pointer', transition: 'background 0.18s', flexShrink: 0 }}>

                    {alertSevIcon[a.severity]}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
                      <div>
                        <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, marginBottom: 2 }}>{a.lotName} — {a.fieldName}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4 }}>{a.description}</div>

                        </div>
                      </div>
                      <button className="btn btn-secondary btn-sm" onClick={() => dismiss(a.id)}>Descartar</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
