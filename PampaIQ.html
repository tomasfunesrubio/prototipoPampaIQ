      };

      return (
        <PageShell breadcrumbs={['Catálogo de Plagas y Enfermedades']} actions={<button className="btn btn-primary" onClick={openCreate}><Icon name="plus" size={14} color="#fff" /> Nueva plaga</button>}>
          <div className="page-header">
            <div><div className="page-title">Catálogo de Plagas y Enfermedades</div><div className="page-subtitle">{pests.length} plagas registradas</div></div>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Plaga / Enfermedad</th><th>Cultivos afectados</th><th>Umbral crítico</th><th>Unidad</th><th>Acciones</th></tr></thead>
              <tbody>
                {pests.map(p => (
                  <tr key={p.id}>
                    <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>🐛 {p.name}</td>
                    <td><div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>{p.crops.map(c => <span key={c} className="badge badge-info">{c}</span>)}</div></td>
                    <td className="td-mono">{p.threshold}</td>
                    <td style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{p.unit}</td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-ghost btn-icon btn-sm" onClick={() => openEdit(p)}><Icon name="edit" size={14} /></button>
                        <button className="btn btn-ghost btn-icon btn-sm" style={{ color: 'var(--critical)' }} onClick={() => setPests(pests.filter(pp => pp.id !== p.id))}><Icon name="trash" size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <Modal open={modal} onClose={() => setModal(false)} title={editing ? 'Editar plaga/enfermedad' : 'Nueva plaga o enfermedad'}
            footer={<><button className="btn btn-secondary" onClick={() => setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Guardar</button></>}>
            <div className="form-group">
              <label className="form-label">Nombre *</label>
              <input className={`form-input ${errors.name ? 'error' : ''}`} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ej. Roya asiática" />
              {errors.name && <span className="form-error">⚠ {errors.name}</span>}
            </div>
            <div className="form-group">
              <label className="form-label">Cultivos afectados</label>
              <div className="chip-group">
                {allCrops.map(c => <div key={c} className={`chip ${form.crops.includes(c) ? 'selected' : ''}`} onClick={() => toggleCrop(c)}>{c}</div>)}
              </div>
            </div>
            <div className="form-row form-row-2">
              <div className="form-group">
                <label className="form-label">Umbral crítico *</label>
                <input type="number" className={`form-input ${errors.threshold ? 'error' : ''}`} value={form.threshold} onChange={e => setForm({ ...form, threshold: e.target.value })} placeholder="Ej. 15" />
                {errors.threshold && <span className="form-error">⚠ {errors.threshold}</span>}
              </div>
              <div className="form-group">
                <label className="form-label">Unidad de medida</label>
                <input className="form-input" value={form.unit} onChange={e => setForm({ ...form, unit: e.target.value })} placeholder="Ej. % incidencia foliar" />
              </div>
            </div>
          </Modal>
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // PROFILE
    // ══════════════════════════════════════════════════════════════════════════════
    const ProfileScreen = () => {
      const [form, setForm] = useState({ name: DATA.currentUser.name, email: DATA.currentUser.email });
      const [passForm, setPassForm] = useState({ current: '', new: '', confirm: '' });
      const [saved, setSaved] = useState(false);
      const [passSaved, setPassSaved] = useState(false);
      const [passErrors, setPassErrors] = useState({});

      const validatePass = () => {
        const e = {};
        if (!passForm.current) e.current = 'Ingresá tu contraseña actual';
        if (!passForm.new || passForm.new.length < 8) e.new = 'La nueva contraseña debe tener al menos 8 caracteres';
        if (passForm.new !== passForm.confirm) e.confirm = 'Las contraseñas no coinciden';
        setPassErrors(e);
        return Object.keys(e).length === 0;
      };

      return (
        <PageShell breadcrumbs={['Mi Perfil']}>
          <div className="page-header">
            <div><div className="page-title">Mi Perfil</div></div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, maxWidth: 800 }}>
            <div className="card">
              <div className="card-header">
                <div className="card-title">👤 Datos personales</div>
              </div>
              <div className="card-body">
                <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
                  <Avatar initials="JP" size={52} />
                  <div>
                    <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16 }}>{DATA.currentUser.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Productor</div>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">Nombre completo</label>
                  <input className="form-input" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                </div>
                <div className="form-group">
                  <label className="form-label">Email</label>
                  <input type="email" className="form-input" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} />
                </div>
                {saved && <div style={{ color: 'var(--success)', fontSize: 12, marginBottom: 8 }}>✓ Datos guardados</div>}
                <button className="btn btn-primary btn-sm" onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 2000); }}>Guardar cambios</button>
              </div>
            </div>

            <div className="card">
              <div className="card-header"><div className="card-title">🔒 Cambiar contraseña</div></div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">Contraseña actual *</label>
                  <input type="password" className={`form-input ${passErrors.current ? 'error' : ''}`} value={passForm.current} onChange={e => setPassForm({ ...passForm, current: e.target.value })} />
                  {passErrors.current && <span className="form-error">⚠ {passErrors.current}</span>}
                </div>
                <div className="form-group">
                  <label className="form-label">Nueva contraseña *</label>
                  <input type="password" className={`form-input ${passErrors.new ? 'error' : ''}`} value={passForm.new} onChange={e => setPassForm({ ...passForm, new: e.target.value })} />
                  {passErrors.new && <span className="form-error">⚠ {passErrors.new}</span>}
                </div>
                <div className="form-group">
                  <label className="form-label">Confirmar nueva contraseña *</label>
                  <input type="password" className={`form-input ${passErrors.confirm ? 'error' : ''}`} value={passForm.confirm} onChange={e => setPassForm({ ...passForm, confirm: e.target.value })} />
                  {passErrors.confirm && <span className="form-error">⚠ {passErrors.confirm}</span>}
                </div>
                {passSaved && <div style={{ color: 'var(--success)', fontSize: 12, marginBottom: 8 }}>✓ Contraseña actualizada</div>}
                <button className="btn btn-primary btn-sm" onClick={() => { if (validatePass()) { setPassSaved(true); setPassForm({ current: '', new: '', confirm: '' }); setTimeout(() => setPassSaved(false), 2000); } }}>Cambiar contraseña</button>
              </div>
            </div>
          </div>
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // USERS & PERMISSIONS
    // ══════════════════════════════════════════════════════════════════════════════
    const UsersScreen = () => {
      const [tab, setTab] = useState('users');
      const [users, setUsers] = useState(DATA.users);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ name: '', email: '', role: 'Asesor', active: true, password: '' });
      const [errors, setErrors] = useState({});
      const [confirmDel, setConfirmDel] = useState(null);
      const { modules, roles } = DATA.permissions;

      const openCreate = () => { setEditing(null); setForm({ name: '', email: '', role: 'Asesor', active: true, password: '' }); setErrors({}); setModal(true); };
      const openEdit = (u) => { setEditing(u); setForm({ name: u.name, email: u.email, role: u.role, active: u.active, password: '' }); setErrors({}); setModal(true); };

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'El nombre es obligatorio';
        if (!form.email.trim()) e.email = 'El email es obligatorio';
        else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = 'Email inválido';
        if (!editing && !form.password) e.password = 'La contraseña inicial es obligatoria';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const save = () => {
        if (!validate()) return;
        if (editing) {
          setUsers(users.map(u => u.id === editing.id ? { ...u, name: form.name, email: form.email, role: form.role, active: form.active } : u));
        } else {
          setUsers([...users, { id: Date.now(), name: form.name, email: form.email, role: form.role, active: form.active }]);
        }
        setModal(false);
      };

      const roleBadge = { Admin: 'badge-neutral', Asesor: 'badge-info', Productor: 'badge-success' };
      const roleAvatarBg = { Admin: 'var(--dark)', Asesor: '#6366F1', Productor: 'var(--accent)' };

      return (
        <PageShell breadcrumbs={['Gestión de Usuarios y Permisos']}>
          <div className="page-header">
            <div><div className="page-title">Usuarios y Permisos</div><div className="page-subtitle">Administración de accesos al sistema</div></div>
            <button className="btn btn-primary" onClick={openCreate}><Icon name="plus" size={14} color="#fff" /> Nuevo usuario</button>
          </div>

          <div className="tabs">
            <div className={`tab ${tab === 'users' ? 'active' : ''}`} onClick={() => setTab('users')}>Usuarios <span style={{ marginLeft: 4, background: 'var(--border)', color: 'var(--text-secondary)', fontSize: 10, padding: '1px 6px', borderRadius: 10, fontFamily: 'var(--font-mono)' }}>{users.length}</span></div>
            <div className={`tab ${tab === 'perms' ? 'active' : ''}`} onClick={() => setTab('perms')}>Matriz de permisos</div>
          </div>

          {tab === 'users' && (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id}>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                          <Avatar initials={u.name.split(' ').filter(Boolean).slice(-2).map(n => n[0]).join('')} size={28} bg={roleAvatarBg[u.role] || 'var(--accent)'} />
                          <span style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{u.name}</span>
                        </div>
                      </td>
                      <td style={{ color: 'var(--text-secondary)' }}>{u.email}</td>
                      <td><span className={`badge ${roleBadge[u.role] || 'badge-neutral'}`}>{u.role}</span></td>
                      <td>
                        <button onClick={() => setUsers(users.map(uu => uu.id === u.id ? { ...uu, active: !uu.active } : uu))}
                          className={`badge ${u.active ? 'badge-success' : 'badge-closed'}`}
                          style={{ cursor: 'pointer', border: 'none', fontFamily: 'var(--font-head)' }}>
                          {u.active ? '✓ Activo' : '✗ Inactivo'}
                        </button>
                      </td>
                      <td>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn btn-ghost btn-icon btn-sm" title="Editar" onClick={() => openEdit(u)}><Icon name="edit" size={14} /></button>
                          <button className="btn btn-ghost btn-icon btn-sm" title="Eliminar" style={{ color: 'var(--critical)' }} onClick={() => setConfirmDel(u.id)}><Icon name="trash" size={14} /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {tab === 'perms' && (
            <div className="perm-matrix table-wrap">
              <table className="perm-table">
                <thead>
                  <tr>
                    <th>Módulo</th>
                    {roles.map(r => <th key={r}>{r}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {modules.map((m, i) => (
                    <tr key={i}>
                      <td>{m.name}</td>
                      {roles.map(r => {
                        const rKey = r.toLowerCase();
                        const val = m[rKey];
                        return (
                          <td key={r} className="perm-check">
                            {val === true && <span className="perm-icon" title="Acceso completo">✅</span>}
                            {val === 'edit' && <span className="perm-icon" title="Lectura y edición">✏️</span>}
                            {val === 'view' && <span className="perm-icon" title="Solo lectura">👁️</span>}
                            {val === false && <span className="perm-icon" title="Sin acceso"><Icon name="lock" size={14} color="var(--text-muted)" /></span>}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border)', display: 'flex', gap: 16, fontSize: 12, color: 'var(--text-secondary)' }}>
                <span>✅ Acceso completo</span>
                <span>✏️ Lectura y edición</span>
                <span>👁️ Solo lectura</span>
                <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="lock" size={12} color="var(--text-muted)" /> Sin acceso</span>
              </div>
            </div>
          )}

          {/* Create / Edit User Modal */}
          <Modal open={modal} onClose={() => setModal(false)} title={editing ? `Editar usuario — ${editing.name}` : 'Nuevo usuario'}
            footer={<>
              <button className="btn btn-secondary" onClick={() => setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={save}>{editing ? 'Guardar cambios' : 'Crear usuario'}</button>
            </>}>

            <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '4px 0 16px', borderBottom: '1px solid var(--border)', marginBottom: 16 }}>
              <Avatar
                initials={form.name ? form.name.split(' ').filter(Boolean).slice(-2).map(n => n[0]).join('').toUpperCase() : '?'}
                size={44}
                bg={roleAvatarBg[form.role] || 'var(--accent)'}
              />
              <div>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, color: 'var(--dark)' }}>{form.name || 'Nombre del usuario'}</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>{form.role} · {form.active ? 'Activo' : 'Inactivo'}</div>
              </div>
            </div>

            <div className="form-row form-row-2">
              <div className="form-group" style={{ gridColumn: '1/-1' }}>
                <label className="form-label">Nombre completo *</label>
                <input className={`form-input ${errors.name ? 'error' : ''}`} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ej. Ing. Agr. Carlos Mendez" />
                {errors.name && <span className="form-error">⚠ {errors.name}</span>}
              </div>
              <div className="form-group" style={{ gridColumn: '1/-1' }}>
                <label className="form-label">Email *</label>
                <input type="email" className={`form-input ${errors.email ? 'error' : ''}`} value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="usuario@email.com" />
                {errors.email && <span className="form-error">⚠ {errors.email}</span>}
              </div>
              <div className="form-group">
                <label className="form-label">Rol</label>
                <select className="form-input form-select" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}>
                  <option value="Productor">Productor</option>
                  <option value="Asesor">Asesor</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Estado</label>
                <StatusToggle value={form.active ? 'activa' : 'cerrada'} onChange={v => setForm({ ...form, active: v === 'activa' })} />
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">{editing ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña inicial *'}</label>
              <input type="password" className={`form-input ${errors.password ? 'error' : ''}`} value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} placeholder="Mínimo 8 caracteres" />
              {errors.password && <span className="form-error">⚠ {errors.password}</span>}
            </div>

            <div className="info-box">
              <Icon name="info" size={14} color="var(--accent)" />
              <span>El usuario recibirá sus credenciales por email y podrá cambiar su contraseña desde su perfil.</span>
            </div>
          </Modal>

          <ConfirmDialog open={!!confirmDel} onClose={() => setConfirmDel(null)}
            onConfirm={() => { setUsers(users.filter(u => u.id !== confirmDel)); setConfirmDel(null); }}
            title="Eliminar usuario"
            message="¿Estás seguro que querés eliminar este usuario? Perderá el acceso al sistema de forma inmediata."
            confirmLabel="Eliminar usuario" danger />
        </PageShell>
      );
    };

    Object.assign(window, {
      LoginScreen, DashboardScreen, LotDetailScreen,
      FieldsScreen, LotsScreen, CampaignsScreen,
      VisitsScreen, VisitCreateScreen, VisitDetailScreen,
      OrdersScreen, AlertsScreen,
      PhenologicalAnalysisScreen, SanitaryEvolutionScreen,
      CampaignDetailScreen,
      CostsScreen, ReportsScreen,
      AdvisorsScreen, PestsCatalogScreen,
      ProfileScreen, UsersScreen,
    });

  </script>

  <script type="text/babel">
    // app-main.jsx — Root app with routing, tweaks, mobile nav

    // const { useState, useEffect } = React;

    // ── Tweaks defaults ──────────────────────────────────────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "viewMode": "desktop",
      "accentColor": "#3D8B5E",
      "darkNav": true,
      "compactDensity": false,
      "showMobileFrame": true
    }/*EDITMODE-END*/;

    // ── Main App ─────────────────────────────────────────────────────────────────
    const App = () => {
      const [screen, setScreen] = useState('login');
      const [navData, setNavData] = useState(null);
      const [loggedIn, setLoggedIn] = useState(false);
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [isMobile, setIsMobile] = useState(false);
      const [drawerOpen, setDrawerOpen] = useState(false);

      // Sync accent color
      useEffect(() => {
        document.documentElement.style.setProperty('--accent', tweaks.accentColor);
        document.documentElement.style.setProperty('--nav-bg', tweaks.darkNav ? '#1E3A2F' : tweaks.accentColor);
      }, [tweaks.accentColor, tweaks.darkNav]);

      // Detect viewport
      useEffect(() => {
        const check = () => setIsMobile(window.innerWidth < 769);
        check();
        window.addEventListener('resize', check);
        return () => window.removeEventListener('resize', check);
      }, []);

      // Tweaks host protocol
      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const setTweak = (key, value) => {
        const next = typeof key === 'object' ? { ...tweaks, ...key } : { ...tweaks, [key]: value };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      };

      const handleLogin = () => { setLoggedIn(true); setScreen('dashboard'); };
      const handleNav = (id, data = null) => {
        if (id === 'login') { setLoggedIn(false); setScreen('login'); return; }
        setNavData(data);
        setScreen(id);
      };

      const alertCount = DATA.alerts.filter(a => !a.resolved).length;

      const mobileView = tweaks.viewMode === 'mobile' || isMobile;

      // Auth screens — wrap in phone on mobile, full-page on desktop
      if (!loggedIn || screen === 'login') {
        if (!mobileView) {
          return (
            <>
              <LoginScreen onLogin={handleLogin} />
              {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} />}
            </>
          );
        }
        // Mobile login inside phone bezel
        return (
          <div className="phone-mockup-stage">
            <div className="phone-bezel">
              <div className="phone-dynamic-island" />
              <div className="phone-screen">
                <div className="phone-status-bar">
                  <span className="phone-status-time">9:41</span>
                  <div className="phone-status-icons">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity="0.4" /><rect x="4" y="2" width="3" height="10" rx="1" fill="white" opacity="0.6" /><rect x="8" y="0" width="3" height="12" rx="1" fill="white" opacity="0.8" /><rect x="12" y="0" width="3" height="12" rx="1" fill="white" /></svg>
                    <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" strokeOpacity="0.35" /><rect x="2" y="2" width="17" height="8" rx="2" fill="white" /><path d="M23 4.5V7.5C23.8 7.2 24.5 6.4 24.5 6C24.5 5.6 23.8 4.8 23 4.5Z" fill="white" fillOpacity="0.4" /></svg>
                  </div>
                </div>
                <div className="phone-content">
                  <MobileLoginScreen onLogin={handleLogin} />
                </div>
              </div>
            </div>
            {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} />}
          </div>
        );
      }

      const renderScreen = () => {
        switch (screen) {
          case 'dashboard': return <DashboardScreen onNav={handleNav} />;
          case 'fields': return <FieldsScreen onNav={handleNav} />;
          case 'lots': return <LotsScreen onNav={handleNav} />;
          case 'lot_detail': return <LotDetailScreen lot={navData} onBack={() => handleNav('dashboard')} onNav={handleNav} />;
          case 'lot_edit': return <LotsScreen onNav={handleNav} editLot={navData} />;
          case 'campaigns': return <CampaignsScreen onNav={handleNav} />;
          case 'visits': return <VisitsScreen onNav={handleNav} />;
          case 'orders': return <OrdersScreen />;
          case 'alerts': return <AlertsScreen />;
          case 'campaign_detail': return <CampaignDetailScreen campaign={navData} onNav={handleNav} />;
          case 'history_pheno': return <PhenologicalAnalysisScreen />;
          case 'history_sanitary': return <SanitaryEvolutionScreen />;
          case 'costs': return <CostsScreen />;
          case 'reports': return <ReportsScreen />;
          case 'advisors': return <AdvisorsScreen />;
          case 'pests_catalog': return <PestsCatalogScreen />;
          case 'profile': return <ProfileScreen />;
          case 'users': return <UsersScreen />;
          default: return <DashboardScreen onNav={handleNav} />;
        }
      };

      // Desktop layout
      if (!mobileView) {
        return (
          <div className="app-shell">
            <Sidebar active={screen} onNav={handleNav} alertCount={alertCount} />
            <div className="main-content">

            {tweaksOpen && (

                tweaks={tweaks}
                setTweak={setTweak}
                onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}
              />
            )}
          </div>
        );
      }

      // Mobile layout — phone mockup
      return (

          <div className="phone-bezel">
            {/* Dynamic Island */}
            <div className="phone-dynamic-island" />

            <div className="phone-screen">

              <div className="phone-status-bar">
                <span className="phone-status-time">9:41</span>
                <div className="phone-status-icons">
                  {alertCount > 0 && (
                    <span style={{ background: 'var(--critical)', color: '#fff', fontSize: 9, fontWeight: 800, padding: '1px 5px', borderRadius: 8, fontFamily: 'var(--font-mono)' }}>{alertCount}</span>
                  )}
                  <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity="0.4" />
                    <rect x="4" y="2" width="3" height="10" rx="1" fill="white" opacity="0.6" />
                    <rect x="8" y="0" width="3" height="12" rx="1" fill="white" opacity="0.8" />
                    <rect x="12" y="0" width="3" height="12" rx="1" fill="white" />
                  </svg>
                  <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <path d="M8 2.5C10.5 2.5 12.7 3.6 14.2 5.3L15.5 4C13.6 1.9 10.9 0.5 8 0.5C5.1 0.5 2.4 1.9 0.5 4L1.8 5.3C3.3 3.6 5.5 2.5 8 2.5Z" fill="white" opacity="0.5" />
                    <path d="M8 5.5C9.7 5.5 11.2 6.2 12.3 7.3L13.6 6C12.1 4.5 10.2 3.5 8 3.5C5.8 3.5 3.9 4.5 2.4 6L3.7 7.3C4.8 6.2 6.3 5.5 8 5.5Z" fill="white" opacity="0.75" />
                    <circle cx="8" cy="10" r="1.5" fill="white" />
                  </svg>
                  <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                    <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" strokeOpacity="0.35" />
                    <rect x="2" y="2" width="17" height="8" rx="2" fill="white" />
                    <path d="M23 4.5V7.5C23.8 7.2 24.5 6.4 24.5 6C24.5 5.6 23.8 4.8 23 4.5Z" fill="white" fillOpacity="0.4" />
                  </svg>
                </div>
              </div>

              {/* App topbar */}
              <div style={{
                background: 'var(--nav-bg)',
                padding: '10px 16px 14px',
                display: 'flex', alignItems: 'center', gap: 10,
                flexShrink: 0,
                position: 'relative',
              }}>
                <button className="hamburger-btn" onClick={() => setDrawerOpen(true)} aria-label="Menú">
                  &#9776;
                </button>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 17, color: '#fff', display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ width: 26, height: 26, background: 'var(--accent)', borderRadius: 7, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 13 }}>🌱</span>
                  PampaIQ
                </div>
                <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
                  {alertCount > 0 && (
                    <button onClick={() => handleNav('alerts')} style={{ width: 34, height: 34, borderRadius: '50%', background: 'var(--critical)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
                      <Icon name="alert" size={14} color="#fff" />
                      <span style={{ position: 'absolute', top: -2, right: -2, background: '#fff', color: 'var(--critical)', fontSize: 9, fontWeight: 800, width: 15, height: 15, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-mono)' }}>{alertCount}</span>
                    </button>
                  )}
                  <Avatar initials="JP" size={32} />

              </div>

              {/* Scrollable content */}
              <div className="phone-content" style={{ background: 'var(--bg)' }}>
                <MobileScreenWrapper screen={screen} onNav={handleNav} alertCount={alertCount} navData={navData} />
              </div>

              {/* Bottom nav */}
              <MobileNav active={screen} onNav={handleNav} alertCount={alertCount} />

              {/* Mobile Drawer — overlays entire phone screen */}
              {drawerOpen && (
                <MobileDrawer
                  active={screen}
                  onNav={handleNav}
                  alertCount={alertCount}
                  onClose={() => setDrawerOpen(false)}

          {tweaksOpen && (
            <TweaksPanel
              tweaks={tweaks}
              setTweak={setTweak}
              onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}
            />
          )}
        </div>
      );
    };

    // ── Mobile Login ──────────────────────────────────────────────────────────────
    const MobileLoginScreen = ({ onLogin }) => {
      // Login state
      const [email, setEmail] = React.useState('juan@laesperanza.com.ar');
      const [pass, setPass] = React.useState('');
      const [loginErrors, setLoginErrors] = React.useState({});

      // Recovery flow: 'login' | 'step1' | 'step2' | 'step3' | 'success'
      const [mode, setMode] = React.useState('login');
      const [recEmail, setRecEmail] = React.useState('');
      const [recEmailErr, setRecEmailErr] = React.useState('');
      const [otpDigits, setOtpDigits] = React.useState(['', '', '', '', '', '']);
      const [otpError, setOtpError] = React.useState('');
      const [resent, setResent] = React.useState(false);
      const [newPass, setNewPass] = React.useState('');
      const [confirmPass, setConfirmPass] = React.useState('');
      const [showNew, setShowNew] = React.useState(false);
      const [showConfirm, setShowConfirm] = React.useState(false);
      const [passErrors, setPassErrors] = React.useState({});

      const otpRefs = [React.useRef(), React.useRef(), React.useRef(), React.useRef(), React.useRef(), React.useRef()];

      const goLogin = () => {
        setMode('login');
        setRecEmail(''); setRecEmailErr('');
        setOtpDigits(['', '', '', '', '', '']); setOtpError(''); setResent(false);
        setNewPass(''); setConfirmPass(''); setPassErrors({});
      };

      // Login submit
      const handleLogin = () => {
        const e = {};
        if (!email) e.email = 'El email es obligatorio';
        else if (!/\S+@\S+\.\S+/.test(email)) e.email = 'Email inválido';
        if (!pass) e.pass = 'La contraseña es obligatoria';
        setLoginErrors(e);
        if (Object.keys(e).length === 0) onLogin();
      };

      // Step 1: send code
      const handleSendCode = () => {
        if (!recEmail) { setRecEmailErr('El email es obligatorio'); return; }
        if (!/\S+@\S+\.\S+/.test(recEmail)) { setRecEmailErr('Ingresá un email válido'); return; }
        setRecEmailErr('');
        setMode('step2');
      };

      // Step 2: OTP handling
      const handleOtpChange = (idx, val) => {
        const v = val.replace(/\D/g, '').slice(0, 1);
        const next = [...otpDigits];
        next[idx] = v;
        setOtpDigits(next);
        setOtpError('');
        if (v && idx < 5) otpRefs[idx + 1].current?.focus();
      };
      const handleOtpKeyDown = (idx, e) => {
        if (e.key === 'Backspace' && !otpDigits[idx] && idx > 0) otpRefs[idx - 1].current?.focus();
      };
      const handleOtpPaste = (e) => {
        const text = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        if (text.length === 6) {
          setOtpDigits(text.split(''));
          setOtpError('');
          otpRefs[5].current?.focus();
          e.preventDefault();
        }
      };
      const handleVerifyOtp = () => {
        const code = otpDigits.join('');
        if (code.length < 6) { setOtpError('Ingresá los 6 dígitos del código'); return; }
        setOtpError('');
        setMode('step3');
      };
      const handleResend = (e) => {
        e.preventDefault();
        setResent(true);
        setOtpDigits(['', '', '', '', '', '']);
        setOtpError('');
        setTimeout(() => setResent(false), 3000);
      };

      // Step 3: change password
      const passMatch = newPass && confirmPass && newPass === confirmPass;
      const passMismatch = newPass && confirmPass && newPass !== confirmPass;
      const handleChangePass = () => {
        const e = {};
        if (!newPass) e.newPass = 'Ingresá la nueva contraseña';
        else if (newPass.length < 8) e.newPass = 'Mínimo 8 caracteres';
        if (!confirmPass) e.confirmPass = 'Confirmá la contraseña';
        else if (newPass !== confirmPass) e.confirmPass = 'Las contraseñas no coinciden';
        setPassErrors(e);
        if (Object.keys(e).length === 0) setMode('success');
      };

      // Step progress dots
      const StepDots = ({ current }) => (
        <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 20 }}>
          {[1, 2, 3].map(n => (
            <div key={n} style={{ width: n === current ? 24 : 8, height: 8, borderRadius: 4, background: n === current ? 'var(--accent)' : n < current ? 'var(--accent)' : 'var(--border)', transition: 'all 0.25s', opacity: n < current ? 0.45 : 1 }} />
          ))}
        </div>
      );

      // Password show/hide toggle
      const EyeBtn = ({ show, onToggle }) => (
        <button type="button" onClick={onToggle} style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', padding: 0, lineHeight: 1, fontSize: 18 }}>
          {show ? '🙈' : '👁'}
        </button>
      );

      return (
        <div style={{ minHeight: '100%', background: 'var(--dark)', display: 'flex', flexDirection: 'column' }}>
          {/* Brand header */}
          <div style={{ background: 'linear-gradient(160deg, #1E3A2F 0%, #2a5240 100%)', padding: '32px 24px 28px', textAlign: 'center', flexShrink: 0 }}>
            <div style={{ fontSize: 40, marginBottom: 10 }}>🌾</div>
            <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 24, color: '#fff', letterSpacing: '-0.5px' }}>PampaIQ</div>
            <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', marginTop: 4 }}>Gestión agropecuaria inteligente</div>
          </div>

          {/* Form card */}
          <div style={{ flex: 1, background: 'var(--bg)', borderRadius: '24px 24px 0 0', padding: '28px 24px 32px', marginTop: -16 }}>

            {/* ── LOGIN ── */}
            {mode === 'login' && (
              <>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 20, color: 'var(--dark)', marginBottom: 6 }}>Bienvenido</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 24 }}>Ingresá a tu cuenta para continuar</div>
                <div className="form-group">
                  <label className="form-label">Email</label>
                  <input className={`form-input ${loginErrors.email ? 'error' : ''}`} type="email" value={email} onChange={e => { setEmail(e.target.value); setLoginErrors(prev => ({ ...prev, email: '' })); }} placeholder="tu@email.com" style={{ height: 48, fontSize: 15 }} />
                  {loginErrors.email && <span className="form-error">⚠ {loginErrors.email}</span>}
                </div>
                <div className="form-group">
                  <label className="form-label">Contraseña</label>
                  <input className={`form-input ${loginErrors.pass ? 'error' : ''}`} type="password" value={pass} onChange={e => { setPass(e.target.value); setLoginErrors(prev => ({ ...prev, pass: '' })); }} placeholder="••••••••" style={{ height: 48, fontSize: 15 }} />
                  {loginErrors.pass && <span className="form-error">⚠ {loginErrors.pass}</span>}
                </div>
                <div style={{ textAlign: 'right', marginBottom: 20, marginTop: -8 }}>
                  <a href="#" onClick={e => { e.preventDefault(); setMode('step1'); setRecEmail(email); }} style={{ fontSize: 13, color: 'var(--accent)' }}>Olvidé mi contraseña</a>
                </div>
                <button onClick={handleLogin} style={{ width: '100%', height: 52, background: 'var(--accent)', color: '#fff', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16, border: 'none', cursor: 'pointer', boxShadow: '0 4px 16px rgba(61,139,94,0.35)' }}>
                  Ingresar
                </button>
              </>
            )}

            {/* ── STEP 1 — EMAIL ── */}
            {mode === 'step1' && (
              <>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 20, color: 'var(--dark)', marginBottom: 6 }}>Recuperar contraseña</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16 }}>Verificá tu identidad</div>
                <StepDots current={1} />
                <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20, lineHeight: 1.6 }}>
                  Ingresá el email asociado a tu cuenta y te enviaremos un código de verificación de 6 dígitos.
                </p>
                <div className="form-group">
                  <label className="form-label">Email registrado</label>
                  <input
                    className={`form-input ${recEmailErr ? 'error' : ''}`}
                    type="email" value={recEmail} maxLength={100}
                    onChange={e => { setRecEmail(e.target.value); setRecEmailErr(''); }}
                    placeholder="tu@email.com"
                    style={{ height: 48, fontSize: 15 }}
                    autoFocus
                  />
                  {recEmailErr && <span className="form-error">⚠ {recEmailErr}</span>}
                </div>
                <button onClick={handleSendCode} style={{ width: '100%', height: 52, background: 'var(--accent)', color: '#fff', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16, border: 'none', cursor: 'pointer', marginBottom: 14, boxShadow: '0 4px 16px rgba(61,139,94,0.35)' }}>
                  Enviar código
                </button>
                <button onClick={goLogin} style={{ width: '100%', height: 48, background: 'transparent', color: 'var(--text-secondary)', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 600, fontSize: 14, border: '1.5px solid var(--border)', cursor: 'pointer' }}>
                  ← Volver al inicio de sesión
                </button>
              </>
            )}

            {/* ── STEP 2 — OTP ── */}
            {mode === 'step2' && (
              <>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 20, color: 'var(--dark)', marginBottom: 6 }}>Verificá tu email</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16 }}>Código de verificación</div>
                <StepDots current={2} />
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <div style={{ fontSize: 40, marginBottom: 10 }}>📬</div>
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                    Enviamos un código de 6 dígitos a<br />
                    <strong style={{ color: 'var(--dark)' }}>{recEmail}</strong>
                  </p>
                </div>

                {/* 6-digit OTP inputs */}
                <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 8 }} onPaste={handleOtpPaste}>
                  {otpDigits.map((d, i) => (
                    <input
                      key={i}
                      ref={otpRefs[i]}
                      type="text" inputMode="numeric" maxLength={1}
                      value={d}
                      onChange={e => handleOtpChange(i, e.target.value)}
                      onKeyDown={e => handleOtpKeyDown(i, e)}
                      style={{
                        width: 42, height: 52, textAlign: 'center',
                        fontSize: 22, fontWeight: 700, fontFamily: 'var(--font-mono)',
                        border: `2px solid ${otpError ? 'var(--critical)' : d ? 'var(--accent)' : 'var(--border)'}`,
                        borderRadius: 10, outline: 'none', background: d ? 'var(--accent-light)' : '#fff',
                        color: 'var(--dark)', transition: 'border-color 0.15s, background 0.15s',
                      }}
                    />
                  ))}
                </div>
                {otpError && <div style={{ textAlign: 'center', marginBottom: 10 }}><span className="form-error">⚠ {otpError}</span></div>}

                <button onClick={handleVerifyOtp} style={{ width: '100%', height: 52, background: 'var(--accent)', color: '#fff', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16, border: 'none', cursor: 'pointer', marginTop: 12, marginBottom: 14, boxShadow: '0 4px 16px rgba(61,139,94,0.35)' }}>
                  Verificar código
                </button>
                <div style={{ textAlign: 'center', marginBottom: 14 }}>
                  {resent
                    ? <span style={{ fontSize: 13, color: 'var(--success)', fontWeight: 600 }}>✓ Código reenviado</span>
                    : <a href="#" onClick={handleResend} style={{ fontSize: 13, color: 'var(--accent)' }}>¿No recibiste el código? Reenviar</a>
                  }
                </div>
                <button onClick={() => setMode('step1')} style={{ width: '100%', height: 48, background: 'transparent', color: 'var(--text-secondary)', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 600, fontSize: 14, border: '1.5px solid var(--border)', cursor: 'pointer' }}>
                  ← Volver
                </button>
              </>
            )}

            {/* ── STEP 3 — NUEVA CONTRASEÑA ── */}
            {mode === 'step3' && (
              <>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 20, color: 'var(--dark)', marginBottom: 6 }}>Nueva contraseña</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16 }}>Elegí una contraseña segura</div>
                <StepDots current={3} />

                <div className="form-group">
                  <label className="form-label">Nueva contraseña</label>
                  <div style={{ position: 'relative' }}>
                    <input
                      className={`form-input ${passErrors.newPass ? 'error' : ''}`}
                      type={showNew ? 'text' : 'password'}
                      value={newPass}
                      onChange={e => { setNewPass(e.target.value); setPassErrors(prev => ({ ...prev, newPass: '' })); }}
                      placeholder="Mínimo 8 caracteres"
                      style={{ height: 48, fontSize: 15, paddingRight: 44 }}
                    />
                    <EyeBtn show={showNew} onToggle={() => setShowNew(v => !v)} />
                  </div>
                  {passErrors.newPass && <span className="form-error">⚠ {passErrors.newPass}</span>}
                  {newPass && newPass.length < 8 && !passErrors.newPass && (
                    <span style={{ fontSize: 12, color: 'var(--warning)', marginTop: 4, display: 'block' }}>⚠ Mínimo 8 caracteres ({newPass.length}/8)</span>
                  )}
                </div>

                <div className="form-group">
                  <label className="form-label">Confirmar nueva contraseña</label>
                  <div style={{ position: 'relative' }}>
                    <input
                      className={`form-input ${passErrors.confirmPass || passMismatch ? 'error' : ''}`}
                      type={showConfirm ? 'text' : 'password'}
                      value={confirmPass}
                      onChange={e => { setConfirmPass(e.target.value); setPassErrors(prev => ({ ...prev, confirmPass: '' })); }}
                      placeholder="Repetí la contraseña"
                      style={{ height: 48, fontSize: 15, paddingRight: 44 }}
                    />
                    <EyeBtn show={showConfirm} onToggle={() => setShowConfirm(v => !v)} />
                  </div>
                  {passErrors.confirmPass && <span className="form-error">⚠ {passErrors.confirmPass}</span>}
                  {!passErrors.confirmPass && confirmPass && (
                    passMatch
                      ? <span style={{ fontSize: 12, color: 'var(--success)', marginTop: 4, display: 'block', fontWeight: 600 }}>✓ Las contraseñas coinciden</span>
                      : <span style={{ fontSize: 12, color: 'var(--critical)', marginTop: 4, display: 'block' }}>✗ Las contraseñas no coinciden</span>
                  )}
                </div>

                <button
                  onClick={handleChangePass}
                  style={{ width: '100%', height: 52, background: passMatch ? '#2E7D4F' : 'var(--accent)', color: '#fff', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16, border: 'none', cursor: 'pointer', marginTop: 4, boxShadow: '0 4px 16px rgba(61,139,94,0.35)', transition: 'background 0.2s' }}
                >
                  Cambiar contraseña
                </button>
              </>
            )}

            {/* ── SUCCESS ── */}
            {mode === 'success' && (
              <>
                <div style={{ textAlign: 'center', padding: '20px 0 28px' }}>
                  <div style={{ width: 72, height: 72, borderRadius: '50%', background: 'var(--accent-light)', border: '2px solid var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', fontSize: 32 }}>✓</div>
                  <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 22, color: 'var(--dark)', marginBottom: 10 }}>¡Contraseña actualizada!</div>
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.65 }}>
                    Tu contraseña fue actualizada exitosamente.<br />Ya podés iniciar sesión con tu nueva contraseña.
                  </p>
                </div>
                <button onClick={goLogin} style={{ width: '100%', height: 52, background: 'var(--accent)', color: '#fff', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 16, border: 'none', cursor: 'pointer', boxShadow: '0 4px 16px rgba(61,139,94,0.35)' }}>
                  Ir al inicio de sesión
                </button>
              </>
            )}

          </div>
        </div>
      );
    };

    // ── Mobile Screen Wrapper — mobile-optimised layouts ─────────────────────────
    const MobileScreenWrapper = ({ screen, onNav, alertCount, navData }) => {
      const p = { padding: '16px 16px 0' };

      // Mobile Dashboard
      if (screen === 'dashboard') {
        const criticalAlerts = DATA.alerts.filter(a => !a.resolved && (a.severity === 'critical' || a.severity === 'high'));
        const pendingOrders = DATA.orders.filter(o => o.status === 'pendiente');
        return (
          <div style={{ padding: '14px 14px 20px' }}>
            <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 18, color: 'var(--dark)', marginBottom: 12 }}>Buenos días, Juan 👋</div>

            {criticalAlerts.length > 0 && (
              <div onClick={() => onNav('alerts')} style={{ background: 'var(--critical-light)', border: '1.5px solid var(--critical)', borderRadius: 12, padding: '12px 14px', marginBottom: 14, cursor: 'pointer' }}>
                <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, color: 'var(--critical)', marginBottom: 4 }}>🚨 {criticalAlerts.length} alerta{criticalAlerts.length > 1 ? 's' : ''} crítica{criticalAlerts.length > 1 ? 's' : ''}</div>
                <div style={{ fontSize: 12, color: 'var(--dark)' }}>{criticalAlerts[0].description}</div>
              </div>
            )}

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 16 }}>
              {[
                { label: 'Campos', val: '3', sub: '450 has', icon: '🏡', color: 'var(--accent-light)' },
                { label: 'Alertas', val: DATA.alerts.filter(a => !a.resolved).length, sub: `${criticalAlerts.length} críticas`, icon: '🚨', color: 'var(--critical-light)' },
                { label: 'Lotes', val: '7', sub: '2 campañas', icon: '🌾', color: 'var(--accent-light)' },
                { label: 'Órdenes pend.', val: pendingOrders.length, sub: 'Sin ejecutar', icon: '⏳', color: pendingOrders.length > 0 ? 'var(--warning-light)' : 'var(--accent-light)' },
              ].map(s => (
                <div key={s.label} style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 12, padding: '14px', boxShadow: 'var(--shadow-sm)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>

              { lot: 'Lote Sur', crop: 'Maíz', stage: 'Fructificación', sem: 'amarillo' },
              { lot: 'Lote Este', crop: 'Trigo', stage: 'Madurez', sem: 'verde' },

      // Mobile Fields
      if (screen === 'fields') {
        const [mFieldModal, setMFieldModal] = React.useState(false);
        const [mFieldEditing, setMFieldEditing] = React.useState(null);
        const [mFields, setMFields] = React.useState(DATA.fields);

        const openCreate = () => { setMFieldEditing(null); setMFieldForm(defaultForm); setMFieldErrors({}); setMFieldModal(true); };
        const openEdit = (f) => { setMFieldEditing(f); setMFieldForm({ name: f.name, province: f.province, district: f.district, area: f.area, lots: f.lots, location: f.location || '' }); setMFieldErrors({}); setMFieldModal(true); };

        const validate = () => {
          const e = {};
          if (!mFieldForm.name) e.name = 'El nombre es obligatorio';
          if (!mFieldForm.province) e.province = 'La provincia es obligatoria';
          if (!mFieldForm.area) e.area = 'La superficie es obligatoria';
          setMFieldErrors(e);
          return Object.keys(e).length === 0;
        };

        const save = () => {
          if (!validate()) return;
          if (mFieldEditing) setMFields(mFields.map(f => f.id === mFieldEditing.id ? { ...f, ...mFieldForm } : f));
          else setMFields([...mFields, { id: Date.now(), ...mFieldForm }]);
          setMFieldModal(false);
        };

        if (mFieldModal) {
          return (
            <div style={{ position: 'absolute', inset: 0, background: 'var(--bg)', zIndex: 50, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

              </div>
              <div style={{ flex: 1, overflow: 'auto', padding: '16px 16px 0' }}>

                  <label className="form-label">Nombre del campo *</label>
                  <input className={`form-input ${mFieldErrors.name ? 'error' : ''}`} style={{ height: 48 }} value={mFieldForm.name} onChange={e => setMFieldForm(f => ({ ...f, name: e.target.value }))} placeholder="Ej. La Esperanza" />

                </div>
                <div className="form-group">
                  <label className="form-label">Provincia *</label>
                  <select className={`form-input form-select ${mFieldErrors.province ? 'error' : ''}`} style={{ height: 48 }} value={mFieldForm.province} onChange={e => setMFieldForm(f => ({ ...f, province: e.target.value }))}>

                <div className="form-group">
                  <label className="form-label">Superficie total (has) *</label>
                  <input type="number" className={`form-input ${mFieldErrors.area ? 'error' : ''}`} style={{ height: 48 }} value={mFieldForm.area} onChange={e => setMFieldForm(f => ({ ...f, area: e.target.value }))} placeholder="Ej. 450" />
                  {mFieldErrors.area && <span className="form-error">⚠ {mFieldErrors.area}</span>}

                <div className="form-group">
                  <label className="form-label">Ubicación / Referencia</label>

          const matchSearch = v.lotName.toLowerCase().includes(mSearch.toLowerCase()) ||
            v.advisor.toLowerCase().includes(mSearch.toLowerCase()) ||
            v.pests.some(p => p.name.toLowerCase().includes(mSearch.toLowerCase()));
          const matchField = mFilterField === 'all' || String(v.fieldId) === mFilterField;
          const matchSev = mFilterSev === 'all' || v.severity === mFilterSev;
          return matchSearch && matchField && matchSev;
        });

        const sevAccent = { bajo: '#2E7D52', medio: '#92730A', alto: 'var(--critical)', crítico: '#DC2626' };
        const stages = ['Germinación', 'Macollaje', 'Floración', 'Fructificación', 'Madurez'];

        const mOpenEditVisit = (v) => {
          const lot = DATA.lots.find(l => l.id === v.lotId);
          setMVisitForm({
            date: v.date || '',
            fieldId: String(lot?.fieldId || ''),
            lotId: String(v.lotId || ''),
            campaignId: String(v.campaignId || ''),
            phenoStage: v.phenoStage || '',
            phenoObs: v.phenoObs || '',
            pests: v.pests ? v.pests.map(p => ({ ...p })) : [],
            plantStand: v.plantStand || '',
            cropHeight: v.cropHeight || '',
            soilCover: v.soilCover || 0,
            uniformity: v.uniformity || 'Uniforme',
            waterStress: v.waterStress || 'Sin estrés',
            aerialSurvey: v.aerialSurvey || '',
            gridData: { ...(v.gridData || {}) },
          });
          setMVisitEditing(v);
          setMVisitStep(0);
          setMVisitModal(true);
        };

        // Full-screen modal for new visit (3 steps)
        if (mVisitModal) {
          const selectedLot = DATA.lots.find(l => l.id === Number(mVisitForm.lotId));
          const stepTitles = ['Datos generales', 'Estado fenológico', 'Plagas', 'Confirmación'];
          const addPest = () => setMVisitForm(f => ({ ...f, pests: [...f.pests, { id: Date.now(), name: '', level: 'bajo', treatment: '' }] }));
          const updatePest = (i, p) => setMVisitForm(f => ({ ...f, pests: f.pests.map((pp, idx) => idx === i ? p : pp) }));
          const removePest = (i) => setMVisitForm(f => ({ ...f, pests: f.pests.filter((_, idx) => idx !== i) }));
          return (
            <div style={{ position: 'absolute', inset: 0, background: 'var(--bg)', zIndex: 50, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

              {/* Progress bar */}
              <div style={{ display: 'flex', gap: 4, padding: '12px 16px 0', flexShrink: 0 }}>

                    <div style={{ height: 4, borderRadius: 2, background: i <= mVisitStep ? 'var(--accent)' : 'var(--border)', transition: 'background 0.2s' }} />

                {mVisitStep === 0 && (

                      <input type="date" className="form-input" style={{ height: 48 }} value={mVisitForm.date} onChange={e => setMVisitForm(f => ({ ...f, date: e.target.value }))} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">Campo *</label>
                      <select className="form-input form-select" style={{ height: 48 }} value={mVisitForm.fieldId} onChange={e => setMVisitForm(f => ({ ...f, fieldId: e.target.value, lotId: '', campaignId: '' }))}>
                        <option value="">Seleccionar campo...</option>
                        {DATA.fields.map(fi => <option key={fi.id} value={fi.id}>{fi.name}</option>)}
                      </select>
                    </div>
                    <div className="form-group">
                      <label className="form-label">Lote *</label>
                      <select className="form-input form-select" style={{ height: 48 }} value={mVisitForm.lotId} onChange={e => setMVisitForm(f => ({ ...f, lotId: e.target.value, campaignId: '' }))}>

                        {DATA.lots.filter(l => !mVisitForm.fieldId || l.fieldId === Number(mVisitForm.fieldId)).map(l => <option key={l.id} value={l.id}>{l.name} ({l.crop})</option>)}

                    <div className="form-group">
                      <label className="form-label">Campaña</label>
                      <select className="form-input form-select" style={{ height: 48 }} value={mVisitForm.campaignId} onChange={e => setMVisitForm(f => ({ ...f, campaignId: e.target.value }))} disabled={!mVisitForm.lotId}>
                        <option value="">{mVisitForm.lotId ? 'Seleccionar campaña...' : 'Primero seleccioná un lote'}</option>
                        {DATA.campaigns.filter(c => c.lotId === Number(mVisitForm.lotId) && c.status === 'activa').map(c => <option key={c.id} value={c.id}>{c.crop} — desde {fmt.date(c.startDate)}</option>)}
                      </select>
                    </div>
                  </>

                {mVisitStep === 1 && (
                  <>
                    <div className="form-group">
                      <label className="form-label" style={{ marginBottom: 10 }}>Etapa fenológica observada *</label>

                        {stages.map(s => (
                          <div key={s} onClick={() => setMVisitForm(f => ({ ...f, phenoStage: s }))}
                            style={{ border: `2px solid ${mVisitForm.phenoStage === s ? 'var(--accent)' : 'var(--border)'}`, background: mVisitForm.phenoStage === s ? 'var(--accent-light)' : '#fff', borderRadius: 10, padding: '12px 6px', textAlign: 'center', cursor: 'pointer', transition: 'all 0.15s' }}>
                            <div style={{ fontSize: 24, marginBottom: 4 }}>{stageIcons[s]}</div>
                            <div style={{ fontSize: 10, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--dark)' }}>{s}</div>
                          </div>

                      </div>

                      <div className="form-group" style={{ marginBottom: 12 }}>
                        <label className="form-label" style={{ fontSize: 11, display: 'flex', justifyContent: 'space-between' }}>
                          <span>Cobertura del suelo</span>
                          <strong style={{ color: 'var(--accent)' }}>{mVisitForm.soilCover}%</strong>

                        <input type="range" min="0" max="100" step="5" style={{ width: '100%', height: 24, accentColor: 'var(--accent)' }} value={mVisitForm.soilCover} onChange={e => setMVisitForm(f => ({ ...f, soilCover: e.target.value }))} />
                      </div>

                      <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
                        <div style={{ flex: 1 }}>
                          <label className="form-label" style={{ fontSize: 11 }}>Uniformidad</label>

                            <option>Irregular</option>
                            <option>Con manchones</option>
                          </select>
                        </div>
                        <div style={{ flex: 1 }}>
                          <label className="form-label" style={{ fontSize: 11 }}>Estrés hídrico</label>
                          <select className="form-input form-select" style={{ height: 44, fontSize: 13 }} value={mVisitForm.waterStress} onChange={e => setMVisitForm(f => ({ ...f, waterStress: e.target.value }))}>
                            <option>Sin estrés</option>
                            <option>Leve</option>
                            <option>Moderado</option>
                            <option>Severo</option>
                          </select>
                        </div>
                      </div>

                      <div className="form-group" style={{ marginBottom: 12 }}>
                        <label className="form-label" style={{ fontSize: 11 }}>Relevamiento aéreo</label>

                      </div>

                                <input type="number" className="form-input" style={{ height: 44 }} value={p.incidence} onChange={e => updatePest(i, { ...p, incidence: e.target.value })} placeholder="Ej: 15" />

                              <div className="form-group" style={{ flex: 1 }}>
                                <label className="form-label">Nivel</label>
                                <select className="form-input form-select" style={{ height: 44 }} value={p.level} onChange={e => updatePest(i, { ...p, level: e.target.value })}>
                                  {['bajo', 'medio', 'alto', 'crítico'].map(l => <option key={l} value={l}>{l.charAt(0).toUpperCase() + l.slice(1)}</option>)}
                                </select>
                              </div>
                            </div>
                            <div className="form-group"><label className="form-label">Tratamiento recomendado</label><input className="form-input" style={{ height: 44 }} value={p.treatment} onChange={e => updatePest(i, { ...p, treatment: e.target.value })} placeholder="Ej. Fungicida triazol 0.5 L/ha" /></div>
                            <button onClick={() => removePest(i)} style={{ color: 'var(--critical)', background: 'none', border: 'none', fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-head)', display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="trash" size={13} color="var(--critical)" /> Eliminar plaga</button>
                          </div>
                        </div>
                      ))
                    )}
                  </>
                )}
                {mVisitStep === 3 && (() => {
                  const cfField = DATA.fields.find(f => f.id === Number(mVisitForm.fieldId));
                  const cfLot   = DATA.lots.find(l => l.id === Number(mVisitForm.lotId));
                  const MRow = ({ label, value }) => {
                    if (!value && value !== 0) return null;
                    return (
                      <div style={{ display: 'flex', flexDirection: 'column', padding: '8px 0', borderBottom: '1px solid #f0f4f0' }}>
                        <span style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, fontFamily: 'var(--font-head)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 2 }}>{label}</span>
                        <span style={{ fontSize: 14, color: 'var(--dark)', lineHeight: 1.4 }}>{value}</span>
                      </div>
                    );
                  };
                  const MSection = ({ title, icon, children }) => (
                    <div style={{ background: '#fff', borderRadius: 12, border: '1px solid var(--border)', padding: '12px 14px', marginBottom: 12 }}>
                      <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--accent)', marginBottom: 8 }}>{icon} {title}</div>
                      {children}
                    </div>
                  );
                  const cfCampaign = DATA.campaigns.find(c => c.id === Number(mVisitForm.campaignId));
                  return (
                    <div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'var(--accent-light)', borderRadius: 10, border: '1px solid #b8d9c5', marginBottom: 14 }}>
                        <span style={{ fontSize: 20 }}>📋</span>
                        <div>
                          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13 }}>Revisá antes de guardar</div>
                          <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 1 }}>Usá "← Anterior" si querés corregir algo</div>
                        </div>
                      </div>

                      <MSection title="Datos generales" icon="📅">
                        <MRow label="Fecha" value={mVisitForm.date ? fmt.date(mVisitForm.date) : null} />
                        <MRow label="Campo" value={cfField?.name} />
                        <MRow label="Lote" value={cfLot ? `${cfLot.name} (${cfLot.crop})` : null} />
                        <MRow label="Campaña" value={cfCampaign ? `${cfCampaign.crop} — desde ${fmt.date(cfCampaign.startDate)}` : null} />
                      </MSection>

                      <MSection title="Estado fenológico" icon="🌱">
                        <MRow label="Etapa" value={mVisitForm.phenoStage ? `${stageIcons[mVisitForm.phenoStage]} ${mVisitForm.phenoStage}` : null} />
                        <MRow label="Stand de plantas" value={mVisitForm.plantStand ? `${mVisitForm.plantStand} pl/m` : null} />
                        <MRow label="Altura" value={mVisitForm.cropHeight ? `${mVisitForm.cropHeight} cm` : null} />
                        <MRow label="Cobertura" value={mVisitForm.soilCover > 0 ? `${mVisitForm.soilCover}%` : null} />
                        <MRow label="Uniformidad" value={mVisitForm.uniformity !== 'Uniforme' ? mVisitForm.uniformity : null} />
                        <MRow label="Estrés hídrico" value={mVisitForm.waterStress !== 'Sin estrés' ? mVisitForm.waterStress : null} />
                        <MRow label="Observaciones" value={mVisitForm.phenoObs || null} />
                      </MSection>

                      <MSection title="Plagas y enfermedades" icon="🐛">
                        {mVisitForm.pests.length === 0
                          ? <div style={{ fontSize: 13, color: 'var(--text-muted)', fontStyle: 'italic' }}>Sin plagas registradas</div>
                          : mVisitForm.pests.map((p, i) => (
                            <div key={i} style={{ padding: '8px 0', borderBottom: '1px solid #f0f4f0' }}>
                              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 2 }}>🐛 {p.name || '—'}</div>
                              <div style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                                {p.incidence ? <span>{p.incidence}% incidencia</span> : null}
                                {p.level ? <span className={`badge ${levelColors[p.level] || 'badge-neutral'}`}>{p.level}</span> : null}
                              </div>
                              {p.treatment ? <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 3 }}>💊 {p.treatment}</div> : null}
                            </div>
                          ))
                        }
                      </MSection>
                    </div>
                  );
                })()}
              </div>
              {/* Navigation buttons */}
              <div style={{ padding: '14px 16px', borderTop: '1px solid var(--border)', display: 'flex', gap: 10, flexShrink: 0, background: '#fff' }}>
                {mVisitStep > 0
                  ? <button onClick={() => setMVisitStep(s => s - 1)} style={{ flex: 1, height: 52, background: '#fff', border: '1.5px solid var(--border)', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>← Anterior</button>
                  : <div style={{ flex: 1 }} />
                }
                {mVisitStep < stepTitles.length - 1
                  ? <button onClick={() => setMVisitStep(s => s + 1)} style={{ flex: 2, height: 52, background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>Siguiente →</button>
                  : <button onClick={() => {
                      if (mVisitEditing) {
                        const updated = { ...mVisitEditing, ...mVisitForm, severity: mVisitForm.pests[0]?.level || mVisitEditing.severity };
                        setMVisits(prev => prev.map(vv => vv.id === mVisitEditing.id ? updated : vv));
                        setMSelected(updated);
                        setMVisitView('detail');
                      }
                      setMVisitModal(false);
                      setMVisitStep(0);
                      setMVisitEditing(null);
                    }} style={{ flex: 2, height: 52, background: '#2E7D4F', color: '#fff', border: 'none', borderRadius: 12, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>✓ {mVisitEditing ? 'Guardar cambios' : 'Guardar visita'}</button>
                }
              </div>
            </div>
          );
        }

        if (mVisitView === 'detail' && mSelected) {
          const v = mSelected;
          const selectedLot = DATA.lots.find(l => l.id === v.lotId);
          const gridData = v.gridData || {};
          let totalCells = 16;
          if (selectedLot && selectedLot.gridConfig) totalCells = Math.pow(parseInt(selectedLot.gridConfig.split('x')[0]), 2);
          const counts = {};
          Object.values(gridData).forEach(st => { counts[st] = (counts[st] || 0) + 1; });
          const stats = Object.entries(counts).filter(([k]) => k !== 'sin_datos' && AFFECTATION_STATES[k]).map(([k, count]) => `${AFFECTATION_STATES[k].icon} ${Math.round(count / totalCells * 100)}%`).join(' · ');

          return (
            <div style={{ padding: '14px 14px 80px' }}>
              <button onClick={() => setMVisitView('list')} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, fontWeight: 600, color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', marginBottom: 14, fontFamily: 'var(--font-head)', padding: 0 }}>
                <Icon name="back" size={14} color="var(--accent)" /> Volver a visitas
              </button>

              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
                <div>
                  <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 18, marginBottom: 2 }}>Detalle de Visita</div>
                  <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{v.lotName} · {fmt.date(v.date)}</div>
                </div>
                <button onClick={() => mOpenEditVisit(v)} style={{ display: 'flex', alignItems: 'center', gap: 6, height: 38, padding: '0 14px', background: 'var(--accent-light)', border: '1.5px solid var(--accent)', borderRadius: 10, fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, color: 'var(--accent)', cursor: 'pointer', flexShrink: 0 }}>
                  ✏️ Editar
                </button>
              </div>

              {/* 1. Resumen del Cultivo */}
              <div className="m-card" style={{ marginBottom: 12 }}>
                <div className="m-card-header"><div className="m-card-title">{stageIcons[v.phenoStage]} {v.phenoStage}</div></div>
                <div className="m-card-body">
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
                    <div style={{ background: 'var(--bg)', padding: '12px', borderRadius: 10, textAlign: 'center', border: '1px solid var(--border)' }}>
                      <div style={{ fontSize: 9, color: 'var(--text-secondary)', textTransform: 'uppercase', fontWeight: 800, letterSpacing: '0.05em' }}>Stand (pl/m)</div>
                      <div style={{ fontSize: 18, fontWeight: 800, marginTop: 4, color: 'var(--dark)' }}>{v.plantStand || '-'}</div>
                    </div>
                    <div style={{ background: 'var(--bg)', padding: '12px', borderRadius: 10, textAlign: 'center', border: '1px solid var(--border)' }}>
                      <div style={{ fontSize: 9, color: 'var(--text-secondary)', textTransform: 'uppercase', fontWeight: 800, letterSpacing: '0.05em' }}>Altura (cm)</div>
                      <div style={{ fontSize: 18, fontWeight: 800, marginTop: 4, color: 'var(--dark)' }}>{v.cropHeight || '-'}</div>
                    </div>
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 5 }}>
                      <span style={{ fontWeight: 700, color: 'var(--text-secondary)' }}>COBERTURA DEL SUELO</span>
                      <span className="td-mono" style={{ fontWeight: 800 }}>{v.soilCover || 0}%</span>
                    </div>
                    <div style={{ height: 8, background: 'var(--border)', borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{ width: `${v.soilCover || 0}%`, height: '100%', background: 'var(--accent)' }} />
                    </div>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, paddingTop: 8, borderTop: '1px solid var(--border)' }}>
                    <span>Uniformidad: <strong>{v.uniformity}</strong></span>
                    <span style={{ color: v.waterStress === 'Sin estrés' ? 'var(--success)' : 'var(--warning)' }}>Hídrico: <strong>{v.waterStress}</strong></span>
                  </div>
                </div>
              </div>

              {/* 2. Mapa de Afectación */}
              <div className="m-card" style={{ marginBottom: 12 }}>
                <div className="m-card-header"><div className="m-card-title">🗺️ Mapa de afectación</div></div>
                <div className="m-card-body">
                  <div style={{ maxWidth: 280, margin: '0 auto', background: 'var(--bg)', padding: 10, borderRadius: 12, border: '1px solid var(--border)' }}>
                    <GridMapper gridConfig={selectedLot ? selectedLot.gridConfig : '4x4'} gridData={gridData} statesConfig={AFFECTATION_STATES} readOnly />
                  </div>
                  {stats && (
                    <div style={{ marginTop: 12, padding: '10px', background: 'var(--bg-light)', borderRadius: 8, fontSize: 11, textAlign: 'center', fontFamily: 'var(--font-mono)', fontWeight: 700, color: 'var(--dark)', border: '1px solid var(--border)' }}>
                      {stats}
                    </div>
                  )}
                </div>
              </div>

              {/* 3. Observaciones y Aéreo */}
              {(v.phenoObs || v.aerialSurvey) && (
                <div className="m-card" style={{ marginBottom: 12 }}>
                  <div className="m-card-header"><div className="m-card-title">📝 Observaciones</div></div>
                  <div className="m-card-body">
                    {v.phenoObs && <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, margin: 0, fontStyle: 'italic' }}>"{v.phenoObs}"</p>}
                    {v.aerialSurvey && (
                      <div style={{ marginTop: 12, padding: 10, background: '#e0f2fe', borderRadius: 8, fontSize: 12, color: '#0369a1', border: '1px solid #bae6fd' }}>
                        <strong>🚁 Relevamiento aéreo:</strong> {v.aerialSurvey}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* 4. Plagas Detectadas */}
              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 14, marginBottom: 10, marginTop: 15, color: 'var(--dark)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Plagas detectadas</div>
              {v.pests.length === 0 ? (
                <div className="badge badge-success" style={{ width: '100%', padding: 12, justifyContent: 'center' }}>✓ Sin plagas detectadas</div>
              ) : (
                v.pests.map((p, i) => (
                  <div key={i} className="m-card" style={{ marginBottom: 8, borderLeft: `4px solid ${levelSev[p.level] === 'critical' ? '#DC2626' : levelSev[p.level] === 'high' ? 'var(--critical)' : 'var(--accent)'}` }}>
                    <div className="m-card-body">
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                        <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14 }}>🐛 {p.name}</div>
                        <span className={`badge ${levelColors[p.level]}`}><span className={`severity-dot ${levelSev[p.level]}`} /> {p.level}</span>
                      </div>
                      <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 8 }}>💊 {p.treatment}</div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)', fontSize: 11 }}>
                        <span style={{ color: 'var(--text-muted)' }}>Incidencia: <strong style={{ color: 'var(--dark)' }}>{p.incidence}%</strong></span>
                        {p.affectedZones && <span style={{ color: 'var(--text-muted)' }}>Zonas: <strong style={{ color: 'var(--dark)' }}>{p.affectedZones.join(', ')}</strong></span>}
                      </div>
                    </div>
                  </div>
                ))
              )}

              {!v.orderId && (
                <button onClick={() => onNav('orders')} style={{ width: '100%', height: 56, background: 'var(--critical)', color: '#fff', borderRadius: 14, fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 15, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, marginTop: 20, boxShadow: '0 4px 12px rgba(220,38,38,0.2)' }}>
