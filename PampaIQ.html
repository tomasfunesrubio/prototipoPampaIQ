            <div>
              {/* ── Context selectors bar ── */}
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end', padding: '14px 16px', background: 'var(--accent-light)', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', marginBottom: 20 }}>

                  <select className="form-input form-select" style={{ height: 36 }} value={cfgField} onChange={e => onCfgFieldChange(e.target.value)}>
                    <option value="">Seleccionar...</option>

                  </select>
                </div>
                <div style={{ flex: '1 1 160px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <label style={{ fontSize: 11, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Lote</label>
                  <select className="form-input form-select" style={{ height: 36 }} value={cfgLot} onChange={e => onCfgLotChange(e.target.value)} disabled={!cfgField}>

                    {cfgLotCampaigns.map(c => <option key={c.id} value={c.id}>{c.crop} — desde {fmt.date(c.startDate)}</option>)}
                  </select>
                </div>
              </div>

              {/* Config sub-tabs */}
              <div style={{ display: 'flex', gap: 0, borderBottom: '2px solid var(--border)', marginBottom: 20 }}>
                {[['pests', '🐛 Plagas y enfermedades'], ['pheno', '🌱 Fenológico']].map(([key, label]) => (
                  <div key={key} onClick={() => setConfigSubTab(key)}

                    <table>
                      <thead>
                        <tr><th>Plaga / Enfermedad</th><th>Cultivo</th><th>Umbral por defecto</th><th>Umbral personalizado</th><th>Alerta activa</th></tr>

                              <span style={{ fontSize: 11, color: 'var(--text-muted)', marginLeft: 4 }}>{p.defaultUnit}</span>

                        <div className="m-card-body" style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                          <div>
                            <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 14, color: 'var(--dark)' }}>🐛 {p.name}</div>
                            <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Cultivo: {p.crop}</div>
                            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>
                              Umbral por defecto: <span className="td-mono">{p.defaultThreshold}</span> <span style={{ fontSize: 11 }}>{p.defaultUnit}</span>
                            </div>
                          </div>

                          <div>
                            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--dark)', marginBottom: 4, fontFamily: 'var(--font-head)' }}>Umbral personalizado</div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <input type="number" className="form-input td-mono"
                                style={{ flex: 1, height: 38, fontSize: 14, padding: '0 10px' }}
                                value={p.custom} placeholder={String(p.defaultThreshold)}
                                onChange={e => setPestConfig(cfg => cfg.map((c, ci) => ci === i ? { ...c, custom: e.target.value } : c))} />
                              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>{p.defaultUnit}</span>
                            </div>
                          </div>

                          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4, paddingTop: 12, borderTop: '1px solid var(--border)' }}>
                            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--dark)', fontFamily: 'var(--font-head)' }}>Alerta activa</span>
                            <Toggle value={p.active} onChange={v => setPestConfig(cfg => cfg.map((c, ci) => ci === i ? { ...c, active: v } : c))} />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{ marginTop: 20 }}>
                    <button className="btn btn-primary btn-full-mobile" onClick={() => {
                      if (cfgKey) setSavedConfigs(prev => ({ ...prev, [cfgKey]: { ...(prev[cfgKey] || {}), pestConfig: JSON.parse(JSON.stringify(pestConfig)) } }));
                      showConfigSaved('Configuración de plagas guardada');
                    }}>
                      <Icon name="check" size={14} color="#fff" /> Guardar configuración de plagas
                    </button>
                  </div>
                </>
              )}

              {/* Fenológico */}
              {configSubTab === 'pheno' && (
                <>
                  <div className="info-box" style={{ marginBottom: 16 }}>
                    <Icon name="info" size={14} color="var(--accent)" />
                    <span>Se genera una alerta cuando el cultivo supera los días de retraso configurados para cada etapa respecto a las fechas esperadas cargadas en la campaña.</span>
                  </div>

                  {/* Desktop View */}
                  <div className="table-wrap desktop-only">
                    <table>
                      <thead>
                        <tr><th>Etapa fenológica</th><th>Días de retraso aceptables</th><th>Alerta activa</th></tr>
                      </thead>
                      <tbody>
                        {phenoConfig.map((p, i) => (
                          <tr key={p.stage}>
                            <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600, fontSize: 14 }}>{p.icon} {p.stage}</td>
                            <td>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <input type="number" className="form-input td-mono"
                                  style={{ width: 70, height: 34, fontSize: 13, padding: '0 8px' }}
                                  value={p.days} min={0}
                                  onChange={e => setPhenoConfig(cfg => cfg.map((c, ci) => ci === i ? { ...c, days: Number(e.target.value) } : c))} />
                                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>días</span>
                              </div>
                            </td>
                            <td><Toggle value={p.active} onChange={v => setPhenoConfig(cfg => cfg.map((c, ci) => ci === i ? { ...c, active: v } : c))} /></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Mobile View */}
                  <div className="mobile-only">
                    {phenoConfig.map((p, i) => (
                      <div key={p.stage} className="m-card" style={{ marginBottom: 12 }}>
                        <div className="m-card-body" style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 15, color: 'var(--dark)' }}>
                            {p.icon} {p.stage}
                          </div>

                          <div>
                            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--dark)', marginBottom: 4, fontFamily: 'var(--font-head)' }}>Días de retraso aceptables</div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <input type="number" className="form-input td-mono"
                                style={{ flex: 1, height: 38, fontSize: 14, padding: '0 10px' }}
                                value={p.days} min={0}
                                onChange={e => setPhenoConfig(cfg => cfg.map((c, ci) => ci === i ? { ...c, days: Number(e.target.value) } : c))} />
                              <span style={{ fontSize: 12, color: 'var(--text-secondary)', flexShrink: 0 }}>días</span>
                            </div>
                          </div>

                          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4, paddingTop: 12, borderTop: '1px solid var(--border)' }}>
                            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--dark)', fontFamily: 'var(--font-head)' }}>Alerta activa</span>
                            <Toggle value={p.active} onChange={v => setPhenoConfig(cfg => cfg.map((c, ci) => ci === i ? { ...c, active: v } : c))} />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{ marginTop: 20 }}>
                    <button className="btn btn-primary btn-full-mobile" onClick={() => {
                      if (cfgKey) setSavedConfigs(prev => ({ ...prev, [cfgKey]: { ...(prev[cfgKey] || {}), phenoConfig: JSON.parse(JSON.stringify(phenoConfig)) } }));
                      showConfigSaved('Configuración fenológica guardada');
                    }}>
                      <Icon name="check" size={14} color="#fff" /> Guardar configuración fenológica
                    </button>
                  </div>
                </>
              )}
            </div>
          )}

          {tab === 'history' && (
            <div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Lote</th><th>Tipo</th><th>Descripción</th><th>Fecha</th><th>Resolución</th></tr></thead>
                  <tbody>
                    {DATA.resolvedAlerts.map(a => (
                      <tr key={a.id}>
                        <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{a.lotName}</td>
                        <td><span className="badge badge-neutral">{a.type}</span></td>
                        <td style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{a.description}</td>
                        <td className="td-mono" style={{ fontSize: 12 }}>{fmt.date(a.date)}</td>
                        <td style={{ fontSize: 12, color: 'var(--success)' }}>✓ {a.resolution}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // HISTORY PHENOLOGICAL
    // ══════════════════════════════════════════════════════════════════════════════
    const PhenologicalAnalysisScreen = () => {
      const [phenoField, setPhenoField] = useState('');
      const [selectedLot, setSelectedLot] = useState('');
      const [phenoCampaign, setPhenoCampaign] = useState('');
      const [analyzed, setAnalyzed] = useState(false);
      const [activeTab, setActiveTab] = useState('current');
      const [selectedCompareCampaigns, setSelectedCompareCampaigns] = useState([]);
      const [expandedPestRow, setExpandedPestRow] = useState(null);
      const [downloadOpen, setDownloadOpen] = useState(''); // 'hdr' | 'ftr' | ''

      const COMPARE_COLORS = ['#3D8B5E', '#2563EB', '#D97706', '#7C3AED'];
      const stages = ['Germinación', 'Macollaje', 'Floración', 'Fructificación', 'Madurez'];
      const simulationDate = new Date('2025-05-15');

      const fieldLots = phenoField ? DATA.lots.filter(l => l.fieldId === Number(phenoField)) : [];
      const lotCampaigns = selectedLot ? DATA.campaigns.filter(c => c.lotId === Number(selectedLot)) : [];
      const campaign = phenoCampaign ? DATA.campaigns.find(c => c.id === Number(phenoCampaign)) : null;

      // ── Helper: compute per-stage analysis for any campaign ──
      const computeStagesData = (camp) => {
        const campVisits = DATA.visits.filter(v => v.campaignId === camp.id).sort((a, b) => new Date(a.date) - new Date(b.date));
        return stages.map(s => {
          const expectedStr = camp.expectedDates?.[s] || null;
          const expectedDate = expectedStr ? new Date(expectedStr) : null;

          // actualDates field (historical closed campaigns) takes priority over visits
          const actualStr = camp.actualDates?.[s] || (() => { const v = campVisits.find(v2 => v2.phenoStage === s); return v ? v.date : null; })();
          const actualDate = actualStr ? new Date(actualStr) : null;

          const pestsDetail = campVisits.filter(v => v.phenoStage === s).flatMap(v => v.pests.map(p => ({ ...p, visitDate: v.date, visitAdvisor: v.advisor })));
          const pestsInStage = pestsDetail.length;

          let diffDays = 0, statusText = '—', statusColor = 'var(--text-muted)';
          if (expectedDate) {
            if (actualDate) {
              diffDays = Math.round((actualDate - expectedDate) / (1000 * 60 * 60 * 24));
            } else if (expectedDate < simulationDate) {
              diffDays = Math.round((simulationDate - expectedDate) / (1000 * 60 * 60 * 24));
            }
            if (!actualDate && expectedDate > simulationDate) { statusText = 'Pendiente'; statusColor = 'var(--text-secondary)'; }
            else if (diffDays < 0) { statusText = `${diffDays} días`; statusColor = 'var(--success)'; }
            else if (diffDays === 0) { statusText = 'A término'; statusColor = 'var(--success)'; }
            else if (diffDays <= 3) { statusText = `+${diffDays} días`; statusColor = 'var(--warning)'; }
            else { statusText = `+${diffDays} días`; statusColor = 'var(--critical)'; }
          }
          return { stage: s, expectedDate: expectedStr, actualDate: actualStr, diffDays, statusText, statusColor, pestsInStage, pestsDetail };
        });
      };

      const handleAnalyze = () => {
        if (phenoField && selectedLot && phenoCampaign) {
          setSelectedCompareCampaigns([Number(phenoCampaign)]);
          setActiveTab('current');
          setExpandedPestRow(null);
          setAnalyzed(true);
        }
      };

      // ── Tab 1 summary stats ──
      let daysElapsed = 0, accumulatedDelay = 0, maxDelayStage = '—', maxDelay = -1;
      let generalStatus = 'A término', generalColor = 'var(--success)', generalIcon = '✓';
      let stagesData = [];
      if (analyzed && campaign) {
        daysElapsed = Math.max(0, Math.round((simulationDate - new Date(campaign.startDate)) / (1000 * 60 * 60 * 24)));
        stagesData = computeStagesData(campaign);
        stagesData.forEach(d => {
          if (d.diffDays > 0) {
            accumulatedDelay += d.diffDays;
            if (d.diffDays > maxDelay) { maxDelay = d.diffDays; maxDelayStage = d.stage; }
          }
        });
        if (maxDelay > 10) { generalStatus = 'Crítico'; generalColor = 'var(--critical)'; generalIcon = '⚠'; }
        else if (maxDelay > 3) { generalStatus = 'Con retraso'; generalColor = 'var(--warning)'; generalIcon = '⚠'; }
      }

      // ── Tab 2 data ──
      const allLotCampaigns = selectedLot ? DATA.campaigns.filter(c => c.lotId === Number(selectedLot)) : [];
      const hasHistorical = allLotCampaigns.length >= 2;

      const compareCampaignObjects = selectedCompareCampaigns.map(id => DATA.campaigns.find(c => c.id === id)).filter(Boolean);
      const compareStagesData = compareCampaignObjects.map((c, ci) => ({ campaign: c, color: COMPARE_COLORS[ci % 4], stages: computeStagesData(c) }));

      const toggleCompareCampaign = (id) => {
        if (id === Number(phenoCampaign)) return;
        if (selectedCompareCampaigns.includes(id)) {
          setSelectedCompareCampaigns(selectedCompareCampaigns.filter(c => c !== id));
        } else if (selectedCompareCampaigns.length < 4) {
          setSelectedCompareCampaigns([...selectedCompareCampaigns, id]);
        }
      };

      // ── Trend ──
      let trendCard = null;
      if (analyzed && campaign && compareStagesData.length > 1) {
        const currentTotal = compareStagesData[0].stages.reduce((s, d) => s + Math.max(0, d.diffDays), 0);
        const otherTotals = compareStagesData.slice(1).map(({ stages: sd }) => sd.reduce((s, d) => s + Math.max(0, d.diffDays), 0));
        const avgOther = Math.round(otherTotals.reduce((a, b) => a + b, 0) / otherTotals.length);
        const pctDiff = avgOther > 0 ? Math.round(((currentTotal - avgOther) / avgOther) * 100) : 0;
        trendCard = { currentTotal, avgOther, pctDiff, isWorse: currentTotal > avgOther };
      }

      // ── Bar chart max ──
      const maxBarVal = Math.max(1, ...compareStagesData.flatMap(({ stages: sd }) => sd.map(s => Math.max(0, s.diffDays))));
      const BAR_H = 150;

      const lotName = DATA.lots.find(l => l.id === Number(selectedLot))?.name;
      const dlFilename = analyzed && campaign
        ? `Analisis-Fenologico-${(DATA.fields.find(f => f.id === Number(phenoField))?.name || 'Campo').replace(/\s/g, '-')}-${(lotName || 'Lote').replace(/\s/g, '-')}-${campaign.crop.replace(/\s/g, '-')}`
        : 'Analisis-Fenologico';

      return (
        <PageShell breadcrumbs={['Análisis Fenológico']}>
          <div className="page-header">
            <div><div className="page-title">Análisis Fenológico</div><div className="page-subtitle">Progresión de etapas reales vs. esperadas</div></div>
          </div>

          {/* ── Filter bar ── */}
          <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center', background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', boxShadow: 'var(--shadow-sm)' }}>
            <Icon name="filter" size={15} color="var(--text-secondary)" />
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 180 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campo</label>
              <select className="form-input form-select" style={{ flex: 1 }} value={phenoField} onChange={e => { setPhenoField(e.target.value); setSelectedLot(''); setPhenoCampaign(''); setAnalyzed(false); }}>
                <option value="">Seleccionar...</option>
                {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name} — {f.province}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 180 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Lote</label>
              <select className="form-input form-select" style={{ flex: 1 }} value={selectedLot} onChange={e => { setSelectedLot(e.target.value); setPhenoCampaign(''); setAnalyzed(false); }} disabled={!phenoField}>
                <option value="">Seleccionar...</option>
                {fieldLots.map(l => <option key={l.id} value={l.id}>{l.name} — {l.crop}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 180 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campaña</label>
              <select className="form-input form-select" style={{ flex: 1 }} value={phenoCampaign} onChange={e => { setPhenoCampaign(e.target.value); setAnalyzed(false); }} disabled={!selectedLot}>
                <option value="">Seleccionar...</option>
                {lotCampaigns.map(c => <option key={c.id} value={c.id}>{c.crop} ({fmt.date(c.startDate)})</option>)}
              </select>
            </div>
            <button className="btn btn-primary" style={{ flex: '0 0 auto', background: '#3D8B5E', borderColor: '#3D8B5E' }} disabled={!phenoField || !selectedLot || !phenoCampaign} onClick={handleAnalyze}>
              Generar análisis
            </button>
            {analyzed && (
              <>
                {/* Desktop: texto completo */}
                <div className="desktop-only" style={{ position: 'relative', flex: '0 0 auto' }}>
                  <button className="btn btn-secondary" style={{ gap: 6 }} onClick={() => setDownloadOpen(v => v === 'hdr' ? '' : 'hdr')} title={dlFilename}>
                    ⬇ Descargar
                  </button>
                  {downloadOpen === 'hdr' && (
                    <div style={{ position: 'absolute', top: 42, right: 0, background: '#fff', border: '1px solid var(--border)', borderRadius: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.13)', zIndex: 300, minWidth: 190, overflow: 'hidden' }}>
                      {[['📄 Descargar como PDF', 'pdf'], ['📊 Descargar como Excel', 'xlsx']].map(([label, type], idx) => (
                        <div key={type} onClick={() => setDownloadOpen('')}
                          style={{ padding: '11px 16px', fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-head)', cursor: 'pointer', color: 'var(--dark)', borderBottom: idx === 0 ? '1px solid var(--border)' : 'none', transition: 'background 0.1s' }}
                          onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-light)'}
                          onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                          {label}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {/* Mobile: solo ícono */}
                <div className="mobile-only" style={{ position: 'relative', flex: '0 0 auto' }}>
                  <button className="btn btn-secondary" style={{ padding: '0 12px', height: 36, fontSize: 16 }} onClick={() => setDownloadOpen(v => v === 'hdr' ? '' : 'hdr')} title={dlFilename}>
                    ⬇
                  </button>
                  {downloadOpen === 'hdr' && (
                    <div style={{ position: 'absolute', top: 42, right: 0, background: '#fff', border: '1px solid var(--border)', borderRadius: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.15)', zIndex: 300, minWidth: 190, overflow: 'hidden' }}>
                      {[['📄 Descargar como PDF', 'pdf'], ['📊 Descargar como Excel', 'xlsx']].map(([label, type], idx) => (
                        <div key={type} onClick={() => setDownloadOpen('')}
                          style={{ padding: '13px 16px', fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-head)', cursor: 'pointer', color: 'var(--dark)', borderBottom: idx === 0 ? '1px solid var(--border)' : 'none' }}>
                          {label}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </>
            )}
          </div>

          {/* ── Tab nav ── */}
          {analyzed && campaign && (
            <div style={{ display: 'flex', borderBottom: '2px solid var(--border)', marginBottom: 24, gap: 0 }}>
              {[
                { id: 'current', label: '📈 Campaña actual' },
                { id: 'historical', label: '🔄 Comparativa histórica' },
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                  padding: '10px 22px', fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13,
                  border: 'none', background: 'transparent', cursor: 'pointer',
                  borderBottom: activeTab === tab.id ? '3px solid var(--accent)' : '3px solid transparent',
                  color: activeTab === tab.id ? 'var(--accent)' : 'var(--text-secondary)',
                  marginBottom: -2, transition: 'color 0.15s',
                }}>{tab.label}</button>
              ))}
            </div>
          )}

          {/* ── States ── */}
          {!analyzed ? (
            <div className="empty-state" style={{ marginTop: 40, padding: 60 }}>
              <div className="empty-state-icon" style={{ fontSize: 40 }}>🔬</div>
              <div className="empty-state-text" style={{ fontSize: 18 }}>Seleccioná filtros para visualizar el análisis</div>
              <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 12, maxWidth: 400, margin: '12px auto 0' }}>Cruzaremos datos de etapas reales, fechas esperadas e incidencia de plagas.</div>
            </div>
          ) : !campaign ? (
            <div className="empty-state" style={{ marginTop: 40, padding: 60 }}>
              <div className="empty-state-icon" style={{ fontSize: 40 }}>📭</div>
              <div className="empty-state-text" style={{ fontSize: 18 }}>Sin campaña seleccionada</div>
            </div>

          ) : activeTab === 'current' ? (
            // ════════════════════════════════════════
            // TAB 1 — CAMPAÑA ACTUAL
            // ════════════════════════════════════════
            <>
              {/* KPIs */}
              <div className="stat-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', marginBottom: 20 }}>
                <div className="stat-card">
                  <div className="stat-label">Días transcurridos</div>
                  <div className="stat-value td-mono">{daysElapsed}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Desvío acumulado</div>
                  <div className="stat-value td-mono" style={{ color: accumulatedDelay > 0 ? 'var(--warning)' : 'inherit' }}>{accumulatedDelay} días</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Etapa con mayor retraso</div>
                  <div className="stat-value" style={{ fontSize: 16 }}>{maxDelayStage !== '—' ? <>{stageIcons[maxDelayStage]} {maxDelayStage}</> : '—'}</div>
                </div>
                <div className="stat-card" style={{ borderLeft: `4px solid ${generalColor}` }}>
                  <div className="stat-label">Estado general</div>
                  <div className="stat-value" style={{ fontSize: 18, color: generalColor }}>{generalIcon} {generalStatus}</div>
                </div>
              </div>

              {/* Visual progression */}
              <div className="card" style={{ marginBottom: 20 }}>
                <div className="card-header">
                  <div className="card-title">📈 Progresión fenológica — {campaign.crop}</div>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-secondary)' }}>{lotName}</span>
                </div>
                <div className="card-body">
                  <div style={{ overflowX: 'auto' }}>
                    <div style={{ display: 'flex', gap: 0, minWidth: 600, position: 'relative', paddingBottom: 40, paddingTop: 10 }}>
                      <div style={{ position: 'absolute', top: 46, left: 0, right: 0, height: 3, background: 'var(--border)', zIndex: 0 }} />
                      {stagesData.map((d, i) => (
                        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative', zIndex: 1 }}>
                          <div style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-muted)', marginBottom: 6 }}>
                            {d.actualDate ? fmt.date(d.actualDate) : d.expectedDate ? `Esp: ${fmt.date(d.expectedDate)}` : 'Sin datos'}
                          </div>
                          <div style={{ width: 52, height: 52, borderRadius: '50%', background: '#fff', border: `3px solid ${d.statusText === 'Pendiente' ? 'var(--border)' : d.statusColor}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, boxShadow: 'var(--shadow-sm)' }}>
                            <span style={{ opacity: d.statusText === 'Pendiente' ? 0.3 : 1, filter: d.statusText === 'Pendiente' ? 'grayscale(1)' : 'none' }}>{stageIcons[d.stage]}</span>
                          </div>
                          <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 12, color: 'var(--dark)', marginTop: 8, textAlign: 'center' }}>{d.stage}</div>
                          <div style={{ fontSize: 11, color: d.statusColor, marginTop: 4, fontWeight: 600 }}>{d.statusText}</div>

              {/* Table with pest expansion */}
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Etapa</th><th>Fecha esperada</th><th>Fecha real</th><th>Diferencia</th><th>Plagas</th></tr></thead>

                    {stagesData.map((d, i) => (
                      <React.Fragment key={i}>
                        <tr>
                          <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{stageIcons[d.stage]} {d.stage}</td>

                          <td style={{ color: d.statusColor, fontWeight: 600 }}>{d.diffDays > 0 ? `+${d.diffDays} días` : d.diffDays < 0 ? `${d.diffDays} días` : d.statusText}</td>

                            {d.pestsInStage > 0 ? (
                              <button onClick={() => setExpandedPestRow(expandedPestRow === d.stage ? null : d.stage)}
                                style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}
                                title="Ver detalle de plagas">
                                <span className="badge badge-warning" style={{ cursor: 'pointer', userSelect: 'none' }}>

                              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {d.pestsDetail.map((p, pi) => (

              {/* ── Footer — Descarga Tab 1 ── */}
              <div style={{ display: 'flex', justifyContent: 'flex-end', paddingTop: 8, paddingBottom: 24 }}>
                <div style={{ position: 'relative' }}>
                  <button className="btn btn-secondary" style={{ height: 40, gap: 8 }} onClick={() => setDownloadOpen(v => v === 'ftr' ? '' : 'ftr')} title={dlFilename}>

                  </button>
                  {downloadOpen === 'ftr' && (
                    <div style={{ position: 'absolute', bottom: 46, right: 0, background: '#fff', border: '1px solid var(--border)', borderRadius: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.13)', zIndex: 300, minWidth: 190, overflow: 'hidden' }}>
                      {[['📄 Descargar como PDF', 'pdf'], ['📊 Descargar como Excel', 'xlsx']].map(([label, type], idx) => (
                        <div key={type} onClick={() => setDownloadOpen('')}
                          style={{ padding: '11px 16px', fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-head)', cursor: 'pointer', color: 'var(--dark)', borderBottom: idx === 0 ? '1px solid var(--border)' : 'none', transition: 'background 0.1s' }}

          ) : (
            // ════════════════════════════════════════
            // TAB 2 — COMPARATIVA HISTÓRICA
            // ════════════════════════════════════════
            !hasHistorical ? (
              <div className="empty-state" style={{ marginTop: 40, padding: 60 }}>
                <div className="empty-state-icon" style={{ fontSize: 40 }}>📊</div>
                <div className="empty-state-text" style={{ fontSize: 18 }}>Aún no hay campañas anteriores para comparar en este lote.</div>
                <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 12, maxWidth: 420, margin: '12px auto 0' }}>Para activar la comparativa, el lote necesita al menos 2 campañas registradas.</div>
              </div>
            ) : (
              <>
                {/* ── Campaign selector ── */}
                <div className="card" style={{ marginBottom: 20 }}>
                  <div className="card-header">
                    <div className="card-title">Campañas a comparar</div>
                    <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>Máximo 4 campañas simultáneas</span>

                  <div className="card-body">
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
                      {allLotCampaigns.map((c, ci) => {
                        const isCurrentCampaign = c.id === Number(phenoCampaign);
                        const isSelected = selectedCompareCampaigns.includes(c.id);
                        const colorIdx = selectedCompareCampaigns.indexOf(c.id);
                        const color = isSelected ? COMPARE_COLORS[colorIdx % 4] : 'var(--border)';
                        return (
                          <div key={c.id} onClick={() => toggleCompareCampaign(c.id)} style={{
                            display: 'flex', alignItems: 'center', gap: 10, padding: '10px 16px',

                            cursor: isCurrentCampaign ? 'default' : 'pointer',
                            transition: 'all 0.15s', userSelect: 'none',

                            <div style={{ width: 12, height: 12, borderRadius: '50%', background: isSelected ? color : 'var(--border)', flexShrink: 0 }} />
                            <div>
                              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 13, color: isSelected ? color : 'var(--text-secondary)' }}>
                                {c.crop} {fmt.date(c.startDate).split('/')[2]}

                              <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>

                                {isCurrentCampaign && <span style={{ marginLeft: 6, color: color, fontWeight: 700 }}>← Filtrada</span>}
                              </div>
                            </div>

                      })}
                    </div>
                  </div>
                </div>

                {compareStagesData.length === 0 ? null : (
                  <>
                    {/* ── Bar chart ── */}
                    <div className="card" style={{ marginBottom: 20 }}>
                      <div className="card-header">
                        <div className="card-title">📊 Días de retraso por etapa</div>
                        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                          {compareStagesData.map(({ campaign: c, color }) => (
                            <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12 }}>
                              <div style={{ width: 10, height: 10, borderRadius: 2, background: color }} />
                              <span style={{ color: 'var(--text-secondary)' }}>{c.crop} {fmt.date(c.startDate).split('/')[2]}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="card-body">
                        {/* Y-axis labels + chart */}
                        <div style={{ display: 'flex', gap: 0, alignItems: 'flex-end' }}>
                          {/* Y axis */}
                          <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between', height: BAR_H, paddingBottom: 0, marginRight: 8, paddingTop: 4 }}>
                            {[maxBarVal, Math.round(maxBarVal / 2), 0].map(v => (
                              <span key={v} style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'var(--font-mono)', lineHeight: 1 }}>{v}d</span>
                            ))}
                          </div>
                          {/* Bars */}
                          <div style={{ flex: 1, display: 'flex', borderLeft: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
                            {stages.map(stageName => {
                              return (
                                <div key={stageName} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '0 4px' }}>
                                  <div style={{ height: BAR_H, display: 'flex', alignItems: 'flex-end', gap: 3, width: '100%', justifyContent: 'center' }}>
                                    {compareStagesData.map(({ campaign: c, color, stages: sd }) => {
                                      const s = sd.find(x => x.stage === stageName);
                                      const delay = s ? Math.max(0, s.diffDays) : 0;
                                      const h = Math.max(delay > 0 ? 6 : 2, Math.round((delay / maxBarVal) * BAR_H));
                                      return (
                                        <div key={c.id} title={`${c.crop} ${fmt.date(c.startDate).split('/')[2]}: ${delay > 0 ? `+${delay}d` : delay < 0 ? `${delay}d` : 'a término'}`}
                                          style={{ flex: 1, maxWidth: 28, height: h, background: color, borderRadius: '3px 3px 0 0', transition: 'height 0.3s', minHeight: 2 }} />
                                      );
                                    })}
                                  </div>
                                  <div style={{ fontSize: 10, color: 'var(--text-secondary)', marginTop: 6, textAlign: 'center' }}>{stageIcons[stageName]}</div>
                                  <div style={{ fontSize: 10, color: 'var(--text-secondary)', textAlign: 'center', lineHeight: 1.2 }}>{stageName}</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* ── Comparison table ── */}
                    <div className="table-wrap" style={{ marginBottom: 20 }}>
                      <table>
                        <thead>
                          <tr>
                            <th>Etapa</th>
                            {compareStagesData.map(({ campaign: c, color }) => (
                              <th key={c.id} style={{ color }}>{c.crop} {fmt.date(c.startDate).split('/')[2]}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {stages.map(stageName => (
                            <tr key={stageName}>
                              <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{stageIcons[stageName]} {stageName}</td>
                              {compareStagesData.map(({ campaign: c, stages: sd }) => {
                                const s = sd.find(x => x.stage === stageName);
                                if (!s || !s.expectedDate) return <td key={c.id} style={{ color: 'var(--text-muted)' }}>—</td>;
                                return (
                                  <td key={c.id} className="td-mono" style={{ fontWeight: 600, color: s.diffDays > 0 ? 'var(--warning)' : s.diffDays < 0 ? 'var(--success)' : 'var(--success)' }}>
                                    {s.diffDays > 0 ? `+${s.diffDays}d` : s.diffDays < 0 ? `${s.diffDays}d` : '✓ 0d'}
                                  </td>
                                );
                              })}
                            </tr>
                          ))}
                          <tr style={{ background: '#f8fafc', fontWeight: 700 }}>
                            <td style={{ fontFamily: 'var(--font-head)', fontWeight: 700, borderTop: '2px solid var(--border)' }}>Total desvío</td>
                            {compareStagesData.map(({ campaign: c, stages: sd, color }) => {
                              const total = sd.reduce((acc, s) => acc + Math.max(0, s.diffDays), 0);
                              return (
                                <td key={c.id} className="td-mono" style={{ borderTop: '2px solid var(--border)', color: total > 0 ? color : 'var(--success)', fontWeight: 700 }}>
                                  {total}d
                                </td>
                              );
                            })}
                          </tr>
                        </tbody>
                      </table>
                    </div>

                    {/* ── Trend card ── */}
                    {trendCard && (
                      <div className="card" style={{ borderLeft: `5px solid ${trendCard.isWorse ? 'var(--warning)' : 'var(--success)'}` }}>
                        <div className="card-body">
                          <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
                            <span style={{ fontSize: 32 }}>{trendCard.isWorse ? '📈' : '📉'}</span>
                            <div>
                              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Tendencia frente al histórico</div>
                              <div style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                                La campaña actual acumula un desvío de{' '}
                                <strong style={{ color: 'var(--dark)' }}>{trendCard.currentTotal} días</strong>,{' '}
                                {trendCard.isWorse
                                  ? <span>un <strong style={{ color: 'var(--warning)' }}>{trendCard.pctDiff}% más</strong> que el promedio de las últimas {compareStagesData.length - 1} campaña{compareStagesData.length > 2 ? 's' : ''} de este lote ({trendCard.avgOther}d promedio).</span>
                                  : <span>un <strong style={{ color: 'var(--success)' }}>{Math.abs(trendCard.pctDiff)}% menos</strong> que el promedio de las últimas {compareStagesData.length - 1} campaña{compareStagesData.length > 2 ? 's' : ''} de este lote ({trendCard.avgOther}d promedio).</span>
                                }
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </>
                )}

                {/* ── Footer — Descarga Tab 2 ── */}
                <div style={{ display: 'flex', justifyContent: 'flex-end', paddingTop: 8, paddingBottom: 24 }}>
                  <div style={{ position: 'relative' }}>
                    <button className="btn btn-secondary" style={{ height: 40, gap: 8 }} onClick={() => setDownloadOpen(v => v === 'ftr' ? '' : 'ftr')} title={dlFilename}>
                      ⬇ Descargar resultado
                    </button>
                    {downloadOpen === 'ftr' && (
                      <div style={{ position: 'absolute', bottom: 46, right: 0, background: '#fff', border: '1px solid var(--border)', borderRadius: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.13)', zIndex: 300, minWidth: 190, overflow: 'hidden' }}>
                        {[['📄 Descargar como PDF', 'pdf'], ['📊 Descargar como Excel', 'xlsx']].map(([label, type], idx) => (
                          <div key={type} onClick={() => setDownloadOpen('')}
                            style={{ padding: '11px 16px', fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-head)', cursor: 'pointer', color: 'var(--dark)', borderBottom: idx === 0 ? '1px solid var(--border)' : 'none', transition: 'background 0.1s' }}
                            onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-light)'}
                            onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                            {label}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </>
            )
          )}
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // HISTORY SANITARY
    // ══════════════════════════════════════════════════════════════════════════════
    const SanitaryEvolutionScreen = () => {
      const [sanField, setSanField] = useState('');
      const [sanLot, setSanLot] = useState('');
      const [sanCampaign, setSanCampaign] = useState('');
      const [analyzed, setAnalyzed] = useState(false);
      const [activeTab, setActiveTab] = useState('current');
      const [selectedCompareCampaigns, setSelectedCompareCampaigns] = useState([]);
      const [downloadOpen, setDownloadOpen] = useState(''); // 'hdr' | 'ftr' | ''

      const COMPARE_COLORS = ['#3D8B5E', '#2563EB', '#D97706', '#7C3AED'];
      const stages = ['Germinación', 'Macollaje', 'Floración', 'Fructificación', 'Madurez'];

      const fieldLots = sanField ? DATA.lots.filter(l => l.fieldId === Number(sanField)) : [];
      const lotCampaigns = sanLot ? DATA.campaigns.filter(c => c.lotId === Number(sanLot)) : [];
      const allLotCampaigns = sanLot ? DATA.campaigns.filter(c => c.lotId === Number(sanLot)) : [];
      const hasHistorical = allLotCampaigns.length >= 2;

      const handleAnalyze = () => {
        if (sanField && sanLot && sanCampaign) {
          setSelectedCompareCampaigns([Number(sanCampaign)]);
          setActiveTab('current');
          setAnalyzed(true);
        }
      };

      // ── Tab 1 data (unchanged logic) ──
      const campaignVisits = DATA.visits.filter(v => v.campaignId === Number(sanCampaign)).sort((a, b) => new Date(a.date) - new Date(b.date));
      const campaignOrders = DATA.orders.filter(o => o.lotId === Number(sanLot) && o.visitId && campaignVisits.some(v => v.id === o.visitId)).sort((a, b) => new Date(a.date) - new Date(b.date));

      const chartData = campaignVisits.map(v => {
        const maxPest = v.pests.reduce((prev, curr) => (prev && prev.incidence > curr.incidence) ? prev : curr, null);
        const order = campaignOrders.find(o => o.visitId === v.id);
        return { date: v.date, stage: v.phenoStage, incidence: maxPest ? maxPest.incidence : 0, pestName: maxPest ? maxPest.name : '', hasOrder: !!order, orderProducts: order ? order.products.map(p => p.name).join(', ') : '' };
      });

      const totalVisits = campaignVisits.length;
      const totalInterventions = campaignOrders.length;
      let maxGlobalPest = null, maxGlobalPestIncidence = -1, stageWithMaxPest = '—';
      campaignVisits.forEach(v => v.pests.forEach(p => {
        if (p.incidence > maxGlobalPestIncidence) { maxGlobalPestIncidence = p.incidence; maxGlobalPest = p.name; stageWithMaxPest = v.phenoStage; }
      }));
      const pestHighestLabel = maxGlobalPest ? `${maxGlobalPest} (${maxGlobalPestIncidence}%)` : '—';

      const events = [];
      campaignVisits.forEach(v => events.push({ id: `v-${v.id}`, date: v.date, type: 'Visita', desc: v.pests.length > 0 ? v.pests.map(p => p.name).join(', ') : 'Sin plagas registradas', level: v.severity, action: v.pests.length > 0 ? v.pests[0].treatment : '—', stage: v.phenoStage }));
      campaignOrders.forEach(o => events.push({ id: `o-${o.id}`, date: o.date, type: 'Aplicación', desc: o.products.map(p => p.name).join(' + '), level: '—', action: 'Orden ejecutada', stage: '—' }));
      events.sort((a, b) => new Date(b.date) - new Date(a.date));

      const chartWidth = Math.max(600, chartData.length * 150);
      const chartHeight = 200;
      const maxIncidenceVal = Math.max(10, ...chartData.map(d => d.incidence)) * 1.2;
      const getY = (val) => chartHeight - (val / maxIncidenceVal) * chartHeight;
      const getX = (index) => (index / Math.max(1, chartData.length - 1 || 1)) * (chartWidth - 100) + 50;

      // ── Tab 2 helpers ──
      const getAllPestsForCampaign = (camp) => {
        const visits = DATA.visits.filter(v => v.campaignId === camp.id);
        return [...visits.flatMap(v => v.pests), ...(camp.pestHistory || []).flatMap(h => h.pests)];
      };

      const getStageDataForCampaign = (camp) => {
        const visits = DATA.visits.filter(v => v.campaignId === camp.id);
        return stages.map(s => {
          const stagePests = [
            ...visits.filter(v => v.phenoStage === s).flatMap(v => v.pests),
            ...((camp.pestHistory || []).find(h => h.stage === s)?.pests || [])
          ];
          if (stagePests.length === 0) return { stage: s, maxIncidence: null };
          return { stage: s, maxIncidence: Math.max(...stagePests.map(p => p.incidence || 0)) };
        });
      };

      const toggleCompareCampaign = (id) => {
        if (id === Number(sanCampaign)) return;
        if (selectedCompareCampaigns.includes(id)) setSelectedCompareCampaigns(selectedCompareCampaigns.filter(c => c !== id));
        else if (selectedCompareCampaigns.length < 4) setSelectedCompareCampaigns([...selectedCompareCampaigns, id]);
      };

      const compareCampaignObjects = selectedCompareCampaigns.map(id => DATA.campaigns.find(c => c.id === id)).filter(Boolean);
      const compareStageData = compareCampaignObjects.map((c, ci) => ({ campaign: c, color: COMPARE_COLORS[ci % 4], stageData: getStageDataForCampaign(c) }));

      // All unique pests across selected campaigns
      const allUniquePests = [...new Set(compareCampaignObjects.flatMap(c => getAllPestsForCampaign(c).map(p => p.name)))].sort();

      const getPestLevelForCampaign = (camp, pestName) => {
        const pests = getAllPestsForCampaign(camp).filter(p => p.name === pestName);
        if (pests.length === 0) return null;
        const order = { bajo: 1, medio: 2, alto: 3, critico: 4 };
        return pests.reduce((best, p) => (order[p.level] || 0) > (order[best?.level] || 0) ? p : best, null);
      };

      const getCampaignInterventions = (camp) => {
        const visits = DATA.visits.filter(v => v.campaignId === camp.id);
        return DATA.orders.filter(o => o.lotId === Number(sanLot) && o.visitId && visits.some(v => v.id === o.visitId)).length;
      };

      // Most recurring pest
      const pestCount = {};
      compareCampaignObjects.forEach(c => { [...new Set(getAllPestsForCampaign(c).map(p => p.name))].forEach(n => { pestCount[n] = (pestCount[n] || 0) + 1; }); });
      const mostRecurring = Object.entries(pestCount).sort((a, b) => b[1] - a[1])[0];

      // Intervention trend
      const currentInterventions = totalInterventions;
      const otherInterventions = compareCampaignObjects.slice(1).map(c => getCampaignInterventions(c));
      const avgOtherInterventions = otherInterventions.length > 0 ? (otherInterventions.reduce((a, b) => a + b, 0) / otherInterventions.length).toFixed(1) : null;

      // Line chart dimensions for Tab 2
      const LC_W = 600, LC_H = 160, LC_PAD = 50;
      const maxCompareInc = Math.max(10, ...compareStageData.flatMap(({ stageData: sd }) => sd.map(s => s.maxIncidence || 0)));
      const getLCX = (stageIdx) => LC_PAD + (stageIdx / 4) * (LC_W - LC_PAD * 2);
      const getLCY = (val) => LC_H - (val / maxCompareInc) * LC_H;

      return (
        <PageShell breadcrumbs={['Evolución Sanitaria']}>
          <div className="page-header">
            <div><div className="page-title">Evolución Sanitaria</div><div className="page-subtitle">Análisis interactivo de plagas y tratamientos por campaña</div></div>
          </div>

          {/* ── Filter bar ── */}
          <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center', background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', boxShadow: 'var(--shadow-sm)' }}>
            <Icon name="filter" size={15} color="var(--text-secondary)" />
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 180 }}>
              <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campo</label>

                          <div key={type} onClick={() => setDownloadOpen('')}
                            style={{ padding: '11px 16px', fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-head)', cursor: 'pointer', color: 'var(--dark)', borderBottom: idx === 0 ? '1px solid var(--border)' : 'none', transition: 'background 0.1s' }}
                            onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-light)'}
                            onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                            {label}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </>
            )
          )}
        </PageShell>
      );
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // BALANCE DE CAMPAÑA
    // ══════════════════════════════════════════════════════════════════════════════
    const COST_COLORS = { insumos: '#3D8B5E', maquinaria: '#1E3A8A', traslado: '#F5C842', manodeobra: '#E07B2A' };
    const COST_LABELS = { insumos: 'Insumos', maquinaria: 'Maquinaria', traslado: 'Traslado', manodeobra: 'Mano de obra' };

    const CostBar = ({ c, height = 10, showLabels = false }) => {
      const t = c.total || 1;
      const segs = [['insumos', 'Insumos'], ['maquinaria', 'Maquinaria'], ['traslado', 'Traslado'], ['manodeobra', 'Mano de obra']];
      return (
        <div>
          <div style={{ display: 'flex', height, borderRadius: 4, overflow: 'hidden', width: '100%' }}>
            {segs.map(([k, label]) => {
              const pct = Math.round((c[k] || 0) / t * 100);
              return pct > 0 ? (
                <div key={k} style={{ width: `${pct}%`, background: COST_COLORS[k] }} title={`${label}: ${pct}%`} />
              ) : null;
            })}
          </div>
          {showLabels && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px 16px', marginTop: 10 }}>
              {segs.map(([k, label]) => {
                const pct = Math.round((c[k] || 0) / t * 100);
                return pct > 0 ? (
                  <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12 }}>
                    <span style={{ width: 10, height: 10, borderRadius: 2, background: COST_COLORS[k], display: 'inline-block', flexShrink: 0 }} />
                    <span style={{ color: 'var(--text-secondary)' }}>{label}</span>
                    <span className="td-mono" style={{ fontWeight: 600, color: 'var(--dark)' }}>{pct}%</span>
                  </div>
                ) : null;
              })}
            </div>
          )}
        </div>
      );
    };

    const getBalanceSeason = (startDate) => {
      const d = new Date(startDate);
      const y = d.getFullYear(), m = d.getMonth() + 1;
      return m >= 7 ? `${y}/${y + 1}` : `${y - 1}/${y}`;
    };

    const computeOrderCost = (order) => {
      const insumos = (order.products || []).reduce((s, p) => s + (p.cost || 0), 0);
      const maquinaria = (order.fuelLiters || 0) * (order.fuelPrice || 0);
      const traslado = order.transportCost || 0;
      const manodeobra = (order.laborDays || 0) * (order.laborPrice || 0);
      return { insumos, maquinaria, traslado, manodeobra, total: insumos + maquinaria + traslado + manodeobra };
    };

    const CostsScreen = () => {
      const [view, setView] = useState('main');
      const [detailInfo, setDetailInfo] = useState(null);
      const [selField, setSelField] = useState('');
      const [selSeason, setSelSeason] = useState('');
      const [balances, setBalances] = useState({});
      const [lotInputs, setLotInputs] = useState({});
      const [closeDate, setCloseDate] = useState('');
      const [downloadOpen, setDownloadOpen] = useState(''); // 'hdr' | 'ftr' | ''

      // ── Derived filter data ──
      const fieldLots = selField ? DATA.lots.filter(l => l.fieldId === Number(selField)) : [];
      const fieldCampaigns = selField ? DATA.campaigns.filter(c => fieldLots.some(l => l.id === c.lotId)) : [];
      const availableSeasons = [...new Set(fieldCampaigns.map(c => getBalanceSeason(c.startDate)))].sort().reverse();

      const seasonCampaigns = (selField && selSeason)
        ? fieldCampaigns.filter(c => getBalanceSeason(c.startDate) === selSeason)
        : [];

      // One entry per lot — latest campaign per lot in the season
      const seasonLotCampaignMap = {};
      seasonCampaigns.forEach(c => {
        const prev = seasonLotCampaignMap[c.lotId];
        if (!prev || new Date(c.startDate) > new Date(prev.startDate)) {
          seasonLotCampaignMap[c.lotId] = c;
        }
      });
      const seasonLotCampaigns = Object.entries(seasonLotCampaignMap).map(([lotId, campaign]) => ({
        lotId: Number(lotId),
        lot: DATA.lots.find(l => l.id === Number(lotId)),
        campaign,
      })).filter(x => x.lot);

      // ── Cost computation from executed orders ──
      const getExecOrders = (lotId, campaignId) => {
        const campVisitIds = new Set(DATA.visits.filter(v => v.campaignId === campaignId).map(v => v.id));
        return DATA.orders.filter(o =>
          o.lotId === lotId &&
          o.status === 'ejecutada' &&
          (o.visitId == null || campVisitIds.has(o.visitId))
        );
      };

      const getLotCosts = (lotId, campaignId) => {
        const execOrders = getExecOrders(lotId, campaignId);
        const acc = { insumos: 0, maquinaria: 0, traslado: 0, manodeobra: 0, total: 0 };
        execOrders.forEach(o => {
          const c = computeOrderCost(o);
          acc.insumos += c.insumos; acc.maquinaria += c.maquinaria;
          acc.traslado += c.traslado; acc.manodeobra += c.manodeobra; acc.total += c.total;
        });
        return acc;
      };

      // Precomputed lot data for current season
      const seasonLotData = seasonLotCampaigns.map(({ lotId, lot, campaign }) => ({
        lotId, lot, campaign,
        execOrders: getExecOrders(lotId, campaign.id),
        costs: getLotCosts(lotId, campaign.id),
      }));

      const grandCostTotal = seasonLotData.reduce((s, d) => s + d.costs.total, 0);

      // ── Balance state ──
      const balanceKey = selField && selSeason ? `${selField}-${selSeason}` : null;
      const savedBalance = balanceKey ? balances[balanceKey] : null;
      const isGenerated = savedBalance?.generated === true;

      const updateLotInput = (lotId, field, value) =>
        setLotInputs(prev => ({ ...prev, [lotId]: { ...(prev[lotId] || {}), [field]: value } }));

      const canGenerate = selField && selSeason && seasonLotData.length > 0 &&
        seasonLotData.every(({ lotId }) => {
          const inp = lotInputs[lotId] || {};
          return inp.quintales && inp.price && Number(inp.quintales) > 0 && Number(inp.price) > 0;
        });

      const handleGenerate = () => {
        if (!canGenerate || !balanceKey) return;
        setBalances(prev => ({
          ...prev,
          [balanceKey]: { generated: true, closeDate, lotInputs: JSON.parse(JSON.stringify(lotInputs)) }
        }));
      };

      const handleEditClose = () => {
        if (!balanceKey || !savedBalance) return;
        setBalances(prev => ({ ...prev, [balanceKey]: { ...prev[balanceKey], generated: false } }));
        setLotInputs(savedBalance.lotInputs || {});
        setCloseDate(savedBalance.closeDate || '');
      };

      const onFieldChange = (fid) => {
        setSelField(fid); setSelSeason(''); setLotInputs({}); setCloseDate(''); setView('main');
      };

      const onSeasonChange = (season) => {
        setSelSeason(season); setView('main');
        const key = selField && season ? `${selField}-${season}` : null;
        const saved = key ? balances[key] : null;
        if (saved) {
          setLotInputs(saved.lotInputs || {}); setCloseDate(saved.closeDate || '');
        } else {
          const fLots = DATA.lots.filter(l => l.fieldId === Number(selField));
          const fCamps = DATA.campaigns.filter(c => fLots.some(l => l.id === c.lotId) && getBalanceSeason(c.startDate) === season);
          const init = {};
          const seen = new Set();
          fCamps.forEach(c => { if (!seen.has(c.lotId)) { seen.add(c.lotId); init[c.lotId] = { quintales: '', price: '' }; } });
          setLotInputs(init); setCloseDate('');
        }
      };

      // ── Balance lot data (for generated state) ──
      const balanceLotData = seasonLotData.map(d => {
        const inp = (savedBalance?.lotInputs || {})[d.lotId] || {};
        const quintales = Number(inp.quintales) || 0;
        const price = Number(inp.price) || 0;
        const revenue = quintales * price;
        const net = revenue - d.costs.total;
        const area = d.lot.area || 1;
        const realYield = area > 0 ? quintales / area : 0;
        const bey = d.campaign.breakEvenYield || null;
        const isRentable = bey !== null ? realYield >= bey : null;
        return { ...d, quintales, price, revenue, net, realYield, bey, isRentable };
      });

      const totalRevenue = balanceLotData.reduce((s, d) => s + d.revenue, 0);
      const totalCost = balanceLotData.reduce((s, d) => s + d.costs.total, 0);
      const totalNet = totalRevenue - totalCost;
      const totalArea = balanceLotData.reduce((s, d) => s + (d.lot.area || 0), 0);
      const avgCostPerHa = totalArea > 0 ? Math.round(totalCost / totalArea) : 0;

      // ─────────────────────────────────────────
      // DETAIL VIEW
      // ─────────────────────────────────────────
      if (view === 'detail' && detailInfo) {
        const { lot, campaign, costs } = detailInfo;
        const execOrders = getExecOrders(lot.id, campaign.id);
        const rows = execOrders.map(o => {
          const c = computeOrderCost(o);
          const visit = DATA.visits.find(v => v.id === o.visitId);
          const mainPest = visit?.pests?.[0]?.name || '—';
          return { ...o, ...c, mainPest };
        });
        const costPerHa = lot.area ? Math.round(costs.total / lot.area) : 0;
        const topEntry = Object.entries({ insumos: costs.insumos, maquinaria: costs.maquinaria, traslado: costs.traslado, manodeobra: costs.manodeobra }).sort((a, b) => b[1] - a[1])[0];

        return (
          <PageShell breadcrumbs={['Resultado Sanitario', lot.name]}>
            <div className="page-header">
              <div>
                <button className="btn btn-ghost btn-sm" onClick={() => setView('main')} style={{ paddingLeft: 0, marginBottom: 8 }}>
                  <Icon name="back" size={14} /> Volver al balance
                </button>
                <div className="page-title">{lot.name}</div>
                <div className="page-subtitle">{campaign.crop} · {lot.area} has · Campaña {selSeason}</div>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 14, marginBottom: 24 }}>
              {[
                { label: 'Costo total', value: fmt.currency(costs.total) },
                { label: 'Costo / hectárea', value: `$${costPerHa.toLocaleString('es-AR')}/ha` },
                { label: 'Intervenciones', value: String(execOrders.length) },
                { label: 'Concepto principal', value: topEntry ? COST_LABELS[topEntry[0]] : '—' },
              ].map((kpi, i) => (
                <div key={i} className="stat-card">
                  <div className="stat-label">{kpi.label}</div>
                  <div className="stat-value td-mono" style={{ fontSize: 20 }}>{kpi.value}</div>
                </div>
              ))}
            </div>

            <div className="card" style={{ marginBottom: 24 }}>
              <div className="card-header"><div className="card-title">🧩 Composición de costos</div></div>
              <div className="card-body">
                {costs.total > 0
                  ? <CostBar c={{ total: costs.total, insumos: costs.insumos, maquinaria: costs.maquinaria, traslado: costs.traslado, manodeobra: costs.manodeobra }} height={16} showLabels />
                  : <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>Sin costos registrados</div>}
              </div>
            </div>

            <div className="card">
              <div className="card-header"><div className="card-title">📋 Intervenciones — órdenes ejecutadas</div></div>
              <div style={{ overflowX: 'auto' }}>
                <table style={{ minWidth: 740 }}>
                  <thead>
                    <tr>
                      <th>Fecha</th><th>Plaga / Productos</th><th>Tipo</th>
                      <th style={{ color: COST_COLORS.insumos }}>Insumos</th>
                      <th style={{ color: COST_COLORS.maquinaria }}>Maquinaria</th>
                      <th style={{ color: COST_COLORS.traslado }}>Traslado</th>
                      <th style={{ color: COST_COLORS.manodeobra }}>Mano de obra</th>
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.length === 0 ? (
                      <tr><td colSpan={8} style={{ textAlign: 'center', padding: 28, color: 'var(--text-muted)' }}>Sin órdenes ejecutadas en esta campaña</td></tr>
                    ) : rows.map(r => (
                      <tr key={r.id}>
                        <td className="td-mono" style={{ fontSize: 12 }}>{fmt.date(r.date)}</td>
                        <td>
                          <div style={{ fontWeight: 600 }}>🐛 {r.mainPest}</div>
                          <div style={{ fontSize: 11, color: 'var(--text-secondary)' }}>{(r.products || []).map(p => p.name).join(', ')}</div>
                        </td>
                        <td style={{ fontSize: 14 }}>{(r.appType || '').split(' ')[0]}</td>
                        <td className="td-mono">{fmt.currency(r.insumos)}</td>
                        <td className="td-mono">{fmt.currency(r.maquinaria)}</td>
                        <td className="td-mono">{fmt.currency(r.traslado)}</td>
                        <td className="td-mono">{r.manodeobra > 0 ? fmt.currency(r.manodeobra) : <span style={{ color: 'var(--text-muted)' }}>—</span>}</td>
                        <td className="td-mono" style={{ fontWeight: 700, color: 'var(--dark)' }}>{fmt.currency(r.total)}</td>
                      </tr>
                    ))}
                    {rows.length > 0 && (
                      <tr style={{ background: 'var(--accent-light)', fontWeight: 700 }}>
                        <td colSpan={3} style={{ fontFamily: 'var(--font-head)', fontWeight: 700 }}>Total</td>
                        <td className="td-mono">{fmt.currency(costs.insumos)}</td>
                        <td className="td-mono">{fmt.currency(costs.maquinaria)}</td>
                        <td className="td-mono">{fmt.currency(costs.traslado)}</td>
                        <td className="td-mono">{fmt.currency(costs.manodeobra)}</td>
                        <td className="td-mono" style={{ fontSize: 15 }}>{fmt.currency(costs.total)}</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </PageShell>
        );
      }

      // ─────────────────────────────────────────
      // MAIN VIEW
      // ─────────────────────────────────────────
      return (
        <PageShell breadcrumbs={['Resultado Sanitario']}>

          {/* ── Header with selectors ── */}
          <div className="page-header" style={{ flexWrap: 'wrap', gap: 16 }}>
            <div>
              <div className="page-title">Resultado Sanitario</div>
            </div>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.05em', whiteSpace: 'nowrap' }}>Campo</label>
                <select className="form-input form-select" style={{ minWidth: 180, height: 36 }}
                  value={selField} onChange={e => onFieldChange(e.target.value)}>
                  <option value="">Seleccionar...</option>
                  {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                </select>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.05em', whiteSpace: 'nowrap' }}>Año</label>
                <select className="form-input form-select" style={{ minWidth: 160, height: 36 }}
                  value={selSeason} onChange={e => onSeasonChange(e.target.value)} disabled={!selField}>
                  <option value="">Seleccionar...</option>
                  {availableSeasons.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              {isGenerated && (
                <button className="btn btn-secondary" style={{ height: 36 }} onClick={handleEditClose}>
                  ✏️ Editar datos de cierre
                </button>
              )}
              {isGenerated && (
                <div style={{ position: 'relative' }}>
                  <button className="btn btn-secondary" style={{ height: 36, gap: 6 }} onClick={() => setDownloadOpen(v => v === 'hdr' ? '' : 'hdr')}>
                    ⬇ Descargar
                  </button>
                  {downloadOpen === 'hdr' && (
                    <div style={{ position: 'absolute', top: 42, right: 0, background: '#fff', border: '1px solid var(--border)', borderRadius: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.13)', zIndex: 300, minWidth: 190, overflow: 'hidden' }}>
                      {[['📄 Descargar como PDF', 'pdf'], ['📊 Descargar como Excel', 'xlsx']].map(([label, type], idx) => (
                        <div key={type} onClick={() => setDownloadOpen('')}
                          style={{ padding: '11px 16px', fontSize: 13, fontWeight: 600, fontFamily: 'var(--font-head)', cursor: 'pointer', color: 'var(--dark)', borderBottom: idx === 0 ? '1px solid var(--border)' : 'none', transition: 'background 0.1s' }}
                          onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-light)'}
                          onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                          {label}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>

          {!selField || !selSeason ? (
            /* ── EMPTY STATE ── */
            <div className="empty-state" style={{ marginTop: 40, padding: 60 }}>
              <div className="empty-state-icon" style={{ fontSize: 40 }}>💰</div>
              <div className="empty-state-text">Seleccioná un campo y una campaña para generar el balance</div>
              <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 12, maxWidth: 420, margin: '12px auto 0' }}>Los costos se tomarán automáticamente de las órdenes de aplicación con estado "ejecutada".</div>
            </div>

          ) : isGenerated ? (
            /* ══════════════════════════════════════
               ESTADO 2 — BALANCE GENERADO
               ══════════════════════════════════════ */
            <>
              {/* ── KPIs globales ── */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 24 }}>
                {[
                  { label: 'Ingreso total',           value: fmt.currency(totalRevenue),  color: 'var(--success)' },
                  { label: 'Costo total',              value: fmt.currency(totalCost),      color: 'var(--dark)' },
                  { label: 'Resultado neto',           value: (totalNet < 0 ? '−' : '') + fmt.currency(Math.abs(totalNet)), color: totalNet >= 0 ? 'var(--success)' : 'var(--critical)' },
                  { label: 'Costo promedio / ha',      value: `$${avgCostPerHa.toLocaleString('es-AR')}/ha`, color: 'var(--dark)' },
                ].map((kpi, i) => (
                  <div key={i} className="stat-card">
                    <div className="stat-label">{kpi.label}</div>
                    <div className="stat-value td-mono" style={{ fontSize: 22, color: kpi.color }}>{kpi.value}</div>
                  </div>
                ))}
              </div>

              {/* ── Resultado por lote ── */}
              <div className="card" style={{ marginBottom: 20 }}>
                <div className="card-header"><div className="card-title">📋 Resultado por lote</div></div>
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ minWidth: 680 }}>
                    <thead>
                      <tr>
                        <th>Lote / Cultivo</th>
                        <th>Hectáreas</th>
                        <th>Costo total</th>
                        <th>QQ obtenidos</th>
                        <th>Precio ($/qq)</th>
                        <th>Ingreso total</th>
                        <th>Resultado neto</th>
                      </tr>
                    </thead>
                    <tbody>
                      {balanceLotData.map(d => (
                        <tr key={d.lotId} style={{ cursor: 'pointer' }}
                          onClick={() => { setDetailInfo({ lot: d.lot, campaign: d.campaign, costs: d.costs }); setView('detail'); }}>
                          <td>
                            <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700 }}>{d.lot.name}</div>
                            <div style={{ fontSize: 11, color: 'var(--text-secondary)' }}>{d.campaign.crop}</div>
                          </td>
                          <td className="td-mono">{d.lot.area}</td>
                          <td className="td-mono">{d.costs.total > 0 ? fmt.currency(d.costs.total) : <span style={{ color: 'var(--text-muted)' }}>$0</span>}</td>
                          <td className="td-mono">{d.quintales.toLocaleString('es-AR')}</td>
                          <td className="td-mono">${Number(d.price).toLocaleString('es-AR')}</td>
                          <td className="td-mono" style={{ color: 'var(--success)', fontWeight: 700 }}>{fmt.currency(d.revenue)}</td>
                          <td className="td-mono" style={{ fontWeight: 700, color: d.net >= 0 ? 'var(--success)' : 'var(--critical)' }}>
                            {(d.net < 0 ? '−' : '') + fmt.currency(Math.abs(d.net))}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* ── Ingreso vs. Costo por lote ── */}
              <div className="card" style={{ marginBottom: 20 }}>
                <div className="card-header">
                  <div className="card-title">📊 Ingreso vs. Costo por lote</div>
                  <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12 }}>
                      <div style={{ width: 14, height: 14, background: '#2E7D4F', borderRadius: 2 }} />
                      <span style={{ color: 'var(--text-secondary)' }}>Ingreso total</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12 }}>
                      <div style={{ width: 14, height: 14, background: '#1E3A8A', borderRadius: 2 }} />
                      <span style={{ color: 'var(--text-secondary)' }}>Costo total</span>
                    </div>
                  </div>
                </div>
                <div className="card-body" style={{ overflowX: 'auto' }}>
                  {(() => {
                    const BAR_W = 28, GAP = 6, GROUP_GAP = 32, PAD_L = 64, PAD_B = 48, H = 180;
                    const maxVal = Math.max(1, ...balanceLotData.flatMap(d => [d.revenue, d.costs.total])) * 1.18;
                    const fmtY = v => v >= 1000000 ? `$${(v / 1000000).toFixed(1)}M` : v >= 1000 ? `$${Math.round(v / 1000)}k` : `$${Math.round(v)}`;
                    const totalW = PAD_L + balanceLotData.length * (BAR_W * 2 + GAP + GROUP_GAP);
                    return (
                      <svg width={Math.max(360, totalW)} height={H + PAD_B} style={{ overflow: 'visible' }}>
                        {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
                          const y = H - t * H;
                          return (
                            <g key={i}>
                              <line x1={PAD_L} y1={y} x2={totalW} y2={y} stroke="var(--border)" strokeDasharray="3 3" />
                              <text x={PAD_L - 6} y={y + 4} fontSize={9} textAnchor="end" fill="var(--text-muted)" fontFamily="var(--font-mono)">{fmtY(maxVal * t)}</text>
                            </g>
                          );
                        })}
                        {balanceLotData.map((d, i) => {
                          const gx = PAD_L + i * (BAR_W * 2 + GAP + GROUP_GAP);
                          const ingrH = Math.max(2, (d.revenue / maxVal) * H);
                          const costH = Math.max(2, (d.costs.total / maxVal) * H);
                          return (

                              <rect x={gx} y={H - ingrH} width={BAR_W} height={ingrH} fill="#2E7D4F" rx={3} opacity={0.85} />

                              <rect x={gx + BAR_W + GAP} y={H - costH} width={BAR_W} height={costH} fill="#1E3A8A" rx={3} opacity={0.8} />
                              <text x={gx + BAR_W + GAP + BAR_W / 2} y={H - costH - 5} fontSize={9} textAnchor="middle" fontFamily="var(--font-mono)" fill="#1E3A8A" fontWeight="700">{fmtY(d.costs.total)}</text>

                            </g>

    const AdvisorsScreen = () => {
      const [advisors, setAdvisors] = useState(DATA.advisors);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ name: '', email: '', password: '' });

      const openEdit = (a) => { setEditing(a); setForm({ name: a.name, email: a.email, password: '' }); setErrors({}); setModal(true); };
      const validate = () => {
        const e = {};
        if (!form.name) e.name = 'El nombre es obligatorio';
        if (!form.email) e.email = 'El email es obligatorio';
        if (!editing && !form.password) e.password = 'La contraseña inicial es obligatoria';
        setErrors(e);
        return Object.keys(e).length === 0;
      };
      const save = () => {
        if (!validate()) return;
        if (editing) setAdvisors(advisors.map(a => a.id === editing.id ? { ...a, ...form } : a));
        else setAdvisors([...advisors, { id: Date.now(), ...form, active: true }]);
        setModal(false);
      };

                      </div>
                    </td>
                    <td style={{ color: 'var(--text-secondary)' }}>{a.email}</td>
                    <td><span className={`badge ${a.active ? 'badge-success' : 'badge-closed'}`}>{a.active ? '✓ Activo' : '✗ Inactivo'}</span></td>
