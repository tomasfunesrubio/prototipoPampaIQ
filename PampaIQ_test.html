const SanitaryEvolutionScreen = () => {
  const [sanField, setSanField] = useState('');
  const [sanLot, setSanLot] = useState('');
  const [sanCampaign, setSanCampaign] = useState('');
  const [analyzed, setAnalyzed] = useState(false);

  const fieldLots = sanField ? DATA.lots.filter(l => l.fieldId === Number(sanField)) : [];
  const lotCampaigns = sanLot ? DATA.campaigns.filter(c => c.lotId === Number(sanLot)) : [];

  const handleAnalyze = () => {
    if (sanField && sanLot && sanCampaign) {
      setAnalyzed(true);
    }
  };

  const campaignVisits = DATA.visits.filter(v => v.campaignId === Number(sanCampaign)).sort((a, b) => new Date(a.date) - new Date(b.date));
  const campaignOrders = DATA.orders.filter(o => o.lotId === Number(sanLot) && o.visitId && campaignVisits.some(v => v.id === o.visitId)).sort((a, b) => new Date(a.date) - new Date(b.date));

  const chartData = campaignVisits.map(v => {
    const maxPest = v.pests.reduce((prev, curr) => (prev && prev.incidence > curr.incidence) ? prev : curr, null);
    const order = campaignOrders.find(o => o.visitId === v.id);
    return {
      date: v.date,
      stage: v.phenoStage,
      incidence: maxPest ? maxPest.incidence : 0,
      pestName: maxPest ? maxPest.name : '',
      hasOrder: !!order,
      orderProducts: order ? order.products.map(p => p.name).join(', ') : '',
    };
  });

  const totalVisits = campaignVisits.length;
  const totalInterventions = campaignOrders.length;
  
  let maxGlobalPest = null;
  let maxGlobalPestIncidence = -1;
  let stageWithMaxPest = '';
  
  campaignVisits.forEach(v => {
    v.pests.forEach(p => {
      if (p.incidence > maxGlobalPestIncidence) {
        maxGlobalPestIncidence = p.incidence;
        maxGlobalPest = p.name;
        stageWithMaxPest = v.phenoStage;
      }
    });
  });

  const pestHighestLabel = maxGlobalPest ? `${maxGlobalPest} (${maxGlobalPestIncidence}%)` : '';

  const events = [];
  campaignVisits.forEach(v => {
    events.push({
      id: `v-${v.id}`,
      date: v.date,
      type: 'Visita',
      desc: v.pests.length > 0 ? v.pests.map(p => p.name).join(', ') : 'Sin plagas registradas',
      level: v.severity,
      action: v.pests.length > 0 ? v.pests[0].treatment : '',
      stage: v.phenoStage
    });
  });
  campaignOrders.forEach(o => {
    events.push({
      id: `o-${o.id}`,
      date: o.date,
      type: 'Aplicacin',
      desc: o.products.map(p => p.name).join(' + '),
      level: '',
      action: 'Orden ejecutada',
      stage: ''
    });
  });
  
  events.sort((a, b) => new Date(b.date) - new Date(a.date));

  const chartWidth = Math.max(600, chartData.length * 150);
  const chartHeight = 200;
  const maxIncidenceVal = Math.max(10, ...chartData.map(d => d.incidence)) * 1.2;
  const getY = (val) => chartHeight - (val / maxIncidenceVal) * chartHeight;
  const getX = (index) => (index / Math.max(1, chartData.length - 1 || 1)) * (chartWidth - 100) + 50;

  return (
    <PageShell breadcrumbs={['Evolucin Sanitaria']}>
      <div className="page-header">
        <div><div className="page-title">Evolucin Sanitaria</div><div className="page-subtitle">Anlisis interactivo de plagas y tratamientos por campaa</div></div>
      </div>

      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center', background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '12px 16px', boxShadow: 'var(--shadow-sm)' }}>
        <Icon name="filter" size={15} color="var(--text-secondary)" />
        
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 200 }}>
          <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campo</label>
          <select className="form-input form-select" style={{ flex: 1 }} value={sanField} onChange={e => { setSanField(e.target.value); setSanLot(''); setSanCampaign(''); setAnalyzed(false); }}>
            <option value="">Seleccionar...</option>
            {DATA.fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
          </select>
        </div>
        
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 200 }}>
          <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Lote</label>
          <select className="form-input form-select" style={{ flex: 1 }} value={sanLot} onChange={e => { setSanLot(e.target.value); setSanCampaign(''); setAnalyzed(false); }} disabled={!sanField}>
            <option value="">Seleccionar...</option>
            {fieldLots.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </div>
        
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: '1 1 auto', minWidth: 200 }}>
          <label style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap' }}>Campaa</label>
          <select className="form-input form-select" style={{ flex: 1 }} value={sanCampaign} onChange={e => { setSanCampaign(e.target.value); setAnalyzed(false); }} disabled={!sanLot}>
            <option value="">Seleccionar...</option>
            {lotCampaigns.map(c => <option key={c.id} value={c.id}>{c.crop} ({fmt.date(c.startDate)})</option>)}
          </select>
        </div>

        <button className="btn btn-primary" style={{ marginLeft: 'auto', flex: '0 0 auto' }} disabled={!sanField || !sanLot || !sanCampaign} onClick={handleAnalyze}>
          Generar anlisis
        </button>
      </div>

      {!analyzed ? (
        <div className="empty-state" style={{ marginTop: 40, padding: 60 }}>
          <div className="empty-state-icon" style={{ fontSize: 40 }}></div>
          <div className="empty-state-text" style={{ fontSize: 18 }}>Seleccion filtros para visualizar el anlisis</div>
          <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 12, maxWidth: 400, margin: '12px auto 0' }}>Cruzaremos datos de visitas, niveles de plagas, etapa fenolgica y rdenes de aplicacin de la campaa.</div>
        </div>
      ) : (
        <>
          <div className="stat-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', marginBottom: 20 }}>
            <div className="stat-card">
              <div className="stat-label">Total de visitas</div>
              <div className="stat-value td-mono">{totalVisits}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Intervenciones</div>
              <div className="stat-value td-mono">{totalInterventions}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Mayor incidencia</div>
              <div className="stat-value" style={{ fontSize: 16 }}>{pestHighestLabel}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Etapa ms crtica</div>
              <div className="stat-value" style={{ fontSize: 16 }}>{stageWithMaxPest !== '' ? <>{stageIcons[stageWithMaxPest]} {stageWithMaxPest}</> : ''}</div>
            </div>
          </div>

          <div className="card" style={{ marginBottom: 20 }}>
            <div className="card-header"><div className="card-title"> Curva de incidencia y tratamientos</div></div>
            <div className="card-body" style={{ overflowX: 'auto', padding: '24px' }}>
              {chartData.length < 2 ? (
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', textAlign: 'center', padding: 40 }}>No hay suficientes datos de visitas en la campaa para trazar una curva evolutiva.</div>
              ) : (
                <div style={{ position: 'relative', width: chartWidth, height: chartHeight + 60 }}>
                  <svg width={chartWidth} height={chartHeight} style={{ overflow: 'visible' }}>
                    {[0, 0.25, 0.5, 0.75, 1].map((tick, i) => (
                      <g key={i}>
                        <line x1={0} y1={chartHeight * tick} x2={chartWidth} y2={chartHeight * tick} stroke="var(--border)" strokeDasharray="4 4" />
                        <text x={0} y={chartHeight * tick - 4} fontSize={10} fill="var(--text-muted)" fontFamily="var(--font-mono)">{Math.round(maxIncidenceVal * (1 - tick))}%</text>
                      </g>
                    ))}
                    
                    <path
                      d={`M ${chartData.map((d, i) => `${getX(i)},${getY(d.incidence)}`).join(' L ')}`}
                      fill="none"
                      stroke="var(--critical)"
                      strokeWidth="3"
                      strokeLinejoin="round"
                    />

                    {chartData.map((d, i) => (
                      <g key={i}>
                        {d.hasOrder && (
                          <g>
                            <line x1={getX(i)} y1={getY(d.incidence)} x2={getX(i)} y2={chartHeight} stroke="var(--accent)" strokeWidth="2" strokeDasharray="4 4" />
                            <rect x={getX(i) - 12} y={chartHeight - 30} width={24} height={24} rx={4} fill="var(--accent-light)" stroke="var(--accent)" />
                            <text x={getX(i)} y={chartHeight - 14} fontSize={12} textAnchor="middle"></text>
                            <text x={getX(i)} y={chartHeight - 36} fontSize={10} fill="var(--accent)" fontWeight="700" textAnchor="middle" transform={`rotate(-15, ${getX(i)}, ${chartHeight - 36})`}>APLICACIN</text>
                          </g>
                        )}
                        
                        <circle cx={getX(i)} cy={getY(d.incidence)} r={5} fill="#fff" stroke="var(--critical)" strokeWidth="3" />
                        
                        <text x={getX(i)} y={getY(d.incidence) - 12} fontSize={12} fontWeight="bold" fill="var(--dark)" textAnchor="middle" fontFamily="var(--font-mono)">
                          {d.incidence}%
                        </text>
                        {d.pestName && (
                          <text x={getX(i)} y={getY(d.incidence) - 26} fontSize={10} fill="var(--text-secondary)" textAnchor="middle">
                            {d.pestName}
                          </text>
                        )}

                        <text x={getX(i)} y={chartHeight + 20} fontSize={11} fill="var(--text-secondary)" textAnchor="middle" fontFamily="var(--font-mono)">
                          {fmt.date(d.date)}
                        </text>
                        <text x={getX(i)} y={chartHeight + 36} fontSize={14} textAnchor="middle">
                          {stageIcons[d.stage] || ''}
                        </text>
                        <text x={getX(i)} y={chartHeight + 50} fontSize={10} fill="var(--text-muted)" textAnchor="middle" fontWeight="600">
                          {d.stage}
                        </text>
                      </g>
                    ))}
                  </svg>
                </div>
              )}
            </div>
          </div>

          <div className="table-wrap">
            <table>
              <thead><tr><th>Fecha</th><th>Tipo</th><th>Detalle / Plaga</th><th>Etapa</th><th>Nivel</th><th>Accin tomada</th></tr></thead>
              <tbody>
                {events.length === 0 ? (
                  <tr><td colSpan="6" style={{ textAlign: 'center', padding: 24, color: 'var(--text-muted)' }}>Sin eventos registrados</td></tr>
                ) : (
                  events.map(e => (
                    <tr key={e.id}>
                      <td className="td-mono" style={{ fontSize: 12 }}>{fmt.date(e.date)}</td>
                      <td>
                        <span className={`badge ${e.type === 'Visita' ? 'badge-info' : 'badge-success'}`}>
                          {e.type === 'Visita' ? ' Visita' : ' Aplicacin'}
                        </span>
                      </td>
                      <td style={{ fontFamily: 'var(--font-head)', fontWeight: 600 }}>{e.desc}</td>
                      <td>{e.stage !== '' ? <>{stageIcons[e.stage]} {e.stage}</> : ''}</td>
                      <td>{e.level !== '' ? <span className={`badge ${levelColors[e.level] || 'badge-neutral'}`}><span className={`severity-dot ${levelSev[e.level] || ''}`} /> {e.level}</span> : ''}</td>
                      <td style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{e.action}</td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
    </PageShell>
  );
};

const COST_COLORS = { insumos: '#3D8B5E', maquinaria: '#1E3A8A', traslado: '#F5C842', manodeobra: '#E07B2A' };
const COST_LABELS = { insumos: 'Insumos', maquinaria: 'Maquinaria', traslado: 'Traslado', manodeobra: 'Mano de obra' };

const CostBar = ({ c, height = 10, showLabels = false }) => {
  const t = c.total || 1;
  const segs = [['insumos','Insumos'],['maquinaria','Maquinaria'],['traslado','Traslado'],['manodeobra','Mano de obra']];
  return (
    <div>
      <div style={{ display: 'flex', height, borderRadius: 4, overflow: 'hidden', width: '100%' }}>
        {segs.map(([k, label]) => {
          const pct = Math.round((c[k] || 0) / t * 100);
          return pct > 0 ? (
            <div key={k} style={{ width: `${pct}%`, background: COST_COLORS[k], position: 'relative' }} title={`${label}: ${pct}%`} />
          ) : null;
        })}
      </div>
      {showLabels && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px 16px', marginTop: 10 }}>
          {segs.map(([k, label]) => {
            const pct = Math.round((c[k] || 0) / t * 100);
            return pct > 0 ? (
              <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: COST_COLORS[k], display: 'inline-block', flexShrink: 0 }} />
                <span style={{ color: 'var(--text-secondary)' }}>{label}</span>
                <span className="td-mono" style={{ fontWeight: 600, color: 'var(--dark)' }}>{pct}%</span>
              </div>
            ) : null;
          })}
        </div>
      )}
    </div>
  );
};

const CostsScreen = () => {
  const [view, setView] = useState('list');
  const [selected, setSelected] = useState(null);
  const [campaign, setCampaign] = useState('2024/2025');
  const total = DATA.costs.reduce((sum, c) => sum + c.total, 0);

  if (view === 'detail' && selected) {
    const details = DATA.costDetails.filter(d => d.lotId === selected.lotId).sort((a,b) => new Date(a.date)-new Date(b.date));
    const totInsumos = details.reduce((s,d)=>s+(d.insumos||0),0);
    const totMaquinaria = details.reduce((s,d)=>s+(d.maquinaria||0),0);
    const totTraslado = details.reduce((s,d)=>s+(d.traslado||0),0);
    const totManoobra = details.reduce((s,d)=>s+(d.manodeobra||0),0);
    const totTotal = details.reduce((s,d)=>s+d.total,0);
    const costPerHa = selected.area ? Math.round(totTotal / selected.area) : 0;
    const maxIntervention = details.reduce((a,b) => b.total > a.total ? b : a, details[0] || {});
    const conceptTotals = { insumos: totInsumos, maquinaria: totMaquinaria, traslado: totTraslado, manodeobra: totManoobra };
    const topConcept = Object.entries(conceptTotals).sort((a,b) => b[1]-a[1])[0];

    // SVG line chart of cumulative cost
    const cumulative = [];
    let acc = 0;
    details.forEach(d => { acc += d.total; cumulative.push(acc); });
    const svgW = 600, svgH = 120, pad = 40;
    const maxVal = cumulative[cumulative.length-1] || 1;
    const pts = cumulative.map((v,i) => {
      const x = pad + (i / Math.max(cumulative.length-1,1)) * (svgW - pad*2);
      const y = svgH - pad - (v / maxVal) * (svgH - pad*2);
      return `${x},${y}`;
    }).join(' ');
    const areaPath = `M ${pad},${svgH-pad} ` + cumulative.map((v,i) => {
      const x = pad + (i / Math.max(cumulative.length-1,1)) * (svgW - pad*2);
      const y = svgH - pad - (v / maxVal) * (svgH - pad*2);
      return `L ${x},${y}`;
    }).join(' ') + ` L ${pad + (svgW-pad*2)},${svgH-pad} Z`;

    return (
      <PageShell breadcrumbs={['Costos Sanitarios', selected.lotName]}>
        <div className="page-header">
          <div>
            <button className="btn btn-ghost btn-sm" onClick={() => setView('list')} style={{ paddingLeft: 0, marginBottom: 8 }}><Icon name="back" size={14} /> Volver</button>
            <div className="page-title">Costos  {selected.lotName}</div>
            <div className="page-subtitle">{selected.crop}  {selected.area} has  {selected.interventions} intervenciones</div>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 14, marginBottom: 24 }}>
          {[
            { label: 'Costo total acumulado', value: fmt.currency(totTotal), sub: null },
            { label: 'Costo por hectrea', value: `$${costPerHa.toLocaleString('es-AR')}`, sub: '$/ha' },
            { label: 'Intervencin ms costosa', value: fmt.currency(maxIntervention.total || 0), sub: maxIntervention.date ? fmt.date(maxIntervention.date) : '' },
            { label: 'Concepto mayor gasto', value: COST_LABELS[topConcept?.[0]] || '-', sub: topConcept ? `${Math.round(topConcept[1]/totTotal*100)}% del total` : '' },
          ].map((kpi, i) => (
            <div key={i} className="card" style={{ padding: '16px 20px' }}>
              <div style={{ fontSize: 11, fontFamily: 'var(--font-head)', fontWeight: 700, textTransform: 'uppercase', color: 'var(--text-secondary)', marginBottom: 8, letterSpacing: '0.05em' }}>{kpi.label}</div>
              <div className="td-mono" style={{ fontSize: 20, fontWeight: 700, color: 'var(--dark)' }}>{kpi.value}</div>
              {kpi.sub && <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 3 }}>{kpi.sub}</div>}
            </div>
          ))}
        </div>

        <div className="card" style={{ marginBottom: 24 }}>
          <div className="card-header"><div className="card-title"> Evolucin del gasto acumulado</div></div>
          <div className="card-body" style={{ overflowX: 'auto' }}>
            <svg width={svgW} height={svgH} style={{ display: 'block', minWidth: 400 }}>
              <defs>
                <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#3D8B5E" stopOpacity="0.2"/>
                  <stop offset="100%" stopColor="#3D8B5E" stopOpacity="0"/>
                </linearGradient>
              </defs>
              <line x1={pad} y1={svgH-pad} x2={svgW-pad} y2={svgH-pad} stroke="var(--border)" strokeWidth="1"/>
              <line x1={pad} y1={pad} x2={pad} y2={svgH-pad} stroke="var(--border)" strokeWidth="1"/>
              {[0, 0.5, 1].map(f => {
                const y = svgH - pad - f * (svgH - pad*2);
                const val = Math.round(maxVal * f);
                return <g key={f}>
                  <line x1={pad} y1={y} x2={svgW-pad} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="4,4"/>
                  <text x={pad-4} y={y+4} textAnchor="end" fontSize="9" fontFamily="var(--font-mono)" fill="var(--text-secondary)">${Math.round(val/1000)}k</text>
                </g>;
              })}
              {cumulative.length > 1 && <path d={areaPath} fill="url(#areaGrad)"/>}
              {cumulative.length > 1 && <polyline points={pts} fill="none" stroke="#3D8B5E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
              {cumulative.map((v,i) => {
                const x = pad + (i / Math.max(cumulative.length-1,1)) * (svgW - pad*2);
                const y = svgH - pad - (v / maxVal) * (svgH - pad*2);
                return <g key={i}>
                  <circle cx={x} cy={y} r={4} fill="#3D8B5E" stroke="#fff" strokeWidth="2"/>
                  <text x={x} y={y-10} textAnchor="middle" fontSize="9" fontFamily="var(--font-mono)" fill="var(--dark)">${Math.round(v/1000)}k</text>
                  <text x={x} y={svgH-pad+14} textAnchor="middle" fontSize="9" fontFamily="var(--font-mono)" fill="var(--text-secondary)">{details[i]?.date?.slice(5).replace('-','/')}</text>
                </g>;
              })}
            </svg>
          </div>
        </div>

        <div className="card" style={{ marginBottom: 24 }}>
          <div className="card-header"><div className="card-title"> Tabla de intervenciones</div></div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ minWidth: 700 }}>
              <thead><tr>
                <th>Fecha</th><th>Plaga</th><th>Tipo</th>
                <th style={{ color: COST_COLORS.insumos }}>Insumos</th>
                <th style={{ color: COST_COLORS.maquinaria }}>Maquinaria</th>
                <th style={{ color: COST_COLORS.traslado }}>Traslado</th>
                <th style={{ color: COST_COLORS.manodeobra }}>Mano de obra</th>
                <th>Total</th>
              </tr></thead>
              <tbody>
                {details.map(d => (
                  <tr key={d.id}>
                    <td className="td-mono" style={{ fontSize: 12 }}>{fmt.date(d.date)}</td>
                    <td style={{ fontWeight: 500 }}> {d.pest}</td>
                    <td style={{ fontSize: 16 }}>{d.appType}</td>
                    <td className="td-mono">{fmt.currency(d.insumos)}</td>
                    <td className="td-mono">{fmt.currency(d.maquinaria)}</td>
                    <td className="td-mono">{fmt.currency(d.traslado)}</td>
                    <td className="td-mono">{d.manodeobra > 0 ? fmt.currency(d.manodeobra) : <span style={{color:'var(--text-muted)'}}></span>}</td>
                    <td className="td-mono" style={{ fontWeight: 700, color: 'var(--dark)' }}>{fmt.currency(d.total)}</td>
                  </tr>
                ))}
                <tr style={{ background: 'var(--accent-light)', fontWeight: 700 }}>
                  <td colSpan={3} style={{ fontFamily: 'var(--font-head)', fontWeight: 700 }}>Total</td>
                  <td className="td-mono">{fmt.currency(totInsumos)}</td>
                  <td className="td-mono">{fmt.currency(totMaquinaria)}</td>
                  <td className="td-mono">{fmt.currency(totTraslado)}</td>
                  <td className="td-mono">{fmt.currency(totManoobra)}</td>
                  <td className="td-mono" style={{ fontSize: 15 }}>{fmt.currency(totTotal)}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div style={{ padding: '16px 20px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, fontFamily: 'var(--font-head)', color: 'var(--text-secondary)', marginBottom: 8, textTransform: 'uppercase' }}>Desglose total del perodo</div>
            <CostBar c={{ total: totTotal, insumos: totInsumos, maquinaria: totMaquinaria, traslado: totTraslado, manodeobra: totManoobra }} height={16} showLabels />
          </div>
        </div>
      </PageShell>
    );
  }

  //  Computed for list view 
  const totalArea = DATA.costs.reduce((s,c)=>s+(c.area||0),0);
  const avgPerHa = totalArea > 0 ? Math.round(total/totalArea) : 0;
  const allDetails = DATA.costDetails;
  const allConceptTotals = { insumos: allDetails.reduce((s,d)=>s+(d.insumos||0),0), maquinaria: allDetails.reduce((s,d)=>s+(d.maquinaria||0),0), traslado: allDetails.reduce((s,d)=>s+(d.traslado||0),0), manodeobra: allDetails.reduce((s,d)=>s+(d.manodeobra||0),0) };
  const topConceptAll = Object.entries(allConceptTotals).sort((a,b)=>b[1]-a[1])[0];
  const maxSingleIntervention = [...allDetails].sort((a,b)=>b.total-a.total)[0];
  const maxSingleLot = DATA.costs.find(c=>c.lotId===maxSingleIntervention?.lotId);

  return (
    <PageShell breadcrumbs={['Costos Sanitarios']}>
      <div className="page-header">
        <div>
          <div className="page-title">Costos Sanitarios</div>
          <div className="page-subtitle">Campaa {campaign}</div>
        </div>
        <select className="form-input form-select" style={{ width: 160, height: 36 }} value={campaign} onChange={e => setCampaign(e.target.value)}>
          {['2024/2025','2023/2024','2022/2023'].map(y => <option key={y}>{y}</option>)}
        </select>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 14, marginBottom: 24 }}>
        {[
          { label: 'Costo total campaa', value: fmt.currency(total) },
          { label: 'Costo promedio / ha', value: `$${avgPerHa.toLocaleString('es-AR')}`, sub: '$/ha' },
          { label: 'Concepto mayor gasto', value: COST_LABELS[topConceptAll?.[0]] || '-', sub: topConceptAll ? `${Math.round(topConceptAll[1]/total*100)}% del total` : '' },
          { label: 'Intervencin ms costosa', value: fmt.currency(maxSingleIntervention?.total || 0), sub: `${maxSingleLot?.lotName || ''}  ${maxSingleIntervention?.date ? fmt.date(maxSingleIntervention.date) : ''}` },
        ].map((kpi, i) => (
          <div key={i} className="stat-card" style={{ padding: '16px 20px' }}>
            <div className="stat-label">{kpi.label}</div>
            <div className="stat-value" style={{ fontSize: 22 }}>{kpi.value}</div>
            {kpi.sub && <div className="stat-sub">{kpi.sub}</div>}
          </div>

const AdvisorsScreen = () => {
  const [advisors, setAdvisors] = useState(DATA.advisors);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: '', email: '', password: '' });
  const [errors, setErrors] = useState({});

  const openCreate = () => { setEditing(null); setForm({ name: '', email: '', password: '' }); setErrors({}); setModal(true); };
  const openEdit = (a) => { setEditing(a); setForm({ name: a.name, email: a.email, password: '' }); setErrors({}); setModal(true); };
  const validate = () => {
    const e = {};
    if (!form.name) e.name = 'El nombre es obligatorio';
    if (!form.email) e.email = 'El email es obligatorio';
    if (!editing && !form.password) e.password = 'La contrasea inicial es obligatoria';
    setErrors(e);
    return Object.keys(e).length === 0;

const ProductsCatalogScreen = () => {
  const [products, setProducts] = useState(DATA.products || []);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: '', tipoProducto: '', descripcion: '', precioPorLitro: '' });
  const [errors, setErrors] = useState({});
  const [confirmDel, setConfirmDel] = useState(null);

  const productTypes = ['Herbicida', 'Fungicida', 'Insecticida', 'Fertilizante', 'Bioestimulante', 'Otro'];

  const openCreate = () => { setEditing(null); setForm({ name: '', tipoProducto: '', descripcion: '', precioPorLitro: '' }); setErrors({}); setModal(true); };
  const openEdit = (p) => { setEditing(p); setForm({ name: p.name, tipoProducto: p.tipoProducto, descripcion: p.descripcion || '', precioPorLitro: String(p.precioPorLitro) }); setErrors({}); setModal(true); };

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'El nombre es obligatorio';
    if (!form.tipoProducto) e.tipoProducto = 'El tipo de producto es obligatorio';
    if (!form.precioPorLitro || Number(form.precioPorLitro) <= 0) e.precioPorLitro = 'El precio por litro debe ser mayor a 0';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const save = () => {
    if (!validate()) return;
    const cleanForm = { ...form, precioPorLitro: Number(form.precioPorLitro) };
    let nextProducts;
    if (editing) {
      nextProducts = products.map(p => p.id === editing.id ? { ...p, ...cleanForm } : p);
    } else {
      nextProducts = [...products, { id: Date.now(), ...cleanForm }];
    }
    setProducts(nextProducts);
    DATA.products = nextProducts; // Sync back to global DATA
    setModal(false);
  };

  const del = (id) => {
    const nextProducts = products.filter(p => p.id !== id);
    setProducts(nextProducts);
    DATA.products = nextProducts; // Sync back to global DATA
    setConfirmDel(null);
  };

  return (
    <PageShell breadcrumbs={['Catlogo de Productos']} actions={<button className="btn btn-primary" onClick={openCreate}><Icon name="plus" size={14} color="#fff" /> Nuevo producto</button>}>
      <div className="page-header">
        <div><div className="page-title">Catlogo de Productos</div><div className="page-subtitle">{products.length} productos registrados</div></div>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Tipo</th><th>Descripcin</th><th>Precio por litro</th><th>Acciones</th></tr></thead>
          <tbody>
            {products.map(p => (
              <tr key={p.id}>

const ProfileScreen = () => {
  const [form, setForm] = useState({ name: DATA.currentUser.name, email: DATA.currentUser.email });
  const [passForm, setPassForm] = useState({ current: '', new: '', confirm: '' });
  const [saved, setSaved] = useState(false);
  const [passSaved, setPassSaved] = useState(false);
  const [passErrors, setPassErrors] = useState({});

  const validatePass = () => {
    const e = {};
    if (!passForm.current) e.current = 'Ingres tu contrasea actual';
    if (!passForm.new || passForm.new.length < 8) e.new = 'La nueva contrasea debe tener al menos 8 caracteres';
    if (passForm.new !== passForm.confirm) e.confirm = 'Las contraseas no coinciden';
    setPassErrors(e);
    return Object.keys(e).length === 0;
  };

  return (
    <PageShell breadcrumbs={['Mi Perfil']}>

<script type="text/babel">
// app-main.jsx  Root app with routing, tweaks, mobile nav

// const { useState, useEffect } = React;

//  Tweaks defaults 
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "viewMode": "desktop",
  "accentColor": "#3D8B5E",
  "darkNav": true,
  "compactDensity": false,
  "showMobileFrame": true
}/*EDITMODE-END*/;

//  Main App 
const App = () => {
  const [screen, setScreen] = useState('login');
  const [navData, setNavData] = useState(null);
  const [loggedIn, setLoggedIn] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);

  // Sync accent color
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--nav-bg', tweaks.darkNav ? '#1E3A2F' : tweaks.accentColor);
  }, [tweaks.accentColor, tweaks.darkNav]);

  // Detect viewport
  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 769);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, value) => {
    const next = typeof key === 'object' ? { ...tweaks, ...key } : { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const handleLogin = () => { setLoggedIn(true); setScreen('dashboard'); };
  const handleNav = (id, data = null) => {
    if (id === 'login') { setLoggedIn(false); setScreen('login'); return; }
    setNavData(data);
    setScreen(id);
  };

  const alertCount = DATA.alerts.filter(a => !a.resolved).length;

  const mobileView = tweaks.viewMode === 'mobile' || isMobile;

  // Auth screens  wrap in phone on mobile, full-page on desktop
  if (!loggedIn || screen === 'login') {
    if (!mobileView) {
      return (
        <>
          <LoginScreen onLogin={handleLogin} />
          {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} />}
        </>
      );
    }
    // Mobile login inside phone bezel
    return (
      <div className="phone-mockup-stage">
        <div className="phone-bezel">
          <div className="phone-dynamic-island" />

//  Mobile Login 
const MobileLoginScreen = ({ onLogin }) => {
  const [email, setEmail] = React.useState('juan@laesperanza.com.ar');
  const [pass, setPass] = React.useState('');
  const [mode, setMode] = React.useState('login');
  const [errors, setErrors] = React.useState({});
  const [sent, setSent] = React.useState(false);

  const validate = () => {
    const e = {};
    if (!email) e.email = 'El email es obligatorio';
    if (mode === 'login' && !pass) e.pass = 'La contrasea es obligatoria';
    setErrors(e);
    return Object.keys(e).length === 0;

    if (!validate()) return;

      {/* Form card */}
      <div style={{ flex: 1, background: 'var(--bg)', borderRadius: '24px 24px 0 0', padding: '28px 24px 32px', marginTop: -16 }}>
        {mode === 'login' && (
          <>

            <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 24 }}>Ingres a tu cuenta para continuar</div>

              <label className="form-label">Email</label>

            <div className="form-group">

        {mode === 'recover' && !sent && (
          <>

            <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 24 }}>Te enviaremos un enlace a tu email registrado</div>

               Volver

        {mode === 'recover' && sent && (
          <>
            <div style={{ textAlign: 'center', padding: '20px 0' }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}></div>
              <div style={{ fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: 20, color: 'var(--dark)', marginBottom: 8 }}>Email enviado</div>
